<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>RANK CLASSE V8 - SUPREME EDITION</title>

    <style>
        /* ============================================================
           DESIGN SISTEMA MÍDIA V8 - O RETORNO DA ESTÉTICA PERFEITA
           ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --neon: #00ff88;
            --ouro: #ffd700;
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; outline: none; }

        body {
            background-color: var(--bg);
            color: #fff;
            background-image: radial-gradient(circle at top right, rgba(0, 255, 136, 0.05), transparent);
            min-height: 100vh;
        }

        #app { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; }

        /* GLASSMORPHISM CARDS */
        .glass {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUTS & BUTTONS STYLE */
        .mídia-input {
            width: 100%; background: #000; border: 1px solid #222;
            padding: 18px; border-radius: 15px; color: #fff; margin-bottom: 12px;
        }

        .btn-neon {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--neon); color: #000; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        .btn-neon:active { transform: scale(0.95); }

        /* RANKING ROWS */
        .rank-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .rank-row:hover { border-color: var(--neon); }

        .avatar {
            width: 50px; height: 50px; border-radius: 15px;
            background-size: cover; background-position: center;
            border: 2px solid var(--neon); margin-right: 15px;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 5px;
        }

        .online { background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .offline { background: #555; }

        /* CHAT FLOATING */
        #chat-btn {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: var(--neon);
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; font-size: 25px; cursor: pointer; z-index: 100;
        }

        #chat-box {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: none; flex-direction: column;
        }

        /* ADMIN PANEL DETAILS */
        .admin-edit-box {
            background: #111; padding: 15px; border-radius: 15px; margin-top: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="app">

    <section id="login-screen" class="glass">
        <h1 style="text-align: center; margin-bottom: 30px; font-size: 40px; letter-spacing: -2px;">OMNI<span style="color:var(--neon)">RANK</span></h1>
        <input type="text" id="log-turma" class="mídia-input" placeholder="NOME DA TURMA">
        <input type="text" id="log-insta" class="mídia-input" placeholder="LINK DO INSTAGRAM">
        <input type="password" id="log-pass" class="mídia-input" placeholder="SENHA">
        <button class="btn-neon" onclick="entrar()">ENTRAR NO RANK</button>
        <p onclick="irAdmin()" style="text-align: center; font-size: 10px; margin-top: 20px; color: #444; cursor: pointer;">PAINEL ADMIN</p>
    </section>

    <section id="rank-screen" class="hidden">
        <div class="glass" style="text-align: center;">
            <div id="me-avatar" class="avatar" style="margin: 0 auto 15px auto; width: 80px; height: 80px;"></div>
            <h2 id="me-nome">TURMA ---</h2>
            <div style="display: flex; justify-content: space-around; margin-top: 20px;">
                <div><b id="me-pts" style="color:var(--neon)">0</b><br><small>PTS</small></div>
                <div><b id="me-seg">0</b><br><small>SEG</small></div>
                <div><b id="me-vid">0</b><br><small>VIDS</small></div>
            </div>
        </div>

        <div id="ranking-list"></div>
    </section>

    <section id="admin-screen" class="hidden glass">
        <h2>CONTROLE MÍDIA</h2>
        <div id="admin-list" style="margin-top: 20px;"></div>
        <button class="btn-neon" style="background:#222; color:#fff; margin-top: 20px;" onclick="voltar()">SAIR DO ADMIN</button>
    </section>

</div>

<div id="chat-btn" onclick="abrirChat()">💬</div>
<div id="chat-box">
    <div style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
        <b>CHAT GLOBAL</b> <span onclick="fecharChat()">[X]</span>
    </div>
    <div id="chat-content" style="flex: 1; overflow-y: auto; padding: 20px;"></div>
    <div style="padding: 20px; display: flex; gap: 10px;">
        <input type="text" id="chat-msg" class="mídia-input" style="margin: 0;" placeholder="Mande a braba...">
        <button class="btn-neon" style="width: 60px;" onclick="enviarMensagem()">></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let minhaTurma = null;

    // AUTO-LOGIN (SALVA AS INFORMAÇÕES)
    window.onload = () => {
        const salvo = localStorage.getItem('omni_user');
        if(salvo) {
            minhaTurma = JSON.parse(salvo);
            logarSucesso();
        }
    }

    function entrar() {
        const t = document.getElementById('log-turma').value;
        const s = document.getElementById('log-pass').value;
        const i = document.getElementById('log-insta').value;

        if(!t || !s) return alert("Preencha tudo!");

        db.ref('ranking/' + t).once('value', snap => {
            const d = snap.val();
            if(d && d.pass !== s) return alert("Senha errada!");
            
            const user = d || { turma: t, pass: s, insta: i, pontos: 0, seg: 0, vids: 0, pic: '', online: Date.now() };
            db.ref('ranking/' + t).update(user);
            minhaTurma = user;
            localStorage.setItem('omni_user', JSON.stringify(user));
            logarSucesso();
        });
    }

    function logarSucesso() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('rank-screen').classList.remove('hidden');
        
        // Status Online a cada 10 seg
        setInterval(() => {
            db.ref('ranking/' + minhaTurma.turma).update({ online: Date.now() });
        }, 10000);

        carregarRanking();
    }

    function carregarRanking() {
        db.ref('ranking').on('value', snap => {
            const list = document.getElementById('ranking-list');
            const data = snap.val();
            list.innerHTML = "";
            
            const ordenado = Object.values(data).sort((a,b) => b.pontos - a.pontos);
            
            ordenado.forEach((u, i) => {
                const isOn = (Date.now() - u.online) < 30000;
                
                if(u.turma === minhaTurma.turma) {
                    document.getElementById('me-nome').innerText = u.turma;
                    document.getElementById('me-pts').innerText = u.pontos;
                    document.getElementById('me-seg').innerText = u.seg;
                    document.getElementById('me-vid').innerText = u.vids;
                    document.getElementById('me-avatar').style.backgroundImage = `url(${u.pic || 'https://via.placeholder.com/150'})`;
                }

                list.innerHTML += `
                    <div class="rank-row">
                        <div class="avatar" style="background-image: url(${u.pic || 'https://via.placeholder.com/150'})"></div>
                        <div style="flex:1">
                            <b>#${i+1} ${u.turma}</b><br>
                            <small><span class="status-dot ${isOn?'online':'offline'}"></span> ${isOn?'Ativo':'Offline'}</small>
                        </div>
                        <div style="text-align:right">
                            <b style="color:var(--neon)">${u.pontos}</b><br>
                            <a href="${u.insta}" target="_blank" style="font-size:8px; color:#555">INSTAGRAM</a>
                        </div>
                    </div>
                `;
            });
        });
    }

    // SISTEMA ADMIN (ATUALIZAR TUDO BONITINHO)
    function irAdmin() {
        const pass = prompt("Senha Master:");
        if(pass !== "123") return;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');

        db.ref('ranking').on('value', snap => {
            const div = document.getElementById('admin-list');
            div.innerHTML = "";
            Object.values(snap.val()).forEach(u => {
                div.innerHTML += `
                    <div class="admin-edit-box">
                        <b>${u.turma}</b> <small>(${u.insta})</small>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input id="p-${u.turma}" type="number" class="mídia-input" style="padding:10px" placeholder="Pts" value="${u.pontos}">
                            <input id="s-${u.turma}" type="number" class="mídia-input" style="padding:10px" placeholder="Seg" value="${u.seg}">
                            <input id="v-${u.turma}" type="number" class="mídia-input" style="padding:10px" placeholder="Vids" value="${u.vids}">
                        </div>
                        <button class="btn-neon" style="padding:10px; font-size:10px" onclick="salvarAdmin('${u.turma}')">ATUALIZAR</button>
                    </div>
                `;
            });
        });
    }

    function salvarAdmin(turma) {
        const p = document.getElementById('p-'+turma).value;
        const s = document.getElementById('s-'+turma).value;
        const v = document.getElementById('v-'+turma).value;
        db.ref('ranking/' + turma).update({
            pontos: parseInt(p), seg: parseInt(s), vids: parseInt(v)
        });
        alert("Atualizado!");
    }

    // CHAT
    function abrirChat() { document.getElementById('chat-box').style.display = 'flex'; }
    function fecharChat() { document.getElementById('chat-box').style.display = 'none'; }
    function enviarMensagem() {
        const m = document.getElementById('chat-msg').value;
        if(!m) return;
        db.ref('mensagens').push({ turma: minhaTurma.turma, texto: m, tempo: Date.now() });
        document.getElementById('chat-msg').value = "";
    }

    db.ref('mensagens').limitToLast(20).on('value', snap => {
        const cont = document.getElementById('chat-content');
        cont.innerHTML = "";
        snap.forEach(m => {
            const d = m.val();
            cont.innerHTML += `<p style="margin-bottom:10px"><b style="color:var(--neon)">${d.turma}:</b> ${d.texto}</p>`;
        });
        cont.scrollTop = cont.scrollHeight;
    });

    function voltar() { location.reload(); }
</script>

</body>
</html>
