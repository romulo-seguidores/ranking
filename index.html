<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>RANK CLASSE V7 - OMNI EDITION</title>

    <style>
        /* ============================================================
           SISTEMA VISUAL "MÍDIA" EXTREMO - BY RÔMULO
           ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --ouro: #ffd700;
            --prata: #e0e0e0;
            --bronze: #cd7f32;
            --neon: #00ff88;
            --sky: #00d4ff;
            --danger: #ff4444;
            --bg-master: #020202;
            --glass-base: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        /* CONFIGURAÇÕES BASE */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            outline: none; font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-master);
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        #app {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            position: relative;
        }

        /* ANIMAÇÕES CINEMATOGRÁFICAS */
        @keyframes entrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pulseOnline {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--neon); }
            50% { transform: scale(1.2); box-shadow: 0 0 10px var(--neon); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--neon); }
        }

        @keyframes goldShine {
            0% { filter: brightness(1) drop-shadow(0 0 0px var(--ouro)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 15px var(--ouro)); }
            100% { filter: brightness(1) drop-shadow(0 0 0px var(--ouro)); }
        }

        /* CONTAINERS GLASS */
        .glass-box {
            background: var(--glass-base);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 35px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            animation: entrance 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* HEADER DE PERFIL MÍDIA */
        .profile-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            border-radius: 35px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .lvl-badge {
            background: var(--ouro);
            color: #000;
            padding: 5px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }

        .xp-container {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon), var(--sky));
            width: 0%;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* MEDALHAS */
        .medal {
            font-size: 28px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .medal-gold { animation: goldShine 2s infinite; }

        /* CARDS DO RANKING */
        .rank-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 24px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .rank-row:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .row-top { border: 1.5px solid rgba(255, 215, 0, 0.3); }

        /* STATUS DOT */
        .status-box { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; }
        .dot-online { background: var(--neon); animation: pulseOnline 2s infinite; }
        .dot-offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .status-txt { font-size: 10px; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase; }

        /* INPUTS E BOTOES */
        .mídia-input {
            width: 100%;
            background: #0a0a0a;
            border: 1.5px solid #1a1a1a;
            padding: 20px 25px;
            border-radius: 25px;
            color: #fff;
            margin-bottom: 15px;
            font-size: 14px;
            transition: 0.3s;
        }

        .mídia-input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.1);
        }

        .mídia-btn {
            width: 100%;
            padding: 22px;
            border-radius: 25px;
            border: none;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 15px;
        }

        .btn-white { background: #fff; color: #000; box-shadow: 0 15px 30px rgba(255,255,255,0.1); }
        .btn-dark { background: transparent; border: 1.5px solid #222; color: #888; }
        .btn-dark:hover { color: #fff; border-color: #fff; }

        /* INSTAGRAM BTN */
        .insta-btn {
            font-size: 10px;
            font-weight: 800;
            color: #888;
            text-decoration: none;
            border: 1.5px solid #222;
            padding: 8px 18px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
        }

        .insta-btn:hover { background: #fff; color: #000; border-color: #fff; }

        /* CHAT FLOATING */
        #chat-omni {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 300px;
            height: 400px;
            background: rgba(5, 5, 5, 0.98);
            border: 1px solid #1a1a1a;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
            box-shadow: 0 30px 90px rgba(0,0,0,1);
            backdrop-filter: blur(20px);
        }

        #chat-feed {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-line {
            background: rgba(255,255,255,0.03);
            padding: 12px 18px;
            border-radius: 20px;
            border-left: 4px solid var(--neon);
            animation: entrance 0.4s ease-out;
        }

        .msg-line b { color: var(--neon); text-transform: lowercase; margin-right: 6px; }

        /* ADMIN DASHBOARD - VISUAL COMPLETO */
        .adm-tool-card {
            background: #080808;
            border: 1.5px solid #151515;
            padding: 30px;
            border-radius: 40px;
            margin-bottom: 25px;
        }

        .adm-grid-tools {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .adm-small-btn {
            padding: 14px;
            border-radius: 18px;
            border: none;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .adm-small-btn:active { transform: scale(0.95); }

        /* CLASSES DE UTILIDADE */
        .hidden { display: none !important; }
        .txt-neon { color: var(--neon); }
        .txt-danger { color: var(--danger); }
        .creator-watermark { position: fixed; bottom: 15px; left: 30px; font-size: 11px; color: #1a1a1a; font-weight: 900; z-index: -1; }

    </style>
</head>
<body>

<div id="app">
    
    <section id="auth-screen" class="glass-box">
        <h1 style="font-weight: 900; font-size: 42px; letter-spacing: -3px; margin: 0; line-height: 0.9;">RANK<br><span style="color:var(--neon)">CLASSE</span></h1>
        <p style="font-size: 10px; color: #444; margin-bottom: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px;">Omni Elite System v7.0</p>
        
        <div id="auth-form-master">
            <input type="text" id="ipt-turma" class="mídia-input" placeholder="Nome da Equipe / Turma">
            <input type="text" id="ipt-serie" class="mídia-input" placeholder="Ano / Série (Ex: 1º Médio)">
            <input type="text" id="ipt-escola" class="mídia-input" placeholder="Instituição de Ensino">
            <input type="url" id="ipt-insta" class="mídia-input" placeholder="Link do Instagram">
            <input type="password" id="ipt-pass" class="mídia-input" placeholder="Senha de Segurança">
            <select id="ipt-aura" class="mídia-input">
                <option value="⚡ ELÉTRICO">Aura: Elétrica</option>
                <option value="🔥 FOGO">Aura: Flamejante</option>
                <option value="❄️ GELO">Aura: Glacial</option>
                <option value="🌑 VAZIO">Aura: Sombria</option>
            </select>
            <button class="mídia-btn btn-white" onclick="handleLogin()">INICIAR SESSÃO</button>
            <button class="mídia-btn btn-dark" onclick="enterAsGuest()">MODO OBSERVADOR</button>
        </div>
        <button onclick="showAdminAccess()" style="background:none; border:none; color:#111; font-size:10px; margin-top:25px; cursor:pointer; font-weight:900;">[ ACESSAR TERMINAL ROOT ]</button>
    </section>

    <section id="admin-auth-screen" class="hidden glass-box">
        <h2 style="color: var(--neon); margin-bottom: 25px; letter-spacing: -1.5px; font-size: 28px;">ROOT ACCESS</h2>
        <input type="text" id="root-user" class="mídia-input" placeholder="Identificador Root">
        <input type="password" id="root-pass" class="mídia-input" placeholder="Chave de Segurança">
        <button class="mídia-btn btn-white" onclick="authenticateRoot()">VALIDAR ACESSO</button>
        <button class="mídia-btn btn-dark" onclick="location.reload()">CANCELAR</button>
    </section>

    <section id="ranking-view" class="hidden">
        <div class="profile-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <span style="font-size: 10px; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Sessão Ativa</span>
                    <h2 id="me-turma-name" style="margin: 0; font-size: 26px; color: var(--neon); letter-spacing: -1.5px;">---</h2>
                </div>
                <div><span id="me-lvl-tag" class="lvl-badge">LVL 0</span></div>
            </div>
            <div class="xp-container"><div id="me-xp-fill-bar" class="xp-fill"></div></div>
        </div>

        <div id="ranking-list-render"></div>

        <button class="mídia-btn btn-dark" style="margin-top: 60px;" onclick="destroySession()">ENCERRAR CONEXÃO</button>
    </section>

    <section id="admin-panel-view" class="hidden glass-box" style="max-width: 100%;">
        <h2 style="color: var(--neon); margin-bottom: 30px; text-align: center; font-size: 32px; letter-spacing: -2px;">COMMAND CENTER</h2>
        
        <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:25px; margin-bottom:25px; border:1px solid rgba(255,255,255,0.05);">
            <p style="font-size:11px; color:#666; font-weight:900; margin-bottom:15px; text-transform:uppercase;">Gerenciamento Global</p>
            <button class="mídia-btn" style="background:var(--danger); color:white; font-size:11px; margin:0;" onclick="clearAllChat()">LIMPAR MENSAGENS DO CHAT</button>
        </div>

        <div id="admin-accounts-list"></div>
        
        <button class="mídia-btn btn-dark" onclick="location.reload()">SAIR DO MODO ROOT</button>
    </section>

    <div id="chat-omni" class="hidden">
        <div id="chat-feed"></div>
        <div style="padding: 20px; background: #000; display: flex; gap: 12px; border-top: 1px solid #111;">
            <input type="text" id="chat-ipt-msg" placeholder="Escreva aqui..." style="background:#080808; border:1.5px solid #1a1a1a; padding:15px; border-radius:20px; color:#fff; flex:1; font-size:13px;">
            <button onclick="sendChatMessage()" style="background:var(--neon); border:none; border-radius:20px; padding:0 22px; font-weight:900; color:#000;">></button>
        </div>
    </div>

    <div class="creator-watermark">CÓDIGO FONTE POR RÔMULO | OMNI v7.0</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // ============================================================
    // LÓGICA CORE - DATABASE & SISTEMAS
    // ============================================================
    const fbConfig = {
        apiKey: "SUA_API_KEY",
        databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/",
        projectId: "gincanaescola-d4f8c"
    };
    if (!firebase.apps.length) firebase.initializeApp(fbConfig);
    const dbMaster = firebase.database();

    let myUser = null;
    let isRoot = false;

    // --- CÁLCULO DE TEMPO RELATIVO PRECISO ---
    function getTimeFormat(ts) {
        if(!ts) return "---";
        const d = Date.now() - ts;
        const s = Math.floor(d / 1000);
        const m = Math.floor(s / 60);
        const h = Math.floor(m / 60);
        const dia = Math.floor(h / 24);

        if (s < 45) return "AGORA";
        if (m < 60) return m + " MIN";
        if (h < 24) return h + " HRS";
        return dia + " DIAS";
    }

    // --- PERSISTÊNCIA E BOOT ---
    window.onload = () => {
        const savedData = localStorage.getItem('rank_omni_v7_session');
        if(savedData) {
            myUser = JSON.parse(savedData);
            launchSystem();
        }
    };

    function handleLogin() {
        const t = document.getElementById('ipt-turma').value.trim();
        const p = document.getElementById('ipt-pass').value;
        if(!t || !p) return alert("Erro: Campos obrigatórios vazios.");

        dbMaster.ref('ranking/' + t).once('value', snap => {
            const current = snap.val();
            if(current && current.pass !== p) return alert("Erro: Senha Root Inválida.");

            const dataObject = {
                turma: t, pass: p,
                serie: document.getElementById('ipt-serie').value || (current ? current.serie : "NI"),
                escola: document.getElementById('ipt-escola').value || (current ? current.escola : "NI"),
                insta: document.getElementById('ipt-insta').value || (current ? current.insta : "#"),
                aura: document.getElementById('ipt-aura').value,
                pontos: current ? current.pontos : 0,
                likes: current ? current.likes : 0,
                lastSeen: Date.now()
            };

            dbMaster.ref('ranking/' + t).update(dataObject).then(() => {
                myUser = dataObject;
                localStorage.setItem('rank_omni_v7_session', JSON.stringify(dataObject));
                launchSystem();
            });
        });
    }

    function launchSystem() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('ranking-view').classList.remove('hidden');
        document.getElementById('chat-omni').classList.remove('hidden');
        
        if(myUser.turma !== "Guest") {
            // HEARTBEAT (Online Status Update)
            setInterval(() => {
                dbMaster.ref('ranking/' + myUser.turma).update({ lastSeen: Date.now() });
            }, 15000);
        }
        syncRanking();
    }

    // --- SINCRONIZAÇÃO EM TEMPO REAL ---
    function syncRanking() {
        dbMaster.ref('ranking').on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const target = document.getElementById('ranking-list-render');
            const rankArray = Object.values(data).sort((a,b) => b.pontos - a.pontos);
            
            target.innerHTML = "";
            rankArray.forEach((item, i) => {
                const isOnline = (Date.now() - (item.lastSeen || 0)) < 45000;
                const relTime = getTimeFormat(item.lastSeen);
                const calcLvl = Math.floor((item.pontos || 0) / 10);

                // MEDALHAS DINÂMICAS
                let medalIcon = "";
                if(i === 0) medalIcon = `<span class="medal medal-gold">🥇</span>`;
                else if(i === 1) medalIcon = `<span class="medal">🥈</span>`;
                else if(i === 2) medalIcon = `<span class="medal">🥉</span>`;
                else medalIcon = `<span class="medal" style="font-size:14px; color:#333; font-weight:900;">#${i+1}</span>`;

                // ATUALIZA PERFIL DO USUÁRIO ATUAL
                if(myUser && item.turma === myUser.turma) {
                    document.getElementById('me-turma-name').innerText = item.turma;
                    document.getElementById('me-lvl-tag').innerText = "LVL " + calcLvl;
                    document.getElementById('me-xp-fill-bar').style.width = ((item.pontos % 10) * 10) + "%";
                }

                target.innerHTML += `
                    <div class="rank-row ${i === 0 ? 'row-top' : ''}">
                        <div style="flex:1; display:flex; align-items:center;">
                            ${medalIcon}
                            <div>
                                <div class="status-box">
                                    <span class="dot ${isOnline ? 'dot-online' : 'dot-offline'}"></span>
                                    <span class="status-txt ${isOnline ? 'txt-neon' : 'txt-danger'}">Online: ${relTime}</span>
                                </div>
                                <b style="font-size: 20px; display:block; letter-spacing:-1px;">${item.turma}</b>
                                <span style="font-size: 10px; color: #444; font-weight:900; text-transform:uppercase;">${item.escola}</span>
                                <br><a href="${item.insta}" target="_blank" class="insta-btn">INSTAGRAM</a>
                                <div style="margin-top: 15px;">
                                    <button class="adm-small-btn" style="background:rgba(255,255,255,0.03); border:1px solid #1a1a1a; color:#fff;" onclick="giveLove('${item.turma}')">🔥 ${item.likes || 0}</button>
                                </div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 32px; font-weight: 900; color: var(--ouro); line-height:0.8;">${item.pontos || 0}</div>
                            <div style="font-size: 10px; color: #222; font-weight:900; letter-spacing:1px; margin-top:5px;">PONTOS</div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- TERMINAL ROOT (ADMIN) ---
    function showAdminAccess() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('admin-auth-screen').classList.remove('hidden');
    }

    function authenticateRoot() {
        const u = document.getElementById('root-user').value;
        const p = document.getElementById('root-pass').value;
        // CREDENCIAIS DE ADMIN PADRÃO
        if(u === "admin" && p === "admin123") {
            isRoot = true;
            document.getElementById('admin-auth-screen').classList.add('hidden');
            document.getElementById('admin-panel-view').classList.remove('hidden');
            renderAdminTools();
        } else {
            alert("ERRO DE AUTENTICAÇÃO: ACESSO NEGADO.");
        }
    }

    function renderAdminTools() {
        dbMaster.ref('ranking').on('value', snap => {
            const area = document.getElementById('admin-accounts-list');
            area.innerHTML = "";
            const users = snap.val();
            if(!users) return;

            Object.values(users).forEach(acc => {
                area.innerHTML += `
                    <div class="adm-tool-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b style="color:var(--neon); font-size:20px; letter-spacing:-1px;">${acc.turma}</b>
                            <span style="font-size:10px; color:#444;">ID: ${acc.pass}</span>
                        </div>
                        <p style="font-size:10px; color:#555; margin: 5px 0;">Escola: ${acc.escola} | Pontos: ${acc.pontos}</p>
                        
                        <div class="adm-grid-tools">
                            <button class="adm-small-btn" style="background:var(--neon); color:#000;" onclick="modPts('${acc.turma}', 1)">+1 PT</button>
                            <button class="adm-small-btn" style="background:var(--sky); color:#000;" onclick="modPts('${acc.turma}', 10)">+10 PTS</button>
                            <button class="adm-small-btn" style="background:#222; color:#fff;" onclick="modPts('${acc.turma}', -1)">-1 PT</button>
                            <button class="adm-small-btn" style="background:#222; color:#fff;" onclick="modPts('${acc.turma}', -10)">-10 PTS</button>
                            <button class="adm-small-btn" style="background:var(--ouro); color:#000; grid-column: span 2;" onclick="resetAccLikes('${acc.turma}')">ZERAR LIKES</button>
                            <button class="adm-small-btn" style="background:var(--danger); color:#fff; grid-column: span 2;" onclick="deleteAccount('${acc.turma}')">BANIR CONTA E DELETAR DADOS</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- FUNÇÕES DE ADMINISTRAÇÃO ---
    function modPts(t, v) { dbMaster.ref('ranking/' + t + '/pontos').transaction(c => (c || 0) + v); }
    function resetAccLikes(t) { dbMaster.ref('ranking/' + t + '/likes').set(0); }
    function deleteAccount(t) { if(confirm("ALERTA: Deseja deletar permanentemente a conta de "+t+"?")) dbMaster.ref('ranking/'+t).remove(); }
    function clearAllChat() { if(confirm("Deseja apagar TODO o histórico de conversas?")) dbMaster.ref('omni_chat').remove(); }

    // --- SISTEMA DE CHAT OMNI ---
    function sendChatMessage() {
        const inputMsg = document.getElementById('chat-ipt-msg');
        if(!inputMsg.value || !myUser) return;
        dbMaster.ref('omni_chat').push({ u: myUser.turma, t: inputMsg.value });
        inputMsg.value = "";
    }

    dbMaster.ref('omni_chat').limitToLast(30).on('value', snap => {
        const box = document.getElementById('chat-feed');
        box.innerHTML = "";
        snap.forEach(m => {
            box.innerHTML += `<div class="msg-line"><b>${m.val().u}:</b> ${m.val().t}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    // --- UTILITÁRIOS ---
    function giveLove(t) { dbMaster.ref('ranking/' + t + '/likes').transaction(c => (c || 0) + 1); }
    function enterAsGuest() { myUser = { turma: "Guest" }; launchSystem(); }
    function destroySession() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
