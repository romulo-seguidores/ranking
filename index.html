<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe - Elite Regional</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body { margin: 0; background: #020202; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; overflow-x: hidden; }
        #app { width: 100%; max-width: 420px; padding: 20px; min-height: 100vh; position: relative; }

        .glass, .glass-large { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 25px; text-align: center; margin-top: 20px; 
        }

        /* STATUS ONLINE */
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .offline { background: #ff4444; }

        /* ANIMAÇÃO LOGIN */
        .text-anim-crown {
            font-size: 13px; color: #ffd700; font-weight: bold; margin-bottom: 20px;
            display: block; text-transform: uppercase;
            animation: crownFloat 2s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        @keyframes crownFloat {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-3px); opacity: 0.7; }
        }

        /* CARROSSEL COMPACTO */
        .regional-box { 
            background: linear-gradient(180deg, rgba(255,215,0,0.1) 0%, rgba(0,0,0,1) 100%); 
            border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 8px 15px; margin-bottom: 25px; 
            position: relative; height: 50px; overflow: hidden; display: flex; flex-direction: column; justify-content: center;
            text-align: left;
        }
        .regional-box .label { font-size: 8px; color: #ffd700; font-weight: bold; letter-spacing: 1px; margin-bottom: 2px; opacity: 0.7; }
        
        #carousel-container { position: relative; height: 25px; }
        .rank-slide {
            position: absolute; width: 100%; left: 0; font-size: 0.95rem; font-weight: 800;
            opacity: 0; transform: translateX(10px); transition: 0.5s ease-in-out;
            text-transform: uppercase;
        }
        .rank-slide.active { opacity: 1; transform: translateX(0); }

        /* PODERES */
        .power-fogo { color: #ff4d00; text-shadow: 0 0 10px #ff4d00; }
        .power-gelo { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .power-floresta { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .power-vazio { color: #a855f7; text-shadow: 0 0 15px #6b21a8; }
        .power-eletrico { color: #eab308; text-shadow: 0 0 10px #eab308; }

        /* LISTA RANKING */
        .rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .escola-info { font-size: 9px; color: #666; }

        /* INPUTS E BOTÕES */
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: white; box-sizing: border-box; font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(90deg, #00ff88, #00d4ff); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; margin-top: 10px; }
        .btn-sec { background: none; border: 1px solid #333; color: #888; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px; cursor: pointer; }

        /* REAÇÕES (LIKE/DISLIKE) */
        .reaction-bar { display: flex; gap: 8px; margin-top: 5px; }
        .btn-reaction { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 10px; padding: 3px 7px; border-radius: 6px; cursor: pointer; }

        /* CHAT */
        #chat-container { 
            position: fixed; bottom: 20px; right: 10px; width: 160px; height: 220px; 
            background: rgba(10,10,10,0.95); border: 1px solid #222; border-radius: 15px; 
            display: flex; flex-direction: column; z-index: 999; backdrop-filter: blur(10px);
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 8px; font-size: 10px; display: flex; flex-direction: column; }
        #chat-input-box { display: flex; border-top: 1px solid #222; padding: 5px; }
        #chat-input-box input { margin: 0; padding: 6px; font-size: 10px; border-radius: 8px; }

        /* ASSINATURA */
        .criador-tag { position: fixed; bottom: 10px; left: 15px; color: #00ff88; font-weight: bold; font-size: 11px; text-shadow: 0 0 5px #00ff88; z-index: 1000; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <section id="auth-screen" class="glass">
            <h1 class="logo">RANK<span>CLASSE</span></h1>
            <span class="text-anim-crown">👑 ROUBE A COROA DAS TURMAS E SEJA A MELHOR!</span>
            <div class="input-group">
                <input type="text" id="reg-turma" placeholder="Nome da Turma">
                <input type="text" id="reg-serie" placeholder="Série/Ano">
                <input type="text" id="reg-escola" placeholder="Nome da Escola">
                <input type="url" id="reg-insta" placeholder="Link do Instagram">
                <input type="password" id="reg-pass" placeholder="Senha">
                <select id="reg-power">
                    <option value="power-fogo">🔥 Vermelho Fogo</option>
                    <option value="power-gelo">❄️ Azul Gelo</option>
                    <option value="power-floresta">🌿 Verde Floresta</option>
                    <option value="power-vazio">🌑 Roxo Vazio</option>
                    <option value="power-eletrico">⚡ Amarelo Elétrico</option>
                </select>
                <button onclick="logarOuCadastrar()" class="btn-main">ENTRAR NO RANKING</button>
                <button onclick="entrarComoVisitante()" class="btn-sec" style="color: #00ff88; border-color: #00ff88;">VER TURMAS (SEM CONTA)</button>
            </div>
            <button onclick="mostrarLoginAdmin()" style="background:none; border:none; color:#181818; font-size:10px; margin-top:20px; cursor:pointer;">SISTEMA CENTRAL</button>
        </section>

        <section id="rank-screen" class="hidden glass-large">
            <div class="regional-box">
                <div class="label">TOP REGIONAL</div>
                <div id="carousel-container"></div>
            </div>
            <div id="lista-ranking"></div>
            <button onclick="sairDaConta()" class="btn-sec">SAIR DA CONTA</button>
        </section>

        <div id="chat-container" class="hidden">
            <div id="chat-messages"></div>
            <div id="chat-input-box">
                <input type="text" id="msg-input" placeholder="Chat...">
                <button onclick="enviarMensagem()" style="background:#00ff88; border:none; border-radius:5px; margin-left:3px; padding:0 8px; cursor:pointer">></button>
            </div>
        </div>

        <div class="criador-tag">Criado por Rômulo</div>

        <section id="admin-login-screen" class="hidden glass">
            <h2>Admin</h2>
            <input type="text" id="admin-user" placeholder="Usuário">
            <input type="password" id="admin-pass" placeholder="Senha">
            <button onclick="loginAdmin()" class="btn-main">CONECTAR</button>
            <button onclick="voltar()" class="btn-sec">VOLTAR</button>
        </section>

        <section id="admin-panel" class="hidden glass-large">
            <h2>🛠 Lançamento</h2>
            <div id="lista-admin"></div>
            <button onclick="voltar()" class="btn-sec">FECHAR</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/",
            projectId: "gincanaescola-d4f8c",
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logadoComo = null;
        let slideIndex = 0;
        let eVisitante = false;

        window.onload = () => {
            const salvo = JSON.parse(localStorage.getItem('rank_user'));
            if(salvo) {
                document.getElementById('reg-turma').value = salvo.turma || '';
                document.getElementById('reg-serie').value = salvo.serie || '';
                document.getElementById('reg-escola').value = salvo.escola || '';
                document.getElementById('reg-insta').value = salvo.insta || '';
                document.getElementById('reg-pass').value = salvo.pass || '';
                document.getElementById('reg-power').value = salvo.power || 'power-fogo';
            }
        };

        function entrarComoVisitante() {
            eVisitante = true;
            logadoComo = "Visitante";
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
        }

        function logarOuCadastrar() {
            const t = document.getElementById('reg-turma').value.trim();
            const s = document.getElementById('reg-serie').value.trim();
            const e = document.getElementById('reg-escola').value.trim();
            const i = document.getElementById('reg-insta').value.trim();
            const p = document.getElementById('reg-pass').value;
            const pw = document.getElementById('reg-power').value;

            if (!t || !s || !e || !i || !p) return alert("⚠️ ERRO: Preencha todos os campos!");
            
            eVisitante = false;
            const dadosSalvar = { turma: t, pass: p, serie: s, escola: e, insta: i, power: pw };
            localStorage.setItem('rank_user', JSON.stringify(dadosSalvar));

            database.ref('ranking/' + t).once('value').then((snap) => {
                if (snap.exists()) {
                    if (snap.val().pass === p) database.ref('ranking/'+t).update(dadosSalvar).then(() => entrarNoSistema(snap.val()));
                    else alert("Senha incorreta!");
                } else {
                    const nova = { ...dadosSalvar, seguidores: 0, videos: 0, pontos: 0, online: true, likes: 0, dislikes: 0 };
                    database.ref('ranking/' + t).set(nova).then(() => entrarNoSistema(nova));
                }
            });
        }

        function entrarNoSistema(dados) {
            logadoComo = dados.turma;
            database.ref('ranking/' + logadoComo).update({ online: true });
            database.ref('ranking/' + logadoComo).onDisconnect().update({ online: false });
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
        }

        database.ref('ranking').on('value', (snap) => {
            const lista = document.getElementById('lista-ranking');
            const carrossel = document.getElementById('carousel-container');
            const dadosBD = snap.val();
            if (!dadosBD) return;

            let array = Object.keys(dadosBD).map(id => dadosBD[id]).filter(t => t.turma).sort((a,b) => (b.pontos || 0) - (a.pontos || 0));

            // Carrossel Original
            carrossel.innerHTML = "";
            [0,1,2].forEach(i => {
                if(array[i]) {
                    const crown = i === 0 ? "👑 " : "";
                    carrossel.innerHTML += `<div class="rank-slide ${array[i].power}">${crown}${i+1} ${array[i].turma}</div>`;
                }
            });
            iniciarCarrossel();

            // Lista Original + Reações
            lista.innerHTML = "";
            array.forEach((t, i) => {
                let medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🔹";
                lista.innerHTML += `
                <div class="rank-card">
                    <div style="text-align:left">
                        <span class="status-dot ${t.online?'online':'offline'}"></span>
                        <span class="${t.power}" style="font-weight:bold">${t.turma}</span><br>
                        <small class="escola-info">${t.escola}</small>
                        <div class="reaction-bar">
                            <button class="btn-reaction" onclick="reagir('${t.turma}', 'likes')">👍 ${t.likes || 0}</button>
                            <button class="btn-reaction" onclick="reagir('${t.turma}', 'dislikes')">👎 ${t.dislikes || 0}</button>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <span style="color:#ffd700; font-weight:bold;">${medal} ${t.pontos || 0} pts</span>
                    </div>
                </div>`;
            });
        });

        function reagir(turma, tipo) {
            database.ref(`ranking/${turma}/${tipo}`).transaction(c => (c || 0) + 1);
        }

        // CHAT PERMANENTE
        function enviarMensagem() {
            if(eVisitante) return alert("Visitantes não podem enviar mensagens!");
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            database.ref('mensagens_chat').push({
                user: logadoComo,
                text: inp.value,
                timestamp: Date.now()
            });
            inp.value = "";
        }

        database.ref('mensagens_chat').limitToLast(20).on('value', snap => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.val();
                box.innerHTML += `<div><b style="color:#00ff88">${m.user}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        function iniciarCarrossel() {
            const slides = document.querySelectorAll('.rank-slide');
            if(slides.length === 0) return;
            slides.forEach(s => s.classList.remove('active'));
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
            if(window.carrosselTimer) clearTimeout(window.carrosselTimer);
            window.carrosselTimer = setTimeout(iniciarCarrossel, 3000);
        }

        function sairDaConta() { location.reload(); }
        function mostrarLoginAdmin() { document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('admin-login-screen').classList.remove('hidden'); }
        function voltar() { location.reload(); }

        // Mantenha suas funções de Admin abaixo aqui...
        function loginAdmin() {
            if (document.getElementById('admin-user').value === "admin" && document.getElementById('admin-pass').value === "admin123") {
                document.getElementById('admin-login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                carregarPainelAdmin();
            }
        }
    </script>
</body>
</html>
