<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe - Elite Regional</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap');

        /* CONFIGURAÇÕES GERAIS */
        :root {
            --ouro: #ffd700;
            --prata: #c0c0c0;
            --bronze: #cd7f32;
            --neon: #00ff88;
        }

        body { 
            margin: 0; 
            background: #020202; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            overflow-x: hidden; 
        }

        #app { 
            width: 100%; 
            max-width: 420px; 
            padding: 20px; 
            min-height: 100vh; 
            position: relative; 
        }

        /* EFEITOS GLASS */
        .glass, .glass-large { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 35px; 
            padding: 25px; 
            text-align: center; 
            margin-top: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* HEADER DO USUÁRIO */
        .header-user { 
            text-align: left; 
            margin-bottom: 25px; 
            padding: 18px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 22px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .header-user h2 { font-size: 15px; margin: 0; color: var(--neon); text-transform: uppercase; }
        .lvl-badge-top { 
            font-size: 11px; 
            background: var(--ouro); 
            color: black; 
            padding: 3px 10px; 
            border-radius: 12px; 
            font-weight: 800; 
            margin-top: 8px; 
            display: inline-block; 
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .xp-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--ouro); width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* STATUS CORES (PEDIDO) */
        .status-label { font-size: 9px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .st-online { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        .st-offline { color: #ff4444; text-shadow: 0 0 8px #ff4444; }

        /* MEDALHAS */
        .medal { font-size: 22px; margin-right: 8px; vertical-align: middle; }
        .m-ouro { color: var(--ouro); text-shadow: 0 0 15px var(--ouro); }
        .m-prata { color: var(--prata); text-shadow: 0 0 15px var(--prata); }
        .m-bronze { color: var(--bronze); text-shadow: 0 0 15px var(--bronze); }

        /* CARROSSEL */
        .regional-box { 
            background: linear-gradient(180deg, rgba(255,215,0,0.05) 0%, rgba(0,0,0,1) 100%); 
            border: 1px solid rgba(255,215,0,0.2); 
            border-radius: 25px; 
            padding: 12px 20px; 
            margin-bottom: 30px; 
            position: relative; 
            height: 55px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        .rank-slide { position: absolute; width: 100%; opacity: 0; transition: 0.6s; text-transform: uppercase; font-weight: 800; font-size: 15px; left: 0; text-align: center; }
        .rank-slide.active { opacity: 1; transform: scale(1.05); }

        /* CARD DE RANKING */
        .rank-card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.04); 
            padding: 20px; 
            border-radius: 25px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.4s; 
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .rank-card.top1 { border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(255, 215, 0, 0.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }

        /* ELEMENTOS */
        .power-fogo { color: #ff4d00; text-shadow: 0 0 10px #ff4d00; }
        .power-gelo { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .power-floresta { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .power-vazio { color: #a855f7; text-shadow: 0 0 15px #6b21a8; }
        .power-eletrico { color: #eab308; text-shadow: 0 0 10px #eab308; }

        /* BOTÕES E INPUTS */
        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.07); 
            color: white; box-sizing: border-box; font-family: 'Poppins'; outline: none;
        }
        .btn-main { 
            width: 100%; padding: 18px; background: linear-gradient(135deg, #00ff88, #00d4ff); 
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer; color: black; margin-bottom: 12px; transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.3); }

        /* INSTAGRAM MENOR (PEDIDO) */
        .insta-btn-link { 
            display: inline-block; background: rgba(255,255,255,0.05); color: #888; 
            padding: 4px 10px; border-radius: 8px; font-size: 9px; text-decoration: none; 
            font-weight: bold; margin-top: 6px; border: 1px solid rgba(255,255,255,0.1);
        }

        .reaction-bar { display: flex; gap: 8px; margin-top: 12px; }
        .btn-reaction { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); 
            color: white; padding: 6px 12px; border-radius: 12px; font-size: 11px; cursor: pointer;
        }

        /* CHAT */
        #chat-container { 
            position: fixed; bottom: 25px; right: 15px; width: 180px; height: 250px; 
            background: rgba(10,10,10,0.98); border: 1px solid #222; border-radius: 20px; 
            display: flex; flex-direction: column; z-index: 999; box-shadow: 0 15px 40px rgba(0,0,0,0.8); 
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 10px; scroll-behavior: smooth; }
        .msg-line { margin-bottom: 6px; animation: fadeIn 0.3s; }

        /* ADMIN */
        .admin-card { background: #0a0a0a; padding: 20px; border-radius: 25px; border: 1px solid #222; margin-bottom: 20px; text-align: left; position: relative; }
        .btn-del-account { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; }

        .hidden { display: none !important; }
        .criador-tag { position: fixed; bottom: 12px; left: 20px; color: rgba(255,255,255,0.2); font-size: 9px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app">
        <div id="level-up-modal" class="hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 2px solid var(--ouro); padding: 40px; border-radius: 35px; z-index: 2000; text-align: center; box-shadow: 0 0 100px rgba(255,215,0,0.4);">
            <h1 style="color:var(--ouro); margin:0; font-size: 30px;">UP!</h1>
            <p id="level-up-msg" style="margin: 20px 0; font-size: 16px; line-height: 1.6;"></p>
            <button onclick="document.getElementById('level-up-modal').classList.add('hidden')" class="btn-main">CONTINUAR JORNADA</button>
        </div>

        <section id="auth-screen" class="glass">
            <h1 style="font-size: 32px; letter-spacing: -2px; margin-bottom: 5px;">RANK<span style="color:var(--neon)">CLASSE</span></h1>
            <p style="font-size: 11px; color: #666; margin-bottom: 25px;">SISTEMA DE COMPETIÇÃO REGIONAL</p>
            <div id="cadastro-form">
                <input type="text" id="reg-turma" placeholder="Nome da sua Turma">
                <input type="text" id="reg-serie" placeholder="Série e Turma (Ex: 2º B)">
                <input type="text" id="reg-escola" placeholder="Instituição/Escola">
                <input type="url" id="reg-insta" placeholder="Link do Instagram">
                <input type="password" id="reg-pass" placeholder="Senha da Turma">
                <select id="reg-power">
                    <option value="power-fogo">🔥 FOGO</option>
                    <option value="power-gelo">❄️ GELO</option>
                    <option value="power-floresta">🌿 FLORESTA</option>
                    <option value="power-vazio">🌑 VAZIO</option>
                    <option value="power-eletrico">⚡ ELÉTRICO</option>
                </select>
                <button onclick="logarOuCadastrar()" class="btn-main">ENTRAR NO RANKING</button>
                <button onclick="entrarComoVisitante()" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 15px; color: #888; font-weight: bold; cursor: pointer;">APENAS OBSERVAR</button>
            </div>
            <button onclick="mostrarLoginAdmin()" style="background:none; border:none; color:#1a1a1a; font-size:10px; margin-top:30px; cursor:pointer;">ACESSO RESTRITO</button>
        </section>

        <section id="rank-screen" class="hidden glass-large">
            <div class="header-user">
                <h2 id="welcome-text">Sincronizando...</h2>
                <div id="user-stats-ui" class="hidden">
                    <span class="lvl-badge-top" id="top-lvl-display">LVL 0</span>
                    <div class="xp-bar-bg"><div class="xp-bar-fill" id="top-xp-fill"></div></div>
                </div>
            </div>
            <div class="regional-box"><div id="carousel-container"></div></div>
            <div id="lista-ranking"></div>
            <button onclick="location.reload()" class="btn-main" style="background:#151515; color:#555; margin-top:25px; border: 1px solid #222;">DESCONECTAR</button>
        </section>

        <div id="chat-container" class="hidden">
            <div id="chat-messages"></div>
            <div id="chat-input-box" style="display:flex; padding:8px; border-top:1px solid #222; background: #050505; border-radius: 0 0 20px 20px;">
                <input type="text" id="msg-input" placeholder="Diga algo..." style="font-size:11px; margin:0; padding:10px; background:none; border:none;">
                <button onclick="enviarMensagem()" style="background:var(--neon); border:none; padding:0 12px; border-radius:10px; color:black; font-weight:bold;">></button>
            </div>
        </div>

        <div class="criador-tag">SYSTEM BY RÔMULO</div>

        <section id="admin-panel" class="hidden glass-large">
            <h2 style="color: var(--neon); margin-bottom: 25px;">SISTEMA DE CONTROLE</h2>
            <button onclick="limparChat()" style="background: #ff4444; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 25px; font-weight:bold;">🧹 RESETAR CHAT</button>
            <div id="lista-admin"></div>
            <button onclick="location.reload()" class="btn-main" style="background:#111; color:white;">FECHAR SISTEMA</button>
        </section>

        <section id="admin-login-screen" class="hidden glass">
            <h3>PAINEL DE SEGURANÇA</h3>
            <input type="text" id="admin-user" placeholder="Usuário Root">
            <input type="password" id="admin-pass" placeholder="Master Password">
            <button onclick="loginAdmin()" class="btn-main">VALIDAR ACESSO</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; cursor:pointer;">Cancelar</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/", projectId: "gincanaescola-d4f8c" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logadoComo = null;
        let ehVisitante = false;
        let lastLevel = 0;
        let slideIndex = 0;

        // LÓGICA DE ACESSO
        function logarOuCadastrar() {
            const t = document.getElementById('reg-turma').value.trim();
            const p = document.getElementById('reg-pass').value;
            if(!t || !p) return alert("Erro: Turma e Senha obrigatórios!");

            database.ref('ranking/' + t).once('value', snap => {
                const d = snap.val();
                if(d && d.pass !== p) return alert("Erro: Senha inválida.");

                const finalData = {
                    turma: t, pass: p,
                    serie: document.getElementById('reg-serie').value,
                    escola: document.getElementById('reg-escola').value,
                    insta: document.getElementById('reg-insta').value,
                    power: document.getElementById('reg-power').value,
                    pontos: d?.pontos || 0,
                    likes: d?.likes || 0,
                    dislikes: d?.dislikes || 0,
                    online: true,
                    lastSeen: Date.now()
                };

                database.ref('ranking/' + t).update(finalData).then(() => {
                    logadoComo = t;
                    ativarApp();
                });
            });
        }

        function entrarComoVisitante() {
            ehVisitante = true;
            logadoComo = "Visitante";
            ativarApp();
        }

        function ativarApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            if(!ehVisitante) {
                document.getElementById('user-stats-ui').classList.remove('hidden');
                database.ref('ranking/' + logadoComo).onDisconnect().update({ online: false, lastSeen: Date.now() });
                setInterval(() => { database.ref('ranking/' + logadoComo).update({ online: true, lastSeen: Date.now() }); }, 10000);
            }
        }

        // LÓGICA DE TEMPO RELATIVO (PEDIDO)
        function formatarStatus(item) {
            const diff = Date.now() - (item.lastSeen || 0);
            const m = Math.floor(diff / 60000);
            if (item.online && diff < 30000) return `<span class="status-label st-online">● ONLINE AGORA</span>`;
            const label = m < 1 ? "AGORA" : m + "MIN";
            return `<span class="status-label st-offline">● ONLINE A ${label}</span>`;
        }

        // ATUALIZAÇÃO DO RANKING
        database.ref('ranking').on('value', snap => {
            const data = snap.val(); if(!data) return;
            const container = document.getElementById('lista-ranking');
            const carrossel = document.getElementById('carousel-container');
            const rankArray = Object.values(data).filter(item => item && item.turma).sort((a,b) => b.pontos - a.pontos);
            
            // Carrossel
            carrossel.innerHTML = "";
            rankArray.slice(0, 3).forEach((item, i) => {
                const icons = ['🥇','🥈','🥉'];
                carrossel.innerHTML += `<div class="rank-slide ${item.power}">${icons[i]} ${item.turma}</div>`;
            });
            startCarousel();

            // Lista
            container.innerHTML = "";
            rankArray.forEach((item, i) => {
                const currentLvl = Math.floor((item.pontos || 0) / 10);
                let medalhaHtml = i < 3 ? `<span class="medal m-${['ouro','prata','bronze'][i]}">${['🥇','🥈','🥉'][i]}</span>` : `<span style="margin-right:15px; color:#333; font-weight:800">${i+1}</span>`;
                let cardClass = i === 0 ? "rank-card top1" : "rank-card";

                if(item.turma === logadoComo) {
                    document.getElementById('welcome-text').innerText = "OLÁ, " + item.turma;
                    document.getElementById('top-lvl-display').innerText = "LVL " + currentLvl;
                    document.getElementById('top-xp-fill').style.width = ((item.pontos % 10) * 10) + "%";
                    if(currentLvl > lastLevel && lastLevel !== 0) {
                        document.getElementById('level-up-msg').innerHTML = `Sua turma alcançou o <b>Level ${currentLvl}</b>!`;
                        document.getElementById('level-up-modal').classList.remove('hidden');
                    }
                    lastLevel = currentLvl;
                }

                container.innerHTML += `
                <div class="${cardClass}">
                    <div style="text-align:left">
                        ${formatarStatus(item)}
                        ${medalhaHtml}
                        <b class="${item.power}" style="font-size:16px">${item.turma}</b><br>
                        <span style="font-size:10px; color:#555; display:block; margin:2px 0;">
                            ${item.escola || 'Escola'} • ${item.serie || 'Série'}
                        </span>
                        <a href="${item.insta}" target="_blank" class="insta-btn-link">INSTAGRAM</a>
                        <div class="reaction-bar">
                            <button class="btn-reaction" onclick="votar('${item.turma}', 'like')">🔥 ${item.likes || 0}</button>
                            <button class="btn-reaction" onclick="votar('${item.turma}', 'dislike')">❄️ ${item.dislikes || 0}</button>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:20px; font-weight:900; color:var(--ouro)">${item.pontos || 0}</div>
                        <div style="font-size:9px; color:#444;">PTS | LVL ${currentLvl}</div>
                    </div>
                </div>`;
            });
        });

        // REAÇÕES (LIBERADO PARA VISITANTES)
        function votar(id, type) {
            const key = 'voto_v5_sys_' + id;
            if(localStorage.getItem(key) === type) return;

            database.ref('ranking/' + id).transaction(node => {
                if(node) {
                    const old = localStorage.getItem(key);
                    if(old) {
                        const field = old === 'like' ? 'likes' : 'dislikes';
                        node[field] = Math.max(0, (node[field] || 0) - 1);
                    }
                    const field = type === 'like' ? 'likes' : 'dislikes';
                    node[field] = (node[field] || 0) + 1;
                }
                return node;
            });
            localStorage.setItem(key, type);
        }

        // ADMINISTRAÇÃO
        function loginAdmin() { 
            if(document.getElementById('admin-user').value === "admin" && document.getElementById('admin-pass').value === "admin123") {
                document.getElementById('admin-login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                carregarPainelAdmin();
            } else alert("Acesso negado.");
        }

        function carregarPainelAdmin() {
            database.ref('ranking').on('value', snap => {
                const list = document.getElementById('lista-admin'); list.innerHTML = "";
                Object.values(snap.val()).forEach(t => {
                    list.innerHTML += `<div class="admin-card">
                        <button class="btn-del-account" onclick="database.ref('ranking/${t.turma}').remove()">APAGAR</button>
                        <b>${t.turma}</b><br>
                        <input type="number" id="adm-p-${t.turma}" value="${t.pontos || 0}" style="padding:8px; width:80px;">
                        <button onclick="database.ref('ranking/${t.turma}').update({pontos: parseInt(document.getElementById('adm-p-${t.turma}').value)})" class="btn-main" style="width:auto; padding:8px 15px; font-size:10px;">SALVAR</button>
                    </div>`;
                });
            });
        }

        // UTILITÁRIOS
        function startCarousel() {
            const items = document.querySelectorAll('.rank-slide'); if(!items.length) return;
            items.forEach(el => el.classList.remove('active'));
            slideIndex = (slideIndex + 1) % items.length; 
            items[slideIndex].classList.add('active');
            if(window.carTimer) clearTimeout(window.carTimer); 
            window.carTimer = setTimeout(startCarousel, 3500);
        }

        function enviarMensagem() {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || !logadoComo) return;
            database.ref('mensagens_chat').push({ user: logadoComo, text: input.value });
            input.value = "";
        }

        database.ref('mensagens_chat').limitToLast(25).on('value', snap => {
            const box = document.getElementById('chat-messages'); box.innerHTML = "";
            snap.forEach(msg => { box.innerHTML += `<div class="msg-line"><b style="color:var(--neon)">${msg.val().user}:</b> ${msg.val().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });

        function mostrarLoginAdmin() { document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('admin-login-screen').classList.remove('hidden'); }
        function limparChat() { if(confirm("Zerar chat?")) database.ref('mensagens_chat').remove(); }
    </script>
</body>
</html>
