<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Batalha da Casa Branca</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --primary: #ff2a5f;
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        #app { width: 100%; max-width: 400px; padding: 20px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { text-align: center; font-weight: 900; font-size: 28px; text-transform: uppercase; margin-bottom: 5px; line-height: 1.1; }
        h1 span { color: var(--primary); }
        .subtitle { text-align: center; font-size: 11px; color: #888; margin-bottom: 30px; letter-spacing: 1px; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px;
            border: 1px solid #222; background: #111; color: white; font-size: 14px; outline: none;
            transition: 0.3s; text-align: center;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255, 42, 95, 0.2); }

        .btn-glow {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--primary); color: white;
            font-weight: 900; font-size: 16px; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(255, 42, 95, 0.4);
            margin-bottom: 10px;
        }
        
        .btn-outline {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444;
            background: transparent; color: white; font-weight: 700;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        .code-display {
            background: #000; border: 1px solid var(--primary);
            padding: 10px; text-align: center; border-radius: 10px;
            margin-bottom: 20px; color: var(--primary); font-weight: 900; font-size: 24px;
        }

        .hidden { display: none !important; }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 350px; }
        .toast {
            background: rgba(20, 20, 20, 0.95); border-left: 4px solid var(--primary);
            padding: 15px; border-radius: 10px; color: white; font-size: 12px; font-weight: 700;
            margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: slideDown 0.3s forwards;
        }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .admin-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="app">
        <section id="login-view" class="glass-panel">
            <h1>CASA <span>BRANCA</span></h1>
            <p class="subtitle">SISTEMA DE ACESSO</p>
            <input type="text" id="login-nome" placeholder="Digite seu Vulgo">
            <div style="text-align: center;">
                <p style="font-size: 10px; color: #666; margin-bottom: 5px;">CÓDIGO GERADO:</p>
                <div class="code-display" id="main-code-display">---</div>
            </div>
            <button onclick="fazerLogin()" class="btn-glow">ENTRAR</button>
            <p onclick="abrirAdmin()" style="text-align: center; font-size: 10px; margin-top: 30px; color: #333; cursor: pointer;">PAINEL ORGANIZAÇÃO</p>
        </section>

        <section id="choice-view" class="glass-panel hidden">
            <h1>SALVE, <span id="user-greeting">MC</span></h1>
            <p class="subtitle">QUAL O MODO DE HOJE?</p>
            <button onclick="mudarTela('form-1x1-view')" class="btn-glow">1x1 SANGUE</button>
            <button onclick="mudarTela('form-2x2-view')" class="btn-outline">2x2 DUPLA</button>
        </section>

        <section id="form-1x1-view" class="glass-panel hidden">
            <h1>MODO <span>1x1</span></h1>
            <input type="tel" id="tel-1x1" placeholder="Seu WhatsApp">
            <p style="font-size: 10px; color: var(--primary); text-align: center; margin-bottom: 5px;">REPETIR CÓDIGO GERADO:</p>
            <input type="number" id="confirm-code-1x1" placeholder="3 dígitos">
            <button onclick="finalizar(1)" class="btn-glow">CONFIRMAR INSCRIÇÃO</button>
            <button onclick="mudarTela('choice-view')" class="btn-outline" style="border:none;">VOLTAR</button>
        </section>

        <section id="form-2x2-view" class="glass-panel hidden">
            <h1>MODO <span>2x2</span></h1>
            <input type="text" id="vulgo2-2x2" placeholder="Vulgo do Parceiro">
            <input type="tel" id="tel-2x2" placeholder="WhatsApp Contato">
            <p style="font-size: 10px; color: var(--primary); text-align: center; margin-bottom: 5px;">REPETIR CÓDIGO GERADO:</p>
            <input type="number" id="confirm-code-2x2" placeholder="3 dígitos">
            <button onclick="finalizar(2)" class="btn-glow">CONFIRMAR DUPLA</button>
            <button onclick="mudarTela('choice-view')" class="btn-outline" style="border:none;">VOLTAR</button>
        </section>

        <section id="success-view" class="glass-panel hidden" style="text-align: center;">
            <h1 style="color: #00ff88;">PRONTO!</h1>
            <p style="margin: 20px 0; color: #ccc;">Sua inscrição foi enviada para o telão!</p>
            <button onclick="location.reload()" class="btn-glow">NOVA INSCRIÇÃO</button>
        </section>

        <section id="admin-view" class="glass-panel hidden">
            <h1>INSCRITOS <span>TOTAL</span></h1>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="filtrarAdmin('1x1')" class="btn-glow" style="padding: 10px; font-size: 12px;">1x1</button>
                <button onclick="filtrarAdmin('2x2')" class="btn-outline" style="padding: 10px; font-size: 12px;">2x2</button>
            </div>
            <div id="lista-admin" style="max-height: 350px; overflow-y: auto;"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:red; width:100%; margin-top:20px;">FECHAR</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIGURAÇÃO IDENTICA AO RANKCLASE
        const config = { databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const database = firebase.database();

        let codigoGerado = "";
        let mcPrincipal = "";

        window.onload = () => {
            codigoGerado = String(Math.floor(Math.random() * 899) + 100);
            document.getElementById('main-code-display').innerText = codigoGerado;
        };

        function showNotify(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.innerHTML = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function mudarTela(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function fazerLogin() {
            mcPrincipal = document.getElementById('login-nome').value.trim();
            if(!mcPrincipal) return showNotify("⚠️ Digite seu vulgo!");
            document.getElementById('user-greeting').innerText = mcPrincipal.toUpperCase();
            mudarTela('choice-view');
        }

        function finalizar(modo) {
            const inputCod = document.getElementById('confirm-code-' + (modo === 1 ? '1x1' : '2x2')).value;
            if(inputCod !== codigoGerado) return showNotify("⚠️ O código deve ser " + codigoGerado);

            let dados = {
                mc: mcPrincipal,
                id: codigoGerado,
                timestamp: new Date().getTime()
            };

            if(modo === 1) {
                dados.zap = document.getElementById('tel-1x1').value;
            } else {
                dados.parceiro = document.getElementById('vulgo2-2x2').value;
                dados.zap = document.getElementById('tel-2x2').value;
            }

            // FUNÇÃO DE SALVAR ESTILO RANKCLASE
            const pasta = modo === 1 ? '1x1' : '2x2';
            database.ref('casabranca_inscricoes/' + pasta + '/' + codigoGerado).set(dados, (error) => {
                if (error) {
                    showNotify("❌ Erro de Permissão!");
                } else {
                    mudarTela('success-view');
                }
            });
        }

        function abrirAdmin() {
            const p = prompt("Senha:");
            if(p === "casa123") {
                mudarTela('admin-view');
                filtrarAdmin('1x1');
            }
        }

        function filtrarAdmin(pasta) {
            const box = document.getElementById('lista-admin');
            box.innerHTML = "Carregando...";

            // LISTAGEM EM TEMPO REAL
            database.ref('casabranca_inscricoes/' + pasta).on('value', (snapshot) => {
                box.innerHTML = "";
                const lista = snapshot.val();
                if(!lista) return box.innerHTML = "Vazio.";

                Object.values(lista).forEach(item => {
                    box.innerHTML += `
                        <div class="admin-card">
                            <b style="color:var(--primary)">#${item.id}</b> | <b>${item.mc}</b>
                            ${item.parceiro ? ' & ' + item.parceiro : ''}<br>
                            <span style="font-size:11px; color:#666">Zap: ${item.zap}</span>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
