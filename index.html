<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe - Elite Regional</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body { margin: 0; background: #020202; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; overflow-x: hidden; }
        #app { width: 100%; max-width: 420px; padding: 20px; position: relative; min-height: 100vh; }

        .glass, .glass-large { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 25px; text-align: center; margin-top: 20px; 
        }

        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .offline { background: #ff4444; }

        .text-anim-crown {
            font-size: 13px; color: #ffd700; font-weight: bold; margin-bottom: 20px;
            display: block; text-transform: uppercase;
            animation: crownFloat 2s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        @keyframes crownFloat { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-3px); opacity: 0.7; } }

        .regional-box { 
            background: linear-gradient(180deg, rgba(255,215,0,0.1) 0%, rgba(0,0,0,1) 100%); 
            border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 8px 15px; margin-bottom: 25px; 
            position: relative; height: 50px; overflow: hidden; display: flex; flex-direction: column; justify-content: center;
            text-align: left;
        }
        .regional-box .label { font-size: 8px; color: #ffd700; font-weight: bold; letter-spacing: 1px; margin-bottom: 2px; opacity: 0.7; }
        #carousel-container { position: relative; height: 25px; }
        .rank-slide { position: absolute; width: 100%; left: 0; font-size: 0.95rem; font-weight: 800; opacity: 0; transform: translateX(10px); transition: 0.5s ease-in-out; text-transform: uppercase; }
        .rank-slide.active { opacity: 1; transform: translateX(0); }

        /* REAÇÕES */
        .vote-box { display: flex; gap: 8px; align-items: center; margin-left: 10px; }
        .btn-vote { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 10px; padding: 4px 6px; }

        .rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .escola-info { font-size: 9px; color: #666; }

        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: white; font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(90deg, #00ff88, #00d4ff); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; margin-top: 10px; }
        .btn-sec { background: none; border: 1px solid #333; color: #888; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px; cursor: pointer; }

        /* CHAT COMPACTO */
        #chat-box {
            position: fixed; bottom: 20px; right: 20px; width: 180px; height: 250px;
            background: rgba(0,0,0,0.8); border: 1px solid rgba(0,255,136,0.3);
            border-radius: 15px; display: flex; flex-direction: column; font-size: 10px;
            backdrop-filter: blur(10px); z-index: 100;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; }
        #chat-input-area { display: flex; padding: 5px; border-top: 1px solid #222; }
        #chat-input-area input { margin: 0; padding: 5px; font-size: 10px; border-radius: 5px; }

        .footer-name { position: fixed; bottom: 10px; left: 20px; font-size: 9px; color: #444; }
        .hidden { display: none !important; }

        .power-fogo { color: #ff4d00; } .power-gelo { color: #00d4ff; } .power-floresta { color: #00ff88; }
    </style>
</head>
<body>

    <div id="app">
        <section id="auth-screen" class="glass">
            <h1 class="logo">RANK<span>CLASSE</span></h1>
            <span class="text-anim-crown">👑 ROUBE A COROA DAS TURMAS!</span>
            <input type="text" id="reg-turma" placeholder="Nome da Turma">
            <input type="text" id="reg-serie" placeholder="Série/Ano">
            <input type="text" id="reg-escola" placeholder="Nome da Escola">
            <input type="url" id="reg-insta" placeholder="Link do Instagram">
            <input type="password" id="reg-pass" placeholder="Senha">
            <select id="reg-power">
                <option value="power-fogo">🔥 Vermelho Fogo</option>
                <option value="power-gelo">❄️ Azul Gelo</option>
                <option value="power-floresta">🌿 Verde Floresta</option>
            </select>
            <button onclick="logarOuCadastrar()" class="btn-main">ENTRAR NO RANKING</button>
            <button onclick="entrarVisitante()" class="btn-sec" style="color:#00ff88; border-color:#00ff88">APENAS OBSERVAR RANKING</button>
            <button onclick="mostrarLoginAdmin()" style="background:none; border:none; color:#181818; font-size:10px; margin-top:20px; cursor:pointer;">SISTEMA CENTRAL</button>
        </section>

        <section id="rank-screen" class="hidden glass-large">
            <div class="regional-box">
                <div class="label">TOP REGIONAL</div>
                <div id="carousel-container"></div>
            </div>
            <div id="lista-ranking"></div>
            <button onclick="sairDaConta()" class="btn-sec">SAIR DA CONTA</button>
        </section>

        <div id="chat-box" class="hidden">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="msg-input" placeholder="Conversar...">
                <button onclick="enviarMensagem()" style="background:var(--green); border:none; border-radius:5px; margin-left:2px; cursor:pointer">></button>
            </div>
        </div>

        <div class="footer-name">Criado por Rômulo</div>

        <section id="admin-login-screen" class="hidden glass">
            <h2>Admin</h2>
            <input type="text" id="admin-user" placeholder="Usuário">
            <input type="password" id="admin-pass" placeholder="Senha">
            <button onclick="loginAdmin()" class="btn-main">CONECTAR</button>
            <button onclick="voltar()" class="btn-sec">VOLTAR</button>
        </section>

        <section id="admin-panel" class="hidden glass-large">
            <h2>🛠 Lançamento</h2>
            <div id="lista-admin"></div>
            <button onclick="voltar()" class="btn-sec">FECHAR</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/", projectId: "gincanaescola-d4f8c" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logadoComo = null;
        let isVisitante = false;
        let slideIndex = 0;

        function logarOuCadastrar() {
            const t = document.getElementById('reg-turma').value.trim();
            const p = document.getElementById('reg-pass').value;
            if (!t || !p) return alert("Preencha Turma e Senha!");
            
            database.ref('ranking/' + t).once('value').then((snap) => {
                if (snap.exists() && snap.val().pass !== p) return alert("Senha incorreta!");
                isVisitante = false;
                entrarNoSistema({turma: t});
            });
        }

        function entrarVisitante() {
            isVisitante = true;
            logadoComo = "Visitante";
            esconderTudo();
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-box').classList.remove('hidden');
            document.getElementById('msg-input').disabled = true;
            document.getElementById('msg-input').placeholder = "Logue para falar";
        }

        function entrarNoSistema(dados) {
            logadoComo = dados.turma;
            esconderTudo();
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-box').classList.remove('hidden');
            database.ref('ranking/' + logadoComo).update({ online: true });
        }

        // RANKING E VOTOS EM TEMPO REAL
        database.ref('ranking').on('value', (snap) => {
            const lista = document.getElementById('lista-ranking');
            const dadosBD = snap.val();
            if (!dadosBD) return;

            let array = Object.keys(dadosBD).map(id => dadosBD[id]).sort((a,b) => (b.pontos || 0) - (a.pontos || 0));
            lista.innerHTML = "";

            array.forEach((t, i) => {
                lista.innerHTML += `
                    <div class="rank-card">
                        <div style="text-align:left">
                            <span class="status-dot ${t.online?'online':'offline'}"></span>
                            <span class="${t.power}" style="font-weight:bold">${t.turma}</span>
                            <div class="vote-box">
                                <button class="btn-vote" onclick="votar('${t.turma}', 'like')">👍 ${t.likes || 0}</button>
                                <button class="btn-vote" onclick="votar('${t.turma}', 'dislike')">👎 ${t.dislikes || 0}</button>
                            </div>
                        </div>
                        <div style="text-align:right"><span style="color:#ffd700; font-weight:bold;">${t.pontos || 0} pts</span></div>
                    </div>`;
            });
        });

        function votar(turma, tipo) {
            const ref = database.ref(`ranking/${turma}/${tipo}s`);
            ref.transaction(current => (current || 0) + 1);
        }

        // CHAT EM TEMPO REAL
        function enviarMensagem() {
            if(isVisitante) return;
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            database.ref('chat').push({ user: logadoComo, text: input.value, time: Date.now() });
            input.value = "";
        }

        database.ref('chat').limitToLast(15).on('value', snap => {
            const cont = document.getElementById('chat-messages');
            cont.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                cont.innerHTML = `<div><b style="color:#00ff88">${msg.user}:</b> ${msg.text}</div>` + cont.innerHTML;
            });
        });

        function esconderTudo() { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); }
        function sairDaConta() { location.reload(); }
        function mostrarLoginAdmin() { esconderTudo(); document.getElementById('admin-login-screen').classList.remove('hidden'); }
        function voltar() { location.reload(); }
    </script>
</body>
</html>
