<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe - Elite Regional</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body { margin: 0; background: #020202; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; overflow-x: hidden; }
        #app { width: 100%; max-width: 420px; padding: 20px; min-height: 100vh; position: relative; }

        .glass, .glass-large { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 25px; text-align: center; margin-top: 20px; 
        }

        /* TOPO USUÁRIO */
        .header-user { text-align: left; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .header-user h2 { font-size: 14px; margin: 0; color: #00ff88; }
        .lvl-badge-top { font-size: 10px; background: #ffd700; color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-top: 5px; display: inline-block; }
        .xp-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: #ffd700; width: 0%; transition: 0.8s; }

        /* STATUS ONLINE */
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .offline { background: #ff4444; }
        .last-seen { font-size: 8px; color: #777; margin-left: 2px; font-weight: normal; vertical-align: middle; }

        /* CARROSSEL */
        .regional-box { background: linear-gradient(180deg, rgba(255,215,0,0.1) 0%, rgba(0,0,0,1) 100%); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 8px 15px; margin-bottom: 25px; position: relative; height: 50px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; text-align: left; }
        .rank-slide { position: absolute; width: 100%; opacity: 0; transition: 0.5s; text-transform: uppercase; font-weight: 800; font-size: 14px; }
        .rank-slide.active { opacity: 1; }

        /* PODERES */
        .power-fogo { color: #ff4d00; text-shadow: 0 0 10px #ff4d00; }
        .power-gelo { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .power-floresta { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .power-vazio { color: #a855f7; text-shadow: 0 0 15px #6b21a8; }
        .power-eletrico { color: #eab308; text-shadow: 0 0 10px #eab308; }

        /* LISTA RANKING */
        .rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .lvl-card { font-size: 11px; font-weight: bold; color: #ffd700; display: block; margin-top: 2px; }
        .escola-info { font-size: 9px; color: #666; display: block; }
        .insta-btn-link { display: inline-block; background: #E1306C; color: white; padding: 4px 8px; border-radius: 6px; font-size: 9px; text-decoration: none; font-weight: bold; margin-top: 5px; }

        /* INPUTS E BOTÕES */
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(90deg, #00ff88, #00d4ff); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; margin-bottom: 10px; }
        .btn-visitor { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .btn-save { background: #00ff88; color: black; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #chat-container { position: fixed; bottom: 20px; right: 10px; width: 160px; height: 220px; background: rgba(10,10,10,0.95); border: 1px solid #222; border-radius: 15px; display: flex; flex-direction: column; z-index: 999; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 8px; font-size: 10px; }
        .reaction-bar { display: flex; gap: 8px; margin-top: 8px; }
        .btn-reaction { background: rgba(255,255,255,0.08); border: none; color: white; font-size: 10px; padding: 4px 8px; border-radius: 8px; cursor: pointer; }

        .hidden { display: none !important; }
        .criador-tag { position: fixed; bottom: 10px; left: 15px; color: #00ff88; font-weight: bold; font-size: 11px; z-index: 1000; }
        .admin-card { background: #080808; padding: 15px; border-radius: 20px; border: 1px solid #222; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="app">
        <div id="level-up-modal" class="hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.98); border: 2px solid #ffd700; padding: 30px; border-radius: 30px; z-index: 2000; text-align: center; box-shadow: 0 0 50px #ffd700;">
            <h2 style="color:#ffd700; margin:0">🎉 LEVEL UP!</h2>
            <p id="level-up-msg" style="margin: 15px 0; font-size: 14px;"></p>
            <button onclick="document.getElementById('level-up-modal').classList.add('hidden')" class="btn-main" style="padding:10px;">CONTINUAR</button>
        </div>

        <section id="auth-screen" class="glass">
            <h1>RANK<span>CLASSE</span></h1>
            <input type="text" id="reg-turma" placeholder="Nome da Turma">
            <input type="text" id="reg-serie" placeholder="Série/Ano">
            <input type="text" id="reg-escola" placeholder="Nome da Escola">
            <input type="url" id="reg-insta" placeholder="Link do Instagram">
            <input type="password" id="reg-pass" placeholder="Senha">
            <select id="reg-power">
                <option value="power-fogo">🔥 Fogo</option>
                <option value="power-gelo">❄️ Gelo</option>
                <option value="power-floresta">🌿 Floresta</option>
                <option value="power-vazio">🌑 Vazio</option>
                <option value="power-eletrico">⚡ Elétrico</option>
            </select>
            <button onclick="logarOuCadastrar()" class="btn-main">ENTRAR / CADASTRAR</button>
            <button onclick="entrarComoVisitante()" class="btn-visitor">ENTRAR COMO VISITANTE</button>
            <button onclick="mostrarLoginAdmin()" style="background:none; border:none; color:#181818; font-size:10px; margin-top:20px; cursor:pointer">ADMINISTRAÇÃO</button>
        </section>

        <section id="rank-screen" class="hidden glass-large">
            <div class="header-user">
                <h2 id="welcome-text">Visitante</h2>
                <div id="user-stats-ui" class="hidden">
                    <span class="lvl-badge-top" id="top-lvl-display">LVL 0</span>
                    <div class="xp-bar-bg"><div class="xp-bar-fill" id="top-xp-fill"></div></div>
                </div>
            </div>
            <div class="regional-box"><div id="carousel-container"></div></div>
            <div id="lista-ranking"></div>
            <button onclick="sairDaConta()" class="btn-main" style="background:#222; color:white; margin-top:15px;">SAIR</button>
        </section>

        <div id="chat-container" class="hidden">
            <div id="chat-messages"></div>
            <div id="chat-input-box" style="display:flex; padding:5px; border-top:1px solid #222">
                <input type="text" id="msg-input" placeholder="Chat..." style="font-size:10px; margin:0; padding:5px;">
                <button onclick="enviarMensagem()" style="background:#00ff88; border:none; padding:5px; border-radius:5px">></button>
            </div>
        </div>

        <div class="criador-tag">Criado por Rômulo</div>

        <section id="admin-panel" class="hidden glass-large">
            <h2>🛠 Painel de Controle</h2>
            <button onclick="limparChat()" style="background: #ff4444; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 20px; cursor:pointer">🧹 LIMPAR CHAT</button>
            <div id="lista-admin"></div>
            <button onclick="location.reload()" class="btn-main">VOLTAR</button>
        </section>

        <section id="admin-login-screen" class="hidden glass">
            <input type="text" id="admin-user" placeholder="Usuário">
            <input type="password" id="admin-pass" placeholder="Senha">
            <button onclick="loginAdmin()" class="btn-main">CONECTAR ADMIN</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/", projectId: "gincanaescola-d4f8c" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logadoComo = null;
        let ehVisitante = false;
        let lastLevel = 0;
        let slideIndex = 0;

        window.onload = () => {
            const salvo = JSON.parse(localStorage.getItem('rank_user_full'));
            if(salvo) {
                document.getElementById('reg-turma').value = salvo.turma || '';
                document.getElementById('reg-serie').value = salvo.serie || '';
                document.getElementById('reg-escola').value = salvo.escola || '';
                document.getElementById('reg-insta').value = salvo.insta || '';
                document.getElementById('reg-pass').value = salvo.pass || '';
                document.getElementById('reg-power').value = salvo.power || 'power-fogo';
            }
        };

        function entrarComoVisitante() {
            ehVisitante = true;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('chat-input-box').classList.add('hidden'); // Visitante não fala
            document.getElementById('welcome-text').innerText = "Modo Visualização";
        }

        function logarOuCadastrar() {
            const t = document.getElementById('reg-turma').value.trim();
            const p = document.getElementById('reg-pass').value;
            if(!t || !p) return alert("Preencha Turma e Senha!");

            database.ref('ranking/' + t).once('value', snap => {
                const d = snap.val();
                if(d && d.pass !== p) return alert("Senha incorreta!");

                const info = {
                    turma: t, pass: p,
                    serie: document.getElementById('reg-serie').value,
                    escola: document.getElementById('reg-escola').value,
                    insta: document.getElementById('reg-insta').value,
                    power: document.getElementById('reg-power').value,
                    pontos: d ? (d.pontos || 0) : 0,
                    seguidores: d ? (d.seguidores || 0) : 0,
                    videos: d ? (d.videos || 0) : 0,
                    likes: d ? (d.likes || 0) : 0,
                    dislikes: d ? (d.dislikes || 0) : 0,
                    online: true, lastSeen: Date.now()
                };
                localStorage.setItem('rank_user_full', JSON.stringify(info));
                database.ref('ranking/' + t).update(info).then(() => {
                    logadoComo = t;
                    document.getElementById('user-stats-ui').classList.remove('hidden');
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('rank-screen').classList.remove('hidden');
                    document.getElementById('chat-container').classList.remove('hidden');
                    database.ref('ranking/' + t).onDisconnect().update({ online: false, lastSeen: Date.now() });
                    setInterval(() => database.ref('ranking/' + t).update({ online: true, lastSeen: Date.now() }), 10000);
                });
            });
        }

        database.ref('ranking').on('value', snap => {
            const dados = snap.val(); if(!dados) return;
            const lista = document.getElementById('lista-ranking');
            const carrossel = document.getElementById('carousel-container');
            const array = Object.values(dados).filter(t => t && t.turma).sort((a,b) => b.pontos - a.pontos);
            
            carrossel.innerHTML = "";
            array.slice(0, 3).forEach((t, i) => {
                carrossel.innerHTML += `<div class="rank-slide ${t.power}">${i===0?"👑 ":""}${i+1}º ${t.turma}</div>`;
            });
            iniciarCarrossel();

            lista.innerHTML = "";
            array.forEach((t, i) => {
                const lvl = Math.floor((t.pontos || 0) / 10);
                if(t.turma === logadoComo) {
                    document.getElementById('welcome-text').innerText = "Bem-vindo, " + t.turma;
                    document.getElementById('top-lvl-display').innerText = "LVL " + lvl;
                    document.getElementById('top-xp-fill').style.width = ((t.pontos % 10) * 10) + "%";
                    if(lvl > lastLevel && lastLevel !== 0) {
                        document.getElementById('level-up-msg').innerHTML = `<b>${t.turma}</b> subiu para o <b>Level ${lvl}</b>! 🚀`;
                        document.getElementById('level-up-modal').classList.remove('hidden');
                    }
                    lastLevel = lvl;
                }

                lista.innerHTML += `
                <div class="rank-card">
                    <div style="text-align:left">
                        <span class="status-dot ${t.online?'online':'offline'}"></span>
                        <b class="${t.power}">${t.turma}</b> <span class="last-seen">${tempoRelativo(t.lastSeen, t.online)}</span><br>
                        <span class="lvl-card">LEVEL ${lvl}</span>
                        <span class="escola-info">${t.serie || ''} - ${t.escola || ''}</span>
                        <a href="${t.insta}" target="_blank" class="insta-btn-link">📸 INSTAGRAM</a>
                        <div class="reaction-bar">
                            <button class="btn-reaction" onclick="reagir('${t.turma}', 'like')">👍 ${t.likes || 0}</button>
                            <button class="btn-reaction" onclick="reagir('${t.turma}', 'dislike')">👎 ${t.dislikes || 0}</button>
                        </div>
                    </div>
                    <div style="text-align:right; font-weight:bold; color:#ffd700">
                        ${i<3?['🥇','🥈','🥉'][i]:'🔹'} ${t.pontos || 0} pts
                    </div>
                </div>`;
            });
        });

        function iniciarCarrossel() {
            const slides = document.querySelectorAll('.rank-slide'); if(slides.length === 0) return;
            slides.forEach(s => s.classList.remove('active'));
            slideIndex = (slideIndex + 1) % slides.length; slides[slideIndex].classList.add('active');
            if(window.timerC) clearTimeout(window.timerC); window.timerC = setTimeout(iniciarCarrossel, 3000);
        }

        function reagir(turma, tipo) {
            if(ehVisitante) return alert("Visitantes não podem votar!");
            const vKey = 'voto_' + turma;
            if(localStorage.getItem(vKey) === tipo) return;
            database.ref('ranking/' + turma).transaction(t => {
                if(t) {
                    if(localStorage.getItem(vKey)) {
                        let antigo = localStorage.getItem(vKey) === 'like' ? 'likes' : 'dislikes';
                        t[antigo] = Math.max(0, (t[antigo] || 0) - 1);
                    }
                    let novo = tipo === 'like' ? 'likes' : 'dislikes';
                    t[novo] = (t[novo] || 0) + 1;
                }
                return t;
            });
            localStorage.setItem(vKey, tipo);
        }

        function carregarPainelAdmin() {
            database.ref('ranking').on('value', snap => {
                const container = document.getElementById('lista-admin'); container.innerHTML = "";
                const dados = snap.val(); if(!dados) return;
                Object.values(dados).forEach(t => {
                    if(!t || !t.turma) return;
                    container.innerHTML += `
                    <div class="admin-card">
                        <b>${t.turma}</b>
                        <button onclick="deletarTurma('${t.turma}')" style="float:right; color:red; background:none; border:none; cursor:pointer; font-weight:bold;">✖ EXCLUIR</button><br>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin: 10px 0;">
                            <input type="number" id="s-${t.turma}" value="${t.seguidores}" placeholder="Segs">
                            <input type="number" id="v-${t.turma}" value="${t.videos}" placeholder="Vids">
                        </div>
                        <button id="btn-save-${t.turma}" onclick="salvarPontos('${t.turma}')" class="btn-save">SALVAR PONTOS</button>
                    </div>`;
                });
            });
        }

        function salvarPontos(nome) {
            const s = parseInt(document.getElementById(`s-${nome}`).value) || 0;
            const v = parseInt(document.getElementById(`v-${nome}`).value) || 0;
            const pts = (Math.floor(s / 100) * 2) + (v * 1);
            database.ref('ranking/' + nome).update({ seguidores: s, videos: v, pontos: pts });
        }

        function deletarTurma(nome) { if(confirm("Apagar conta de "+nome+"?")) database.ref('ranking/'+nome).remove(); }
        function loginAdmin() { if(document.getElementById('admin-user').value==="admin" && document.getElementById('admin-pass').value==="admin123") { document.getElementById('admin-login-screen').classList.add('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); carregarPainelAdmin(); } }
        function mostrarLoginAdmin() { document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('admin-login-screen').classList.remove('hidden'); }
        function sairDaConta() { location.reload(); }
        function tempoRelativo(timestamp, online) { if(online) return "Online agora"; if(!timestamp) return ""; const diff = Date.now() - timestamp; const min = Math.floor(diff/60000); if(min < 1) return "Online agora"; if(min < 60) return `online a ${min} min`; return `online a ${Math.floor(min/60)} h`; }
        function enviarMensagem() { const inp = document.getElementById('msg-input'); if(!inp.value.trim() || !logadoComo) return; database.ref('mensagens_chat').push({ user: logadoComo, text: inp.value }); inp.value = ""; }
        database.ref('mensagens_chat').limitToLast(15).on('value', snap => { const box = document.getElementById('chat-messages'); box.innerHTML = ""; snap.forEach(d => { box.innerHTML += `<div><b>${d.val().user}:</b> ${d.val().text}</div>`; }); box.scrollTop = box.scrollHeight; });
        function limparChat() { if(confirm("Limpar mensagens?")) database.ref('mensagens_chat').remove(); }
    </script>
</body>
</html>
