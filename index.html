<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>RANK X - Elite Mídia V12</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap');

        :root {
            --neon: #00ff88;
            --bg: #020202;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        .aura-beta { color: #00d4ff !important; text-shadow: 0 0 15px #00d4ff; }
        .aura-elite { color: #ffd700 !important; text-shadow: 0 0 15px #ffd700; }
        .aura-sigma { color: #ff0055 !important; text-shadow: 0 0 15px #ff0055; }
        .aura-omega { color: #a855f7 !important; text-shadow: 0 0 20px #a855f7; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        #app { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; }

        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 20000; width: 90%; max-width: 350px;
        }
        .toast {
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-left: 4px solid var(--neon);
            padding: 15px 20px; border-radius: 15px; color: white;
            font-size: 13px; font-weight: 600; margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 10px;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .toast.error { border-left-color: #ff4444; }
        .toast.hide { animation: slideUp 0.4s forwards; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { to { opacity: 0; transform: translateY(-20px); } }

        .glass {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 25px; padding: 20px;
            margin-bottom: 15px; animation: popIn 0.5s ease backwards;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        input, select {
            width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 15px;
            border: 1px solid #111; background: #080808; color: white; font-size: 14px;
        }

        .btn-glow {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(90deg, #00ff88, #00d4ff); color: black;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-glow:active { transform: scale(0.96); }

        .rank-card {
            display: flex; align-items: center; padding: 15px; border-radius: 22px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            margin-bottom: 10px; position: relative; overflow: hidden;
        }

        .medal {
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; background: #111; border: 2px solid #222; margin-right: 12px;
            overflow: hidden; flex-shrink: 0;
        }
        .user-pic { width: 100%; height: 100%; object-fit: cover; }

        .gold { border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        .silver { border-color: #e0e0e0; }
        .bronze { border-color: #cd7f32; }

        .top-medal-float { display: block; font-size: 18px; margin-bottom: 2px; text-align: center; }
        .status-tag { font-size: 9px; font-weight: 800; display: flex; align-items: center; margin-top: 4px; }
        .on { color: #00ff88; }
        .off { color: #ff4444; }

        #sidebar {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100%;
            background: #050505; border-left: 1px solid var(--border); z-index: 10000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px; overflow-y: auto;
        }
        #sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: none; }

        #chat-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { background: #111; padding: 10px 15px; border-radius: 18px; border-left: 4px solid var(--neon); max-width: 85%; }

        .btn-like { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ff4444; padding: 4px 10px; border-radius: 10px; font-size: 11px; cursor: pointer; margin-top: 5px; }
        .hidden { display: none !important; }
        .adm-card { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 20px; margin-bottom: 10px; }

        #chat-badge, #notif-badge {
            position: absolute; top: -5px; right: -5px; width: 22px; height: 22px;
            background: #ff0000; border-radius: 50%; display: none;
            box-shadow: 0 0 15px #ff0000; border: 3px solid #000;
            color: white; font-size: 10px; font-weight: 900; align-items: center; justify-content: center;
        }
        
        .tab-btn { background: #111; border: 1px solid #222; color: #555; padding: 10px; flex: 1; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--neon); color: black; border-color: var(--neon); }

        .btn-update { background: #111; border: 1px solid #333; color: var(--neon); font-size: 9px; padding: 5px 8px; border-radius: 8px; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar(false)"></div>

    <div id="sidebar">
        <h3 style="margin-bottom: 20px; color: var(--neon);">EDITAR PERFIL</h3>
        <input type="file" id="in-file" accept="image/*" style="font-size: 10px;">
        <button onclick="excluirFoto()" style="color:red; background:none; border:none; font-size:10px; margin-bottom:15px;">🗑️ Remover Foto</button>
        <label style="font-size: 10px; color: #555;">NOME DA TURMA</label>
        <input type="text" id="edit-nome" placeholder="Novo nome...">
        <button onclick="salvarPerfil()" class="btn-glow">SALVAR ALTERAÇÕES</button>
        <button onclick="toggleSidebar(false)" style="width: 100%; border:none; color: #444; margin-top: 10px; background:none;">CANCELAR</button>
    </div>

    <div id="app">
        <section id="login-view" class="glass">
            <h1 style="text-align: center; font-weight: 900; font-size: 32px;">RANK<span style="color:var(--neon)">X</span></h1>
            <input type="text" id="in-turma" placeholder="Nome da Turma">
            <input type="password" id="in-pass" placeholder="Senha">
            <input type="text" id="in-serie" placeholder="Série (Ex: 9º A)">
            <input type="text" id="in-escola" placeholder="Escola">
            <input type="url" id="in-insta" placeholder="Instagram URL">
            <select id="in-ensino">
                <option value="fundamental">Ensino Fundamental</option>
                <option value="medio">Ensino Médio</option>
            </select>
            <select id="in-aura">
                <option value="aura-beta">Aura Beta</option>
                <option value="aura-elite">Aura Elite</option>
                <option value="aura-sigma">Aura Sigma</option>
            </select>
            <button onclick="fazerLogin()" class="btn-glow">ACESSAR RANKING</button>
            <p onclick="abrirAdmin()" style="text-align: center; font-size: 9px; margin-top: 20px; cursor: pointer;">PAINEL ADMIN</p>
        </section>

        <section id="select-ensino-view" class="hidden glass" style="text-align:center">
            <h2>QUAL RANK VOCÊ QUER VER?</h2>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="setEnsinoView('fundamental')" class="btn-glow">FUNDAMENTAL</button>
                <button onclick="setEnsinoView('medio')" class="btn-glow" style="background:linear-gradient(90deg, #a855f7, #00d4ff)">MÉDIO</button>
            </div>
        </section>

        <section id="rank-view" class="hidden">
            <div class="glass" style="text-align: center;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <button onclick="toggleSidebar(true)" style="background:none; border:none; font-size:22px;">⚙️</button>
                    <button onclick="pedirAtualizacao()" class="btn-update">ME ATUALIZE 🔄</button>
                    <div style="position: relative;" onclick="toggleSidebar(true)">
                        <span style="font-size: 22px;">🔔</span>
                        <div id="notif-badge">!</div>
                    </div>
                </div>
                
                <h2 id="meu-nome" class="aura-elite">---</h2>
                <p id="minha-info" style="font-size: 11px; color: #888;">---</p>
                <div style="margin-top: 15px; display: flex; justify-content: space-around;">
                    <div><b id="meu-pts" style="font-size: 22px; color: var(--neon);">0</b><br><small>PTS</small></div>
                    <div><b id="meu-nivel" style="font-size: 22px;">1</b><br><small>NÍVEL</small></div>
                </div>
                <button onclick="sair()" style="color:red; background:none; border:none; font-size:10px; margin-top:10px;">SAIR</button>
            </div>

            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button id="btn-tab-f" onclick="setEnsinoView('fundamental')" class="tab-btn">FUNDAMENTAL</button>
                <button id="btn-tab-m" onclick="setEnsinoView('medio')" class="tab-btn">MÉDIO</button>
            </div>

            <div id="ranking-container"></div>
            <div style="height: 100px;"></div>
        </section>

        <section id="admin-view" class="hidden glass">
            <h2>PAINEL ADMIN</h2>
            <div id="admin-notificacoes"></div>
            <div id="admin-list"></div>
            <button onclick="window.location.reload()" class="btn-glow" style="margin-top:20px; background:#222; color:white;">VOLTAR</button>
        </section>
    </div>

    <div id="chat-ui">
        <div style="padding: 20px; background: #050505; display: flex; justify-content: space-between;">
            <b style="color: var(--neon);">CHAT ELITE</b>
            <button onclick="toggleChat(false)" style="color:red; background:none; border:none;">[X]</button>
        </div>
        <div id="msg-flow"></div>
        <div id="chat-controls" style="padding: 15px; display: flex; gap: 8px;">
            <input type="text" id="msg-input" style="margin:0;" placeholder="Texto...">
            <button onclick="mandarMsg()" class="btn-glow" style="width:60px; padding:0;">⚡</button>
        </div>
    </div>

    <div id="btn-chat-float" class="hidden" onclick="toggleChat(true)" style="position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--neon); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 25px; z-index: 1000;">
        💬 <div id="chat-badge">!</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sessao = null;
        let ensinoAtual = 'fundamental';
        let base64Image = "";

        function showNotify(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `<span>${type === 'error' ? '⚠️' : '✅'}</span> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function fazerLogin() {
            const t = document.getElementById('in-turma').value.trim();
            const p = document.getElementById('in-pass').value;
            const ensino = document.getElementById('in-ensino').value;
            if(!t || !p) return showNotify("Turma e Senha!", "error");

            db.ref('ranking/' + t).once('value', snap => {
                let user = snap.val();
                if(user && user.banido) return showNotify("ESTA CONTA FOI BANIDA!", "error");
                if(user && user.pass !== p) return showNotify("Senha Errada!", "error");
                
                if(!user) {
                    user = {
                        turma: t, pass: p, pontos: 0, likes: 0,
                        ensino: ensino, aura: document.getElementById('in-aura').value,
                        escola: document.getElementById('in-escola').value,
                        serie: document.getElementById('in-serie').value,
                        insta: document.getElementById('in-insta').value,
                        online: Date.now()
                    };
                    db.ref('ranking/' + t).set(user);
                }
                sessao = user;
                localStorage.setItem('user_v12_persist', JSON.stringify(user));
                
                // Vai para a tela de escolha após login
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('select-ensino-view').classList.remove('hidden');
            });
        }

        function setEnsinoView(e) {
            ensinoAtual = e;
            document.getElementById('select-ensino-view').classList.add('hidden');
            document.getElementById('rank-view').classList.remove('hidden');
            document.getElementById('btn-chat-float').classList.remove('hidden');
            
            document.getElementById('btn-tab-f').classList.toggle('active', e === 'fundamental');
            document.getElementById('btn-tab-m').classList.toggle('active', e === 'medio');
            
            carregarDados();
        }

        function carregarDados() {
            db.ref('ranking').on('value', snap => {
                const dados = snap.val();
                const container = document.getElementById('ranking-container');
                container.innerHTML = "";
                
                if(!dados) return;

                // FILTRAGEM POR ENSINO E ORDENAÇÃO
                const lista = Object.values(dados)
                    .filter(t => t.ensino === ensinoAtual && !t.banido)
                    .sort((a,b) => b.pontos - a.pontos);

                lista.forEach((t, i) => {
                    const level = Math.floor(t.pontos / 10) + 1;
                    const isOn = (Date.now() - t.online) < 25000;
                    
                    if(sessao && t.turma === sessao.turma) {
                        document.getElementById('meu-nome').innerText = t.turma;
                        document.getElementById('meu-pts').innerText = t.pontos;
                        document.getElementById('meu-nivel').innerText = level;
                    }

                    container.innerHTML += `
                        <div class="rank-card">
                            <div class="medal ${i === 0 ? 'gold' : ''}">
                                <img src="${t.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-pic">
                            </div>
                            <div style="flex:1">
                                <b class="${t.aura}">${t.turma}</b>
                                <div class="status-tag ${isOn ? 'on' : 'off'}">${isOn ? 'Online' : 'Offline'}</div>
                                <button class="btn-like" onclick="darLike('${t.turma}')">❤️ ${t.likes || 0}</button>
                            </div>
                            <div style="text-align:right">
                                <span class="top-medal-float">${i < 3 ? ['🥇','🥈','🥉'][i] : '#'+(i+1)}</span>
                                <b style="color:var(--neon)">${t.pontos}</b>
                            </div>
                        </div>`;
                });
            });
        }

        function pedirAtualizacao() {
            if(!sessao) return;
            db.ref('pedidos_update/' + sessao.turma).set({
                turma: sessao.turma,
                time: Date.now(),
                msg: "Solicitou atualização de dados (Insta)"
            });
            showNotify("Pedido enviado ao Admin!");
        }

        function abrirAdmin() {
            const pass = prompt("SENHA ADMIN:");
            if(pass !== "123") return;
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');

            // MONITORAR ATUALIZAÇÕES EM TEMPO REAL (PEDIDOS)
            db.ref('pedidos_update').on('value', snap => {
                const div = document.getElementById('admin-notificacoes');
                div.innerHTML = "<h3 style='color:orange; font-size:12px;'>🔔 SOLICITAÇÕES:</h3>";
                snap.forEach(p => {
                    const val = p.val();
                    div.innerHTML += `
                        <div class="adm-card" style="border-color:orange">
                            <b>${val.turma}</b> quer atualização!<br>
                            <button onclick="db.ref('pedidos_update/${val.turma}').remove()" style="color:white; background:green; border:none; padding:5px; border-radius:5px; margin-top:5px;">Marcar Lido</button>
                        </div>`;
                });
            });

            // GESTÃO DE TURMAS COM BANIMENTO REAL-TIME
            db.ref('ranking').on('value', snap => {
                const list = document.getElementById('admin-list');
                list.innerHTML = "<h3 style='margin-top:20px'>GESTÃO DE CONTAS:</h3>";
                snap.forEach(t => {
                    const user = t.val();
                    list.innerHTML += `
                        <div class="adm-card">
                            <b>${user.turma}</b> (${user.ensino})<br>
                            PONTOS: <input type="number" onchange="db.ref('ranking/${user.turma}/pontos').set(parseInt(this.value))" value="${user.pontos}" style="width:60px; padding:5px;">
                            <button onclick="banir('${user.turma}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px; float:right;">BANIR</button>
                        </div>`;
                });
            });
        }

        function banir(turma) {
            if(confirm("BANIR " + turma + "?")) {
                db.ref('ranking/' + turma).update({ banido: true });
                showNotify(turma + " BANIDO!", "error");
            }
        }

        function toggleSidebar(s) { document.getElementById('sidebar').classList.toggle('open', s); document.getElementById('overlay').style.display = s ? 'block' : 'none'; }
        function toggleChat(s) { document.getElementById('chat-ui').style.display = s ? 'flex' : 'none'; }
        function sair() { localStorage.clear(); window.location.reload(); }

        // MANTÉM LOGIN SALVO
        window.onload = () => {
            const save = localStorage.getItem('user_v12_persist');
            if(save) {
                sessao = JSON.parse(save);
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('select-ensino-view').classList.remove('hidden');
            }
        };

        // FUNÇÃO DE LIKES (SEM REMOVER)
        function darLike(t) {
            const key = 'like_' + t;
            if(localStorage.getItem(key)) return showNotify("Já deu like!", "error");
            db.ref('ranking/'+t+'/likes').transaction(c => (c||0)+1);
            localStorage.setItem(key, "true");
        }

        function mandarMsg() {
            const m = document.getElementById('msg-input').value;
            if(!m || !sessao) return;
            db.ref('elite_chat').push({ t: sessao.turma, a: sessao.aura, m: m, time: Date.now() });
            document.getElementById('msg-input').value = "";
        }

        db.ref('elite_chat').limitToLast(30).on('value', snap => {
            const box = document.getElementById('msg-flow');
            box.innerHTML = "";
            snap.forEach(d => {
                const v = d.val();
                box.innerHTML += `<div class="msg-bubble"><b class="${v.a}">${v.t}</b><br>${v.m}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
