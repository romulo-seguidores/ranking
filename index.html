<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trick Button Simulator</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #1a1a1a;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* O Botão Trick */
        #trick-button {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move;
            touch-action: none;
            z-index: 9999;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: border-color 0.3s, background 0.3s;
        }

        /* Indicador interno (estilo iPhone) */
        #trick-button::after {
            content: "";
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        /* Estado quando estiver travado */
        #trick-button.locked {
            border-color: #ff3b30;
            background: rgba(255, 59, 48, 0.2);
            cursor: default;
        }

        .status-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="status-panel">
    Status: <span id="status">Móvel</span><br>
    <small>Clique 3x e segure para Travar/Destravar</small>
</div>

<div id="trick-button"></div>

<script>
    const btn = document.getElementById('trick-button');
    const statusTxt = document.getElementById('status');
    
    let isLocked = false;
    let clickCount = 0;
    let clickTimer;
    let isDragging = false;
    let offset = { x: 0, y: 0 };

    // --- Lógica de Arrastar ---
    btn.addEventListener('pointerdown', (e) => {
        if (isLocked) return;
        
        isDragging = true;
        offset.x = e.clientX - btn.offsetLeft;
        offset.y = e.clientY - btn.offsetTop;
        btn.setPointerCapture(e.pointerId);
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging || isLocked) return;
        
        let x = e.clientX - offset.x;
        let y = e.clientY - offset.y;
        
        btn.style.left = `${x}px`;
        btn.style.top = `${y}px`;
    });

    window.addEventListener('pointerup', () => {
        isDragging = false;
    });

    // --- Lógica de Trava (3 Cliques + Segurar) ---
    btn.addEventListener('mousedown', () => {
        clickCount++;
        
        clearTimeout(clickTimer);
        
        // Se houver 3 cliques rápidos
        if (clickCount === 3) {
            // Timer para detectar se está "segurando" após o 3º clique
            clickTimer = setTimeout(() => {
                toggleLock();
            }, 500);
        } else {
            clickTimer = setTimeout(() => { clickCount = 0; }, 400);
        }
    });

    btn.addEventListener('mouseup', () => {
        if (clickCount < 3) {
            clearTimeout(clickTimer);
        }
    });

    function toggleLock() {
        isLocked = !isLocked;
        clickCount = 0;
        
        if (isLocked) {
            btn.classList.add('locked');
            statusTxt.innerText = "TRAVADO (Estabilizado)";
            statusTxt.style.color = "#ff3b30";
        } else {
            btn.classList.remove('locked');
            statusTxt.innerText = "Móvel";
            statusTxt.style.color = "#00ff88";
        }
    }
</script>

</body>
</html>
