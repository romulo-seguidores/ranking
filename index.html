<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe - Elite Regional</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body { margin: 0; background: #020202; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; overflow-x: hidden; }
        #app { width: 100%; max-width: 420px; padding: 20px; }

        .glass, .glass-large { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 25px; text-align: center; margin-top: 20px; 
        }

        /* STATUS */
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .offline { background: #ff4444; }

        /* ANIMAÇÃO LOGIN */
        .text-anim-brilho {
            font-size: 13px; color: #ffd700; font-weight: bold; margin-bottom: 20px;
            display: block; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.98); } }

        /* CARROSSEL PEQUENO E ELEGANTE */
        .regional-box { 
            background: linear-gradient(180deg, rgba(255,215,0,0.1) 0%, rgba(0,0,0,1) 100%); 
            border: 1px solid rgba(255,215,0,0.4); border-radius: 20px; padding: 10px; margin-bottom: 20px; 
            position: relative; height: 60px; overflow: hidden;
        }
        .regional-box .label { font-size: 9px; color: #ffd700; font-weight: bold; letter-spacing: 1px; margin-bottom: 2px; opacity: 0.8; }
        
        #carousel-container { position: relative; height: 30px; }
        .rank-slide {
            position: absolute; width: 100%; left: 0;
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase;
            opacity: 0; transform: scale(0.9); transition: 0.5s ease-in-out;
        }
        .rank-slide.active { opacity: 1; transform: scale(1); }

        /* MISSÕES 24H */
        .mission-btn { background: rgba(255,215,0,0.15); border: 1px solid #ffd700; color: #ffd700; padding: 8px 15px; border-radius: 12px; font-size: 11px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .task-area { background: rgba(255,215,0,0.05); border: 1px dashed rgba(255,215,0,0.3); border-radius: 15px; padding: 15px; margin: 15px 0; }
        .btn-analise { background: #ffd700; color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-analise:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* ADMIN */
        .admin-card { background: #080808; padding: 15px; border-radius: 20px; border: 1px solid #222; margin-bottom: 12px; text-align: left; }
        .admin-card.updated-success { border-color: #00ff88; box-shadow: 0 0 15px #00ff8855; }
        .insta-link { color: #00d4ff; font-size: 11px; text-decoration: none; display: block; margin: 5px 0; }
        .notif-pendente { background: #ffd700; color: black; font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* PODERES */
        .power-fogo { color: #ff4d00; text-shadow: 0 0 8px #ff4d00; }
        .power-gelo { color: #00d4ff; text-shadow: 0 0 8px #00d4ff; }
        .power-floresta { color: #00ff88; text-shadow: 0 0 8px #00ff88; }
        .power-vazio { color: #a855f7; text-shadow: 0 0 10px #6b21a8; }
        .power-eletrico { color: #eab308; text-shadow: 0 0 8px #eab308; }

        .rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(90deg, #00ff88, #00d4ff); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; }
        .btn-sec { background: none; border: 1px solid #333; color: #888; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <section id="auth-screen" class="glass">
            <h1 class="logo">RANK<span>CLASSE</span></h1>
            <span class="text-anim-brilho">👑 ROUBE A COROA DAS TURMAS E SEJA A MELHOR!</span>
            <input type="text" id="reg-turma" placeholder="Nome da Turma">
            <input type="text" id="reg-serie" placeholder="Série/Ano">
            <input type="text" id="reg-escola" placeholder="Nome da Escola">
            <input type="url" id="reg-insta" placeholder="Link do Instagram (ex: instagram.com/suaturma)">
            <input type="password" id="reg-pass" placeholder="Senha">
            <select id="reg-power">
                <option value="power-fogo">🔥 Vermelho Fogo</option>
                <option value="power-gelo">❄️ Azul Gelo</option>
                <option value="power-floresta">🌿 Verde Floresta</option>
                <option value="power-vazio">🌑 Roxo Vazio</option>
                <option value="power-eletrico">⚡ Amarelo Elétrico</option>
            </select>
            <button onclick="logarOuCadastrar()" class="btn-main">ENTRAR NO RANKING</button>
            <button onclick="mostrarLoginAdmin()" style="background:none; border:none; color:#222; font-size:10px; margin-top:15px; cursor:pointer;">SISTEMA CENTRAL</button>
        </section>

        <section id="rank-screen" class="hidden glass-large">
            <div class="regional-box">
                <div class="label">🌎 TOP REGIONAL</div>
                <div id="carousel-container"></div>
            </div>

            <button id="btn-toggle-mission" class="mission-btn" onclick="toggleMissions()">🎯 CARREGANDO MISSÃO...</button>

            <div id="task-box" class="task-area hidden">
                <div style="margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                    <strong style="color:#ffd700">MISSÃO DO DIA:</strong><br>
                    <span id="label-missao" style="font-size:13px;">...</span>
                </div>
                <button id="btn-enviar-analise" onclick="enviarParaAnalise()" class="btn-analise">ENVIAR PARA ANÁLISE</button>
            </div>

            <div id="lista-ranking"></div>
            <button onclick="sairDaConta()" class="btn-sec">SAIR DA CONTA</button>
        </section>

        <section id="admin-login-screen" class="hidden glass">
            <h2>Admin</h2>
            <input type="text" id="admin-user" placeholder="Usuário">
            <input type="password" id="admin-pass" placeholder="Senha">
            <button onclick="loginAdmin()" class="btn-main">CONECTAR</button>
            <button onclick="voltar()" class="btn-sec">VOLTAR</button>
        </section>

        <section id="admin-panel" class="hidden glass-large">
            <h2>🛠 Lançamentos</h2>
            <div id="lista-admin"></div>
            <button onclick="voltar()" class="btn-sec">FECHAR</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/",
            projectId: "gincanaescola-d4f8c",
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logadoComo = null;
        let slideIndex = 0;
        // NOVAS MISSÕES DE VÍDEO E REDES
        const missoes = [
            "Postar Vídeo marcando @DivulgadorOficial",
            "Gravar Reel de 15s com grito de guerra",
            "Postar Story da turma e marcar @SeuApp",
            "Vídeo da turma fazendo trend do TikTok",
            "Marcar 3 amigos no post oficial do IG"
        ];

        window.onload = () => {
            const salvo = JSON.parse(localStorage.getItem('rank_user'));
            if(salvo) {
                document.getElementById('reg-turma').value = salvo.turma || '';
                document.getElementById('reg-pass').value = salvo.pass || '';
            }
        };

        function logarOuCadastrar() {
            const turma = document.getElementById('reg-turma').value.trim();
            const pass = document.getElementById('reg-pass').value;
            if (!turma || !pass) return alert("Preencha!");

            const dados = {
                turma, pass,
                serie: document.getElementById('reg-serie').value,
                escola: document.getElementById('reg-escola').value,
                insta: document.getElementById('reg-insta').value,
                power: document.getElementById('reg-power').value
            };
            localStorage.setItem('rank_user', JSON.stringify(dados));

            database.ref('ranking/' + turma).once('value').then(snap => {
                if (snap.exists()) {
                    if (snap.val().pass === pass) entrarNoSistema(snap.val());
                    else alert("Senha errada!");
                } else {
                    const novo = { ...dados, seguidores: 0, videos: 0, pontos: 0, online: true, analise: false, ultimaMissao: 0 };
                    database.ref('ranking/' + turma).set(novo).then(() => entrarNoSistema(novo));
                }
            });
        }

        function entrarNoSistema(dados) {
            logadoComo = dados.turma;
            database.ref('ranking/' + logadoComo).update({ online: true });
            database.ref('ranking/' + logadoComo).onDisconnect().update({ online: false });
            esconderTudo();
            document.getElementById('rank-screen').classList.remove('hidden');
            verificarStatusMissao();
        }

        // TRAVA DE 24 HORAS
        function verificarStatusMissao() {
            database.ref('ranking/' + logadoComo).on('value', snap => {
                const d = snap.val();
                const agora = Date.now();
                const tempoPassado = agora - (d.ultimaMissao || 0);
                const vinteQuatroHoras = 24 * 60 * 60 * 1000;

                const btnMissao = document.getElementById('btn-toggle-mission');
                const taskBox = document.getElementById('task-box');

                if (d.analise) {
                    btnMissao.innerText = "⏳ AGUARDANDO APROVAÇÃO...";
                    btnMissao.disabled = true;
                    taskBox.classList.add('hidden');
                } else if (tempoPassado < vinteQuatroHoras) {
                    const horasRestantes = Math.ceil((vinteQuatroHoras - tempoPassado) / (1000 * 60 * 60));
                    btnMissao.innerText = `🔒 PRÓXIMA MISSÃO EM ${horasRestantes}H`;
                    btnMissao.disabled = true;
                    taskBox.classList.add('hidden');
                } else {
                    btnMissao.innerText = "🎯 MISSÃO DISPONÍVEL!";
                    btnMissao.disabled = false;
                    document.getElementById('label-missao').innerText = missoes[new Date().getDate() % missoes.length];
                }
            });
        }

        function toggleMissions() {
            document.getElementById('task-box').classList.toggle('hidden');
        }

        function enviarParaAnalise() {
            database.ref('ranking/' + logadoComo).update({ analise: true });
            alert("Enviado para análise dos jurados!");
        }

        // RANKING E CARROSSEL PEQUENO
        database.ref('ranking').on('value', (snapshot) => {
            const list = document.getElementById('lista-ranking');
            const carrossel = document.getElementById('carousel-container');
            const dadosBD = snapshot.val();
            if (!dadosBD) return;

            let array = Object.keys(dadosBD).map(id => dadosBD[id]).sort((a,b) => b.pontos - a.pontos);

            // Carrossel Small
            carrossel.innerHTML = "";
            [0,1,2].forEach(i => {
                if(array[i]) {
                    const c = i === 0 ? "👑 " : "";
                    carrossel.innerHTML += `<div class="rank-slide ${array[i].power}">${c}#${i+1} ${array[i].turma}</div>`;
                }
            });
            startCarousel();

            // Lista
            list.innerHTML = "";
            array.forEach((t, i) => {
                let medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🔹";
                list.innerHTML += `
                    <div class="rank-card">
                        <div style="text-align:left">
                            <span class="status-dot ${t.online ? 'online' : 'offline'}"></span>
                            <span class="${t.power}" style="font-weight:bold; font-size:14px;">${t.turma}</span>
                        </div>
                        <div style="text-align:right">
                            <span style="color:#ffd700; font-weight:bold;">${medal} ${t.pontos} pts</span>
                        </div>
                    </div>`;
            });
        });

        function startCarousel() {
            const slides = document.querySelectorAll('.rank-slide');
            if(!slides.length) return;
            slides.forEach(s => s.classList.remove('active'));
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
            if(window.timerC) clearTimeout(window.timerC);
            window.timerC = setTimeout(startCarousel, 3000);
        }

        // ADMIN COM LINK INSTAGRAM
        function loginAdmin() {
            if (document.getElementById('admin-user').value === "admin" && document.getElementById('admin-pass').value === "admin123") {
                esconderTudo();
                document.getElementById('admin-panel').classList.remove('hidden');
                carregarAdmin();
            }
        }

        function carregarAdmin() {
            database.ref('ranking').on('value', snap => {
                const container = document.getElementById('lista-admin');
                container.innerHTML = "";
                const dados = snap.val();
                Object.keys(dados).forEach(id => {
                    const t = dados[id];
                    container.innerHTML += `
                        <div class="admin-card" id="card-${t.turma}">
                            <strong>${t.turma}</strong> ${t.analise ? '<span class="notif-pendente">MISSÃO!</span>' : ''}
                            <a href="${t.insta}" target="_blank" class="insta-link">🔗 Ver Instagram</a>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0;">
                                <input type="number" id="s-${t.turma}" value="${t.seguidores}" placeholder="Segs">
                                <input type="number" id="v-${t.turma}" value="${t.videos}" placeholder="Vids">
                            </div>
                            <div style="display:flex; gap:5px;">
                                <button onclick="finalizarMissao('${t.turma}', true)" style="flex:1; background:#00ff88; border:none; padding:10px; border-radius:10px; font-weight:bold;">APROVAR</button>
                                <button onclick="finalizarMissao('${t.turma}', false)" style="flex:1; background:#ff4444; border:none; padding:10px; border-radius:10px; font-weight:bold;">RECUSAR</button>
                            </div>
                        </div>`;
                });
            });
        }

        function finalizarMissao(nome, aprovar) {
            const s = parseInt(document.getElementById(`s-${nome}`).value) || 0;
            const v = parseInt(document.getElementById(`v-${nome}`).value) || 0;
            
            database.ref('ranking/' + nome).once('value').then(snap => {
                const d = snap.val();
                let pts = (Math.floor(s/100)*2) + (v*1);
                if(aprovar) pts += 10; // Bônus de missão aprovada

                database.ref('ranking/' + nome).update({
                    seguidores: s,
                    videos: v,
                    pontos: pts,
                    analise: false,
                    ultimaMissao: aprovar ? Date.now() : d.ultimaMissao // Se recusar, ele pode tentar de novo? Se quiser travar mesmo recusando, mude para Date.now()
                }).then(() => {
                    document.getElementById(`card-${nome}`).classList.add('updated-success');
                    setTimeout(() => carregarAdmin(), 1000);
                });
            });
        }

        function esconderTudo() { ["auth-screen", "admin-login-screen", "rank-screen", "admin-panel"].forEach(id => document.getElementById(id).classList.add('hidden')); }
        function voltar() { esconderTudo(); document.getElementById('auth-screen').classList.remove('hidden'); }
        function mostrarLoginAdmin() { esconderTudo(); document.getElementById('admin-login-screen').classList.remove('hidden'); }
        function sairDaConta() { location.reload(); }
    </script>
</body>
</html>
