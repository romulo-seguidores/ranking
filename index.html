<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>RANK CLASSE V8 - ULTRA EDITION</title>

    <style>
        /* ============================================================
           SISTEMA VISUAL "MÍDIA" EVOLVED - MOBILE FOCUS
           ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --ouro: #ffd700;
            --prata: #e0e0e0;
            --bronze: #cd7f32;
            --neon: #00ff88;
            --sky: #00d4ff;
            --danger: #ff4444;
            --bg-master: #050505;
            --glass-base: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --drawer-bg: #0a0a0a;
        }

        /* RESET GERAL */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-master); color: #fff; overflow-x: hidden; min-height: 100vh; }

        /* SCROLL ESTILIZADO */
        ::-webkit-scrollbar { width: 0px; } /* Escondido para parecer App */

        #app { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; position: relative; min-height: 100vh; }

        /* ANIMAÇÕES */
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulseAdmin { 0% { box-shadow: 0 0 5px var(--neon); } 50% { box-shadow: 0 0 20px var(--neon); } 100% { box-shadow: 0 0 5px var(--neon); } }
        @keyframes float3d { 0% { transform: translateY(0px) rotateY(0deg); } 50% { transform: translateY(-5px) rotateY(15deg); } 100% { transform: translateY(0px) rotateY(0deg); } }

        /* COMPONENTES DE INTERFACE */
        .glass-box {
            background: var(--glass-base);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 30px;
            animation: fadeIn 0.5s ease;
        }

        /* PERFIL & AVATAR */
        .profile-container {
            position: relative;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-radius: 35px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            background-size: cover;
            background-position: center;
            background-image: url('https://cdn-icons-png.flaticon.com/512/3135/3135715.png'); /* Default */
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.2);
        }

        .edit-pencil {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--neon);
            color: #000;
            width: 35px;
            height: 35px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        /* GAVETA DE EDIÇÃO (SIDE DRAWER) */
        #profile-drawer {
            position: fixed;
            top: 0; right: 0;
            width: 85%; height: 100%;
            background: var(--drawer-bg);
            z-index: 10000;
            padding: 40px 25px;
            box-shadow: -20px 0 60px rgba(0,0,0,0.8);
            transform: translateX(101%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #profile-drawer.open { transform: translateX(0); }

        .drawer-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            display: none;
            backdrop-filter: blur(5px);
        }

        /* RANKING CARDS */
        .rank-card {
            background: rgba(255,255,255,0.03);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .rank-card.admin-active {
            border: 2px solid var(--neon) !important;
            animation: pulseAdmin 2s infinite;
        }

        .rank-info-main { display: flex; align-items: center; gap: 15px; }

        /* MEDALHAS 3D */
        .medal-3d {
            font-size: 35px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            animation: float3d 3s infinite ease-in-out;
            display: block;
        }

        /* BOTÕES MÍDIA */
        .mídia-btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-main { background: #fff; color: #000; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #fff; }

        /* CHAT FLOATING MOBILE REWORK */
        #chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 900;
        }

        .chat-toggle-btn {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--neon);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(0,255,136,0.4);
        }

        #chat-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        #chat-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { background: rgba(255,255,255,0.05); padding: 12px 18px; border-radius: 20px; border-left: 3px solid var(--neon); }
        .chat-bubble b { color: var(--neon); font-size: 12px; }

        /* ADMIN PANEL */
        .admin-section { padding-bottom: 100px; }
        .adm-card { background: #111; border-radius: 25px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }

        /* UTILITÁRIOS */
        .hidden { display: none !important; }
        .txt-neon { color: var(--neon); }
        .input-mídia {
            width: 100%; background: #151515; border: 1px solid #222; 
            padding: 18px; border-radius: 18px; color: #fff; margin-bottom: 10px;
        }
        
    </style>
</head>
<body>

<div id="app">

    <div id="overlay" class="drawer-overlay" onclick="closeDrawer()"></div>

    <section id="screen-auth" class="glass-box">
        <h1 style="font-size: 45px; font-weight: 900; letter-spacing: -3px; line-height: 1;">RANK<br><span class="txt-neon">CLASSE</span></h1>
        <p style="font-size: 10px; color: #666; font-weight: 800; margin-bottom: 30px;">ULTRA EDITION V8.0</p>
        
        <input type="text" id="reg-turma" class="input-mídia" placeholder="Nome da Turma">
        <input type="text" id="reg-escola" class="input-mídia" placeholder="Nome da Escola">
        <input type="text" id="reg-serie" class="input-mídia" placeholder="Série/Ano">
        <input type="password" id="reg-pass" class="input-mídia" placeholder="Senha da Turma">
        
        <button class="mídia-btn btn-main" onclick="handleAuth()">ENTRAR NA ARENA</button>
        <button class="mídia-btn btn-outline" onclick="showAdmin()">TERMINAL ADMIN</button>
    </section>

    <section id="screen-rank" class="hidden">
        
        <div class="profile-container">
            <div id="me-avatar" class="avatar-circle"></div>
            <div class="edit-pencil" onclick="openDrawer()">✎</div>
            <div>
                <h2 id="me-name" style="font-size: 28px; letter-spacing: -1px;">Turma Name</h2>
                <p id="me-sub" style="font-size: 11px; color: #555; font-weight: 700; text-transform: uppercase;">Escola • Série</p>
            </div>
            
            <div style="margin-top: 20px; display: flex; gap: 15px;">
                <div style="flex: 1; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; text-align: center;">
                    <span style="display:block; font-size: 22px; font-weight: 900;" id="me-points">0</span>
                    <span style="font-size: 9px; color: #444; font-weight: 900;">PONTOS</span>
                </div>
                <div style="flex: 1; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; text-align: center;">
                    <span style="display:block; font-size: 22px; font-weight: 900;" id="me-likes">0</span>
                    <span style="font-size: 9px; color: #444; font-weight: 900;">CURTIDAS</span>
                </div>
            </div>
        </div>

        <div id="render-list"></div>

        <button class="mídia-btn btn-outline" style="margin-top: 30px;" onclick="logout()">SAIR DA CONTA</button>
    </section>

    <div id="profile-drawer">
        <h2 style="font-size: 30px; letter-spacing: -1px; margin-bottom: 20px;">Editar <span class="txt-neon">Perfil</span></h2>
        
        <label style="font-size: 11px; color: #555; font-weight: 800;">URL DA FOTO DA TURMA</label>
        <input type="text" id="edit-pic" class="input-mídia" placeholder="https://linkdafoto.com/foto.jpg">
        
        <label style="font-size: 11px; color: #555; font-weight: 800;">NOME DA TURMA</label>
        <input type="text" id="edit-name" class="input-mídia">
        
        <label style="font-size: 11px; color: #555; font-weight: 800;">INSTAGRAM (LINK)</label>
        <input type="text" id="edit-insta" class="input-mídia">

        <button class="mídia-btn btn-main" style="margin-top: auto;" onclick="saveProfileChanges()">SALVAR ALTERAÇÕES</button>
        <button class="mídia-btn btn-outline" onclick="closeDrawer()">CANCELAR</button>
    </div>

    <div id="chat-container">
        <div class="chat-toggle-btn" onclick="toggleChat(true)">💬</div>
    </div>

    <div id="chat-modal">
        <div style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;">
            <b class="txt-neon">CHAT GLOBAL</b>
            <span onclick="toggleChat(false)" style="font-weight: 900; cursor: pointer;">FECHAR [X]</span>
        </div>
        <div id="chat-msgs"></div>
        <div style="padding: 20px; background: #0a0a0a; display: flex; gap: 10px;">
            <input type="text" id="chat-ipt" class="input-mídia" style="margin:0;" placeholder="Mande sua mensagem...">
            <button onclick="sendChat()" style="background:var(--neon); border:none; border-radius:15px; padding: 0 20px; font-weight: 900;">></button>
        </div>
    </div>

    <section id="screen-admin" class="hidden admin-section">
        <h2 style="font-size: 32px; letter-spacing: -2px; margin-bottom: 25px;">ROOT <span class="txt-neon">CONTROL</span></h2>
        
        <div class="adm-card" style="border-left: 4px solid var(--danger);">
            <p style="font-size: 12px; font-weight: 800; margin-bottom: 10px;">AÇÕES GLOBAIS</p>
            <button class="mídia-btn" style="background: var(--danger); font-size: 11px; padding: 15px;" onclick="clearGlobalChat()">LIMPAR TODO O CHAT</button>
        </div>

        <div id="admin-render-users"></div>
        
        <button class="mídia-btn btn-outline" onclick="location.reload()">FECHAR ADMIN</button>
    </section>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/",
        projectId: "gincanaescola-d4f8c"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myUser = null;

    // --- SISTEMA DE GAVETA (DRAWER) ---
    function openDrawer() {
        document.getElementById('profile-drawer').classList.add('open');
        document.getElementById('overlay').style.display = 'block';
        
        // Preencher campos
        document.getElementById('edit-name').value = myUser.turma;
        document.getElementById('edit-pic').value = myUser.pic || "";
        document.getElementById('edit-insta').value = myUser.insta || "";
    }

    function closeDrawer() {
        document.getElementById('profile-drawer').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }

    // --- AUTENTICAÇÃO E PERSISTÊNCIA ---
    window.onload = () => {
        const saved = localStorage.getItem('omni_v8_user');
        if(saved) {
            myUser = JSON.parse(saved);
            startApp();
        }
    }

    function handleAuth() {
        const turma = document.getElementById('reg-turma').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const escola = document.getElementById('reg-escola').value;
        const serie = document.getElementById('reg-serie').value;

        if(!turma || !pass) return alert("Preencha Turma e Senha!");

        db.ref('ranking/' + turma).once('value', snap => {
            const exist = snap.val();
            if(exist && exist.pass !== pass) return alert("Senha incorreta!");

            const payload = exist ? exist : {
                turma, pass, escola, serie,
                pontos: 0, likes: 0, lastSeen: Date.now(),
                pic: '', insta: '', seguidores: 0, videos: 0
            };

            db.ref('ranking/' + turma).update(payload).then(() => {
                myUser = payload;
                localStorage.setItem('omni_v8_user', JSON.stringify(payload));
                startApp();
            });
        });
    }

    function startApp() {
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-rank').classList.remove('hidden');
        document.getElementById('chat-container').classList.remove('hidden');
        
        // Heartbeat
        setInterval(() => {
            db.ref('ranking/' + myUser.turma).update({ lastSeen: Date.now() });
        }, 10000);

        syncData();
        syncChat();
    }

    // --- SINCRONIZAÇÃO DE RANKING ---
    function syncData() {
        db.ref('ranking').on('value', snap => {
            const data = snap.val();
            if(!data) return;

            const listArea = document.getElementById('render-list');
            const arr = Object.values(data).sort((a,b) => b.pontos - a.pontos);
            
            listArea.innerHTML = "";
            arr.forEach((item, i) => {
                const isOnline = (Date.now() - (item.lastSeen || 0)) < 40000;
                const timeStr = isOnline ? "ONLINE AGORA" : "OFFLINE";
                
                // Medalhas 3D
                let medal = `<span style="font-weight:900; color:#333;">#${i+1}</span>`;
                if(i === 0) medal = `<span class="medal-3d">🥇</span>`;
                if(i === 1) medal = `<span class="medal-3d">🥈</span>`;
                if(i === 2) medal = `<span class="medal-3d">🥉</span>`;

                // Update Header se for eu
                if(myUser && item.turma === myUser.turma) {
                    document.getElementById('me-name').innerText = item.turma;
                    document.getElementById('me-sub').innerText = `${item.escola} • ${item.serie}`;
                    document.getElementById('me-points').innerText = item.pontos;
                    document.getElementById('me-likes').innerText = item.likes;
                    if(item.pic) document.getElementById('me-avatar').style.backgroundImage = `url(${item.pic})`;
                }

                listArea.innerHTML += `
                    <div class="rank-card">
                        <div class="rank-info-main">
                            <div style="text-align:center; min-width:40px;">${medal}</div>
                            <div class="avatar-circle" style="width:50px; height:50px; margin:0; border-width:2px; background-image:url(${item.pic || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'})"></div>
                            <div>
                                <b style="font-size:16px; display:block;">${item.turma}</b>
                                <span style="font-size:9px; color:${isOnline ? 'var(--neon)' : '#555'}; font-weight:900;">${timeStr}</span>
                                <p style="font-size:9px; color:#444;">${item.escola} | ${item.serie}</p>
                            </div>
                        </div>
                        <div style="text-align:right">
                            <span style="font-size:22px; font-weight:900; color:var(--ouro); display:block;">${item.pontos}</span>
                            <button onclick="giveLike('${item.turma}')" style="background:none; border:none; color:#ff4444; font-size:12px; font-weight:800;">🔥 ${item.likes}</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- EDIÇÃO DE PERFIL ---
    function saveProfileChanges() {
        const newName = document.getElementById('edit-name').value;
        const newPic = document.getElementById('edit-pic').value;
        const newInsta = document.getElementById('edit-insta').value;

        db.ref('ranking/' + myUser.turma).update({
            turma: newName,
            pic: newPic,
            insta: newInsta
        }).then(() => {
            myUser.turma = newName;
            myUser.pic = newPic;
            myUser.insta = newInsta;
            localStorage.setItem('omni_v8_user', JSON.stringify(myUser));
            closeDrawer();
            alert("Perfil Atualizado, Mídia!");
        });
    }

    // --- CHAT SYSTEM ---
    function toggleChat(open) {
        document.getElementById('chat-modal').style.display = open ? 'flex' : 'none';
    }

    function sendChat() {
        const ipt = document.getElementById('chat-ipt');
        if(!ipt.value) return;
        db.ref('omni_chat').push({ u: myUser.turma, t: ipt.value, ts: Date.now() });
        ipt.value = "";
    }

    function syncChat() {
        db.ref('omni_chat').limitToLast(40).on('value', snap => {
            const area = document.getElementById('chat-msgs');
            area.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                area.innerHTML += `
                    <div class="chat-bubble">
                        <b>@${msg.u}</b><br>
                        <span style="font-size:13px;">${msg.t}</span>
                    </div>
                `;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    // --- ADMIN DASHBOARD ---
    function showAdmin() {
        const p = prompt("SENHA DE ACESSO ROOT:");
        if(p === "admin123") {
            document.getElementById('screen-auth').classList.add('hidden');
            document.getElementById('screen-admin').classList.remove('hidden');
            renderAdmin();
        }
    }

    function renderAdmin() {
        db.ref('ranking').on('value', snap => {
            const area = document.getElementById('admin-render-users');
            area.innerHTML = "";
            const data = snap.val();
            
            Object.values(data).forEach(user => {
                // Lógica da Borda Verde (se atualizado nos últimos 10s)
                const isRecentlyUpdated = (Date.now() - (user.lastSeen || 0)) < 10000;

                area.innerHTML += `
                    <div class="adm-card ${isRecentlyUpdated ? 'admin-active' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>${user.turma}</b>
                            <span style="font-size:10px; color:#555;">ID: ${user.pass}</span>
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                            <button class="mídia-btn btn-main" style="padding:10px; font-size:10px;" onclick="modPoints('${user.turma}', 10)">+10 PTS</button>
                            <button class="mídia-btn btn-main" style="padding:10px; font-size:10px;" onclick="modPoints('${user.turma}', -10)">-10 PTS</button>
                            <button class="mídia-btn btn-outline" style="padding:10px; font-size:10px;" onclick="deleteTurma('${user.turma}')">EXCLUIR</button>
                            <button class="mídia-btn btn-outline" style="padding:10px; font-size:10px;" onclick="window.open('${user.insta}')">INSTA</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    function modPoints(t, v) { db.ref('ranking/' + t + '/pontos').transaction(c => (c || 0) + v); }
    function deleteTurma(t) { if(confirm("Apagar " + t + "?")) db.ref('ranking/' + t).remove(); }
    function clearGlobalChat() { if(confirm("Limpar chat?")) db.ref('omni_chat').remove(); }
    function giveLike(t) { db.ref('ranking/' + t + '/likes').transaction(c => (c || 0) + 1); }
    function logout() { localStorage.clear(); location.reload(); }

</script>
</body>
</html>
