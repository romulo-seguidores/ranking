<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>RANK CLASSE V6 - ELITE EDITION</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        /* CONFIGURAÇÕES DE CORES E VARIÁVEIS */
        :root {
            --ouro: #ffd700;
            --prata: #e0e0e0;
            --bronze: #cd7f32;
            --neon: #00ff88;
            --sky: #00d4ff;
            --danger: #ff4444;
            --deep-dark: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --shadow-heavy: 0 30px 60px rgba(0,0,0,0.9);
        }

        /* RESET GERAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--deep-dark);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* SCROLLBAR PERSONALIZADA */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 10px; }

        /* CONTAINER PRINCIPAL */
        #app {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            position: relative;
            min-height: 100vh;
        }

        /* EFEITOS DE ANIMAÇÃO */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px var(--neon); }
            50% { box-shadow: 0 0 20px var(--neon); }
            100% { box-shadow: 0 0 5px var(--neon); }
        }

        @keyframes goldGlow {
            0% { text-shadow: 0 0 5px var(--ouro); }
            50% { text-shadow: 0 0 25px var(--ouro); }
            100% { text-shadow: 0 0 5px var(--ouro); }
        }

        @keyframes levelUpPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* COMPONENTES GLASSMORPHISM */
        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            padding: 35px;
            box-shadow: var(--shadow-heavy);
            animation: fadeInUp 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* HEADER DE PERFIL */
        .user-profile-header {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
            border-radius: 35px;
            padding: 25px;
            border: 1px solid var(--border-glass);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .user-profile-header::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 100px; height: 100px;
            background: var(--neon);
            filter: blur(80px);
            opacity: 0.1;
        }

        .lvl-tag {
            background: var(--ouro);
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .xp-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon), var(--sky));
            width: 0%;
            transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* STATUS DOT INDICATORS */
        .status-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
        .dot-on { background: var(--neon); animation: neonPulse 2s infinite; }
        .dot-off { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .status-txt { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }

        /* LISTA DE RANKING */
        .rank-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 22px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .rank-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .rank-card.top-1 {
            border: 1.5px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.07), transparent);
        }

        /* INPUTS E BOTÕES ESTILO MÍDIA */
        .input-box {
            width: 100%;
            background: #080808;
            border: 1.5px solid #151515;
            padding: 18px 22px;
            border-radius: 22px;
            color: #fff;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .btn-action {
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            border: none;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 15px;
        }

        .btn-primary { background: #ffffff; color: #000; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,255,255,0.2); }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #222;
            color: #666;
        }

        .btn-outline:hover {
            border-color: #fff;
            color: #fff;
        }

        /* INSTAGRAM BUTTON */
        .insta-link {
            font-size: 10px;
            font-weight: 800;
            color: #888;
            text-decoration: none;
            text-transform: uppercase;
            border: 1px solid #222;
            padding: 6px 14px;
            border-radius: 14px;
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
        }

        .insta-link:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* SISTEMA DE CHAT */
        #chat-floating {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 280px;
            height: 380px;
            background: rgba(5, 5, 5, 0.98);
            border: 1px solid #1a1a1a;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999;
            box-shadow: 0 30px 80px rgba(0,0,0,1);
            backdrop-filter: blur(15px);
        }

        #chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble {
            background: rgba(255,255,255,0.03);
            padding: 10px 15px;
            border-radius: 15px;
            border-left: 3px solid var(--neon);
        }

        .msg-bubble b { color: var(--neon); text-transform: lowercase; margin-right: 5px; }

        /* MODAL DE LEVEL UP */
        #level-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            background: #000;
            border: 2px solid var(--ouro);
            border-radius: 40px;
            z-index: 9999;
            text-align: center;
            padding: 40px 20px;
            animation: levelUpPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.4);
        }

        /* PAINEL ADMIN EXCLUSIVO */
        .admin-card-box {
            background: #080808;
            border: 1px solid #1a1a1a;
            padding: 25px;
            border-radius: 35px;
            margin-bottom: 20px;
        }

        .admin-control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-adm {
            padding: 12px;
            border-radius: 15px;
            border: none;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* CLASSES AUXILIARES */
        .hidden { display: none !important; }
        .text-neon { color: var(--neon); }
        .text-danger { color: var(--danger); }
        .creator-tag { position: fixed; bottom: 15px; left: 30px; font-size: 10px; color: #222; font-weight: 900; z-index: -1; }

    </style>
</head>
<body>

<div id="app">
    
    <section id="view-auth" class="glass-container">
        <h1 style="font-weight: 900; font-size: 40px; letter-spacing: -2.5px; margin: 0; line-height: 1;">RANK<span style="color:var(--neon)">CLASSE</span></h1>
        <p style="font-size: 10px; color: #555; margin-bottom: 40px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;">Sistema Regional de Elite</p>
        
        <div id="auth-form-data">
            <input type="text" id="reg-turma" class="input-box" placeholder="Nome da Turma">
            <input type="text" id="reg-serie" class="input-box" placeholder="Série / Ano (Ex: 3º B)">
            <input type="text" id="reg-escola" class="input-box" placeholder="Nome da Escola">
            <input type="url" id="reg-insta" class="input-box" placeholder="URL do Instagram">
            <input type="password" id="reg-pass" class="input-box" placeholder="Senha da Turma">
            <select id="reg-aura" class="input-box">
                <option value="⚡ ELÉTRICO">Aura: Elétrica</option>
                <option value="🔥 FOGO">Aura: Fogo</option>
                <option value="❄️ GELO">Aura: Gelo</option>
                <option value="🌑 VAZIO">Aura: Vazio</option>
            </select>
            <button class="btn-action btn-primary" onclick="accountLogin()">ACESSAR SISTEMA</button>
            <button class="btn-action btn-outline" onclick="accessGuest()">VISUALIZAR RANKING</button>
        </div>
        <button onclick="toggleAdminLogin()" style="background:none; border:none; color:#111; font-size:9px; margin-top:20px; cursor:pointer; font-weight:900;">ACESSAR MODO ROOT</button>
    </section>

    <section id="view-admin-auth" class="hidden glass-container">
        <h2 style="color: var(--neon); margin-bottom: 20px; letter-spacing: -1px;">ROOT LOGIN</h2>
        <input type="text" id="adm-user" class="input-box" placeholder="Usuário Admin">
        <input type="password" id="adm-pass" class="input-box" placeholder="Senha Root">
        <button class="btn-action btn-primary" onclick="verifyAdmin()">ENTRAR NO TERMINAL</button>
        <button class="btn-action btn-outline" onclick="location.reload()">VOLTAR</button>
    </section>

    <section id="view-ranking" class="hidden">
        <div class="user-profile-header">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <span style="font-size: 9px; color: #555; font-weight: 800; text-transform: uppercase;">Membro Identificado</span>
                    <h2 id="me-display-name" style="margin: 0; font-size: 24px; color: var(--neon); letter-spacing: -1.2px;">---</h2>
                </div>
                <div><span id="me-lvl-badge" class="lvl-tag">LVL 0</span></div>
            </div>
            <div class="xp-bar-bg"><div id="me-xp-fill" class="xp-bar-fill"></div></div>
        </div>

        <div id="ranking-feed"></div>

        <button class="btn-action btn-outline" style="margin-top: 60px;" onclick="logOut()">DESCONECTAR DA SESSÃO</button>
    </section>

    <section id="view-admin-panel" class="hidden glass-container" style="max-width: 100%;">
        <h2 style="color: var(--neon); margin-bottom: 25px; text-align: center;">ROOT DASHBOARD</h2>
        <button class="btn-action" style="background:var(--danger); color:white; font-size:11px;" onclick="resetChatHistory()">LIMPAR TODAS AS MENSAGENS</button>
        <div id="admin-tools-feed"></div>
        <button class="btn-action btn-outline" onclick="location.reload()">ENCERRAR ROOT</button>
    </section>

    <div id="chat-floating" class="hidden">
        <div id="chat-body"></div>
        <div style="padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #111;">
            <input type="text" id="chat-msg-in" placeholder="Sua mensagem..." style="background:#080808; border:1px solid #1a1a1a; padding:12px; border-radius:18px; color:#fff; flex:1; font-size:12px;">
            <button onclick="pushChatMessage()" style="background:var(--neon); border:none; border-radius:18px; padding:0 20px; font-weight:900;">></button>
        </div>
    </div>

    <div id="level-modal" class="hidden">
        <h1 style="color: var(--ouro); font-size: 40px; margin: 0;">LEVEL UP!</h1>
        <p id="level-txt" style="font-size: 16px; margin: 20px 0; color: #fff;"></p>
        <button class="btn-action btn-primary" onclick="closeLevelModal()">RECEBER RECOMPENSA</button>
    </div>

    <div class="creator-tag">SYSTEM BY RÔMULO | V6.0</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- CONFIGURAÇÃO DO BANCO DE DADOS ---
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/",
        projectId: "gincanaescola-d4f8c"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userSession = null;
    let isAdmin = false;
    let previousLevel = -1;

    // --- SISTEMA DE CÁLCULO DE TEMPO RELATIVO ---
    function computeTimeAgo(timestamp) {
        if(!timestamp) return "---";
        const diff = Date.now() - timestamp;
        const s = Math.floor(diff / 1000);
        const m = Math.floor(s / 60);
        const h = Math.floor(m / 60);
        const d = Math.floor(h / 24);

        if (s < 40) return "AGORA";
        if (m < 60) return m + " MIN";
        if (h < 24) return h + " HRS";
        return d + " DIAS";
    }

    // --- CONTROLE DE SESSÃO (PERSISTÊNCIA) ---
    window.onload = () => {
        const localData = localStorage.getItem('rank_classe_v6_session');
        if(localData) {
            userSession = JSON.parse(localData);
            startApplication();
        }
    };

    function accountLogin() {
        const turma = document.getElementById('reg-turma').value.trim();
        const senha = document.getElementById('reg-pass').value;
        if(!turma || !senha) return alert("Preencha Turma e Senha!");

        database.ref('ranking/' + turma).once('value', snap => {
            const current = snap.val();
            if(current && current.pass !== senha) return alert("Acesso negado: Senha inválida.");

            const data = {
                turma: turma, pass: senha,
                serie: document.getElementById('reg-serie').value || (current ? current.serie : "NI"),
                escola: document.getElementById('reg-escola').value || (current ? current.escola : "NI"),
                insta: document.getElementById('reg-insta').value || (current ? current.insta : "#"),
                aura: document.getElementById('reg-aura').value,
                pontos: current ? current.pontos : 0,
                likes: current ? current.likes : 0,
                lastSeen: Date.now()
            };

            database.ref('ranking/' + turma).update(data).then(() => {
                userSession = data;
                localStorage.setItem('rank_classe_v6_session', JSON.stringify(data));
                startApplication();
            });
        });
    }

    function startApplication() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-ranking').classList.remove('hidden');
        document.getElementById('chat-floating').classList.remove('hidden');
        
        if(userSession.turma !== "Espectador") {
            // HEARTBEAT (Mantém o status online)
            setInterval(() => {
                database.ref('ranking/' + userSession.turma).update({ lastSeen: Date.now() });
            }, 15000);
        }
        observeRanking();
    }

    // --- ESCUTA O RANKING EM TEMPO REAL ---
    function observeRanking() {
        database.ref('ranking').on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const container = document.getElementById('ranking-feed');
            const sortedArray = Object.values(data).sort((a,b) => b.pontos - a.pontos);
            
            container.innerHTML = "";
            sortedArray.forEach((item, i) => {
                const online = (Date.now() - (item.lastSeen || 0)) < 45000;
                const timeText = computeTimeAgo(item.lastSeen);
                const lvl = Math.floor((item.pontos || 0) / 10);

                // Lógica de atualização do Perfil Logado
                if(userSession && item.turma === userSession.turma) {
                    document.getElementById('me-display-name').innerText = item.turma;
                    document.getElementById('me-lvl-badge').innerText = "LVL " + lvl;
                    document.getElementById('me-xp-fill').style.width = ((item.pontos % 10) * 10) + "%";
                    
                    if(previousLevel !== -1 && lvl > previousLevel) {
                        showLevelModal(lvl);
                    }
                    previousLevel = lvl;
                }

                container.innerHTML += `
                    <div class="rank-card ${i === 0 ? 'top-1' : ''}">
                        <div style="flex:1">
                            <div class="status-wrapper">
                                <span class="dot ${online ? 'dot-on' : 'dot-off'}"></span>
                                <span class="status-txt ${online ? 'text-neon' : 'text-danger'}">Online a ${timeText}</span>
                            </div>
                            <b style="font-size: 19px; display:block; letter-spacing:-0.8px;">${i+1}. ${item.turma}</b>
                            <span style="font-size: 10px; color: #444; font-weight:800; text-transform:uppercase;">${item.escola} • ${item.serie}</span>
                            <br><a href="${item.insta}" target="_blank" class="insta-link">Instagram</a>
                            <div style="margin-top: 15px;">
                                <button class="btn-adm" style="background:rgba(255,255,255,0.03); border:1px solid #222; color:#fff; width:auto; padding:8px 15px;" onclick="addVoto('${item.turma}')">🔥 ${item.likes || 0}</button>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 28px; font-weight: 900; color: var(--ouro); line-height:1; animation: goldGlow 3s infinite;">${item.pontos || 0}</div>
                            <div style="font-size: 9px; color: #333; font-weight:900;">PONTOS</div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- TERMINAL ADMINISTRATIVO ---
    function toggleAdminLogin() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-admin-auth').classList.remove('hidden');
    }

    function verifyAdmin() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === "admin" && p === "admin123") {
            isAdmin = true;
            document.getElementById('view-admin-auth').classList.add('hidden');
            document.getElementById('view-admin-panel').classList.remove('hidden');
            setupAdminDashboard();
        } else alert("ACESSO NEGADO: VOCÊ NÃO É ROOT.");
    }

    function setupAdminDashboard() {
        database.ref('ranking').on('value', snap => {
            const feed = document.getElementById('admin-tools-feed');
            feed.innerHTML = "";
            Object.values(snap.val()).forEach(t => {
                feed.innerHTML += `
                    <div class="admin-card-box">
                        <b style="color:var(--neon); font-size:18px;">${t.turma}</b>
                        <div class="admin-control-grid">
                            <button class="btn-adm" style="background:var(--neon); color:#000;" onclick="changePoints('${t.turma}', 1)">+1 Ponto</button>
                            <button class="btn-adm" style="background:#222; color:#fff;" onclick="changePoints('${t.turma}', -1)">-1 Ponto</button>
                            <button class="btn-adm" style="background:var(--sky); color:#000;" onclick="clearLikes('${t.turma}')">Resetar Likes</button>
                            <button class="btn-adm" style="background:var(--danger); color:#fff;" onclick="banishTurma('${t.turma}')">Banir</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    function changePoints(t, v) { database.ref('ranking/' + t + '/pontos').transaction(c => (c || 0) + v); }
    function clearLikes(t) { database.ref('ranking/' + t + '/likes').set(0); }
    function banishTurma(t) { if(confirm("Confirmar banimento de "+t+"?")) database.ref('ranking/'+t).remove(); }
    function resetChatHistory() { if(confirm("Apagar histórico do chat?")) database.ref('global_chat').remove(); }

    // --- MECÂNICA DE CHAT ---
    function pushChatMessage() {
        const input = document.getElementById('chat-msg-in');
        if(!input.value || !userSession) return;
        database.ref('global_chat').push({ u: userSession.turma, t: input.value });
        input.value = "";
    }

    database.ref('global_chat').limitToLast(25).on('value', snap => {
        const box = document.getElementById('chat-body');
        box.innerHTML = "";
        snap.forEach(m => {
            box.innerHTML += `<div class="msg-bubble"><b>${m.val().u}:</b> ${m.val().t}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    // --- FUNÇÕES DE INTERFACE ---
    function addVoto(t) { database.ref('ranking/' + t + '/likes').transaction(c => (c || 0) + 1); }
    function accessGuest() { userSession = { turma: "Espectador" }; startApplication(); }
    function logOut() { localStorage.clear(); location.reload(); }
    function showLevelModal(l) { 
        document.getElementById('level-txt').innerText = "Sua turma subiu para o Nível " + l + "!";
        document.getElementById('level-modal').classList.remove('hidden');
    }
    function closeLevelModal() { document.getElementById('level-modal').classList.add('hidden'); }
</script>

</body>
</html>
