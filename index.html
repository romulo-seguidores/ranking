<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe v5 - Elite Regional</title>

    <style>
        /* --- ESTILO "MÍDIA" COMPLETO --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap');

        :root {
            --ouro: #ffd700;
            --prata: #e0e0e0;
            --bronze: #cd7f32;
            --neon: #00ff88;
            --danger: #ff4444;
            --bg: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Poppins', sans-serif; display: flex; 
            justify-content: center; overflow-x: hidden;
        }

        #app { width: 100%; max-width: 440px; min-height: 100vh; padding: 20px; position: relative; }

        /* ANIMAÇÕES DE ENTRADA */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseNeon { 0% { box-shadow: 0 0 5px var(--neon); } 50% { box-shadow: 0 0 15px var(--neon); } 100% { box-shadow: 0 0 5px var(--neon); } }

        /* GLASSMORPHISM */
        .glass-box { 
            background: var(--glass); backdrop-filter: blur(25px); 
            border: 1px solid var(--border); border-radius: 35px; 
            padding: 30px; margin-top: 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            animation: slideUp 0.5s ease-out;
        }

        /* HEADER & SISTEMA DE NÍVEL */
        .header-panel { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            padding: 22px; border-radius: 28px; border: 1px solid var(--border);
            margin-bottom: 25px; position: relative; overflow: hidden;
        }
        .header-panel::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon); }

        .xp-container { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .xp-bar { height: 100%; background: linear-gradient(90deg, var(--neon), #00d4ff); width: 0%; transition: 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .lvl-badge { 
            font-size: 11px; font-weight: 900; background: var(--ouro); 
            color: black; padding: 3px 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(255,215,0,0.3);
        }

        /* STATUS INDICATOR (A BOLINHA) */
        .status-tag { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-on { background: var(--neon); animation: pulseNeon 2s infinite; }
        .dot-off { background: var(--danger); }
        .text-on { color: var(--neon); text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .text-off { color: var(--danger); text-shadow: 0 0 10px rgba(255,68,68,0.3); }

        /* RANKING CARDS */
        .card-rank { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 28px; padding: 20px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center; transition: 0.4s;
            position: relative;
        }
        .card-rank:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
        .top-gold { border: 1px solid rgba(255, 215, 0, 0.3); background: rgba(255, 215, 0, 0.05); }

        /* INSTAGRAM & VOTOS */
        .insta-btn {
            font-size: 9px; color: #888; text-decoration: none; border: 1px solid #222;
            padding: 5px 14px; border-radius: 12px; display: inline-block; margin-top: 12px;
            font-weight: 700; text-transform: uppercase; transition: 0.3s; background: rgba(0,0,0,0.2);
        }
        .insta-btn:hover { background: white; color: black; border-color: white; }

        .vote-area { display: flex; gap: 8px; margin-top: 15px; }
        .btn-vote { 
            background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; color: #ccc;
            padding: 7px 15px; border-radius: 14px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-vote:active { transform: scale(0.9); }

        /* FORMULÁRIO "MÍDIA" */
        input, select { 
            width: 100%; background: #0a0a0a; border: 1px solid #1a1a1a; 
            padding: 16px; border-radius: 18px; color: white; margin-bottom: 12px; outline: none;
            font-family: 'Poppins'; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        
        .btn-main { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            font-weight: 900; cursor: pointer; transition: 0.3s; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 2px; font-size: 13px;
        }
        .btn-glow { background: white; color: black; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn-dark { background: #111; color: #555; border: 1px solid #1a1a1a; }

        /* CHAT SISTEM */
        #chat-ui {
            position: fixed; bottom: 20px; right: 20px; width: 240px; height: 320px;
            background: rgba(5, 5, 5, 0.95); border: 1px solid #1a1a1a; border-radius: 25px;
            display: flex; flex-direction: column; overflow: hidden; z-index: 999;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        }
        #chat-logs { flex: 1; padding: 15px; overflow-y: auto; font-size: 11px; }
        .chat-line { margin-bottom: 10px; line-height: 1.4; animation: slideUp 0.3s ease; }
        .chat-line b { color: var(--neon); font-weight: 800; text-transform: lowercase; margin-right: 5px; }

        /* ADMIN PANEL UI */
        .admin-box { background: #080808; border: 1px solid #1a1a1a; padding: 20px; border-radius: 25px; margin-bottom: 15px; text-align: left; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-adm { padding: 8px; border-radius: 10px; border: none; font-size: 10px; font-weight: 800; cursor: pointer; }
        .bg-red { background: var(--danger); color: white; }
        .bg-blue { background: #0088ff; color: white; }
        .bg-green { background: var(--neon); color: black; }

        .hidden { display: none !important; }
        .creator { position: fixed; bottom: 10px; left: 20px; font-size: 9px; color: #333; font-weight: 900; }
    </style>
</head>
<body>

<div id="app">
    <section id="view-auth" class="glass-box">
        <h1 style="font-weight: 900; font-size: 32px; letter-spacing: -1.5px; margin: 0;">RANK<span style="color:var(--neon)">CLASSE</span></h1>
        <p style="font-size: 10px; color: #444; margin-bottom: 30px; font-weight: 700;">ELITE MANAGEMENT SYSTEM v5.2</p>
        
        <div id="form-container">
            <input type="text" id="reg-name" placeholder="Nome da Turma">
            <input type="text" id="reg-sub" placeholder="Série/Ano (Ex: 2º Médio A)">
            <input type="text" id="reg-school" placeholder="Nome da Instituição">
            <input type="url" id="reg-link" placeholder="URL do Instagram">
            <input type="password" id="reg-key" placeholder="Senha de Segurança">
            <select id="reg-style">
                <option value="⚡ ELÉTRICO">Style: Elétrico</option>
                <option value="🔥 FOGO">Style: Fogo</option>
                <option value="❄️ GELO">Style: Gelo</option>
                <option value="🌑 VAZIO">Style: Vazio</option>
            </select>
            <button class="btn-main btn-glow" onclick="handleAuth()">ENTRAR NO CLÃ</button>
            <button class="btn-main btn-dark" onclick="guestMode()">MODO ESPECTADOR</button>
        </div>
        <button onclick="showAdminLogin()" style="background:none; border:none; color:#111; font-size:9px; margin-top:20px; cursor:pointer;">ACESSAR TERMINAL ROOT</button>
    </section>

    <section id="view-admin-login" class="hidden glass-box">
        <h2 style="color: var(--neon);">ROOT ACCESS</h2>
        <input type="text" id="adm-u" placeholder="Admin User">
        <input type="password" id="adm-p" placeholder="Root Password">
        <button class="btn-main btn-glow" onclick="authAdmin()">VALIDAR</button>
        <button class="btn-main btn-dark" onclick="location.reload()">CANCELAR</button>
    </section>

    <section id="view-ranking" class="hidden">
        <div class="header-panel">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <span style="font-size: 9px; color: #666; font-weight: 800; text-transform: uppercase;">Membro Autenticado</span>
                    <h2 id="me-name" style="margin: 0; font-size: 20px; color: var(--neon); letter-spacing: -0.5px;">---</h2>
                </div>
                <div id="me-lvl-box"><span id="me-lvl" class="lvl-badge">LVL 0</span></div>
            </div>
            <div class="xp-container"><div id="me-xp" class="xp-bar"></div></div>
        </div>

        <div id="main-list"></div>

        <button class="btn-main btn-dark" style="margin-top: 40px;" onclick="killSession()">ENCERRAR SESSÃO</button>
    </section>

    <section id="view-admin-panel" class="hidden glass-box" style="max-width: 100%;">
        <h2 style="color: var(--neon); margin-bottom: 20px;">COMMAND CENTER</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <button class="btn-adm bg-red" onclick="resetMessages()">LIMPAR CHAT</button>
            <button class="btn-adm bg-blue" onclick="location.reload()">SAIR ADMIN</button>
        </div>
        <div id="admin-list-tools"></div>
    </section>

    <div id="chat-ui" class="hidden">
        <div id="chat-logs"></div>
        <div style="padding: 12px; background: #0a0a0a; display: flex; gap: 8px; border-top: 1px solid #1a1a1a;">
            <input type="text" id="chat-in" placeholder="Escreva aqui..." style="margin:0; padding:10px; font-size:12px; border-radius:12px;">
            <button onclick="pushMsg()" style="background:var(--neon); border:none; border-radius:12px; padding:0 15px; font-weight:900; color:black;">></button>
        </div>
    </div>

    <div class="creator">DEV BY RÔMULO</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- DATABASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/",
        projectId: "gincanaescola-d4f8c"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let session = null;
    let isAdmin = false;

    // --- LÓGICA DE TEMPO (O CORAÇÃO DO STATUS) ---
    function getTimeAgo(ts) {
        if(!ts) return "---";
        const now = Date.now();
        const diff = now - ts;
        const s = Math.floor(diff / 1000);
        const m = Math.floor(s / 60);
        const h = Math.floor(m / 60);
        const d = Math.floor(h / 24);

        if (s < 40) return "AGORA";
        if (m < 60) return m + " MIN";
        if (h < 24) return h + " HRS";
        return d + " DIAS";
    }

    // --- PERSISTÊNCIA ---
    window.onload = () => {
        const local = localStorage.getItem('elite_session');
        if(local) {
            session = JSON.parse(local);
            startApp();
        }
    };

    function handleAuth() {
        const n = document.getElementById('reg-name').value.trim();
        const k = document.getElementById('reg-key').value;
        if(!n || !k) return alert("Nome e Senha são obrigatórios!");

        database.ref('ranking/' + n).once('value', snap => {
            const val = snap.val();
            if(val && val.pass !== k) return alert("Chave de acesso inválida!");

            const payload = {
                turma: n, pass: k,
                serie: document.getElementById('reg-sub').value || (val ? val.serie : "S/S"),
                escola: document.getElementById('reg-school').value || (val ? val.escola : "S/E"),
                insta: document.getElementById('reg-link').value || (val ? val.insta : "#"),
                power: document.getElementById('reg-style').value,
                pontos: val ? val.pontos : 0,
                likes: val ? val.likes : 0,
                lastSeen: Date.now()
            };

            database.ref('ranking/' + n).update(payload).then(() => {
                session = payload;
                localStorage.setItem('elite_session', JSON.stringify(payload));
                startApp();
            });
        });
    }

    function startApp() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-ranking').classList.remove('hidden');
        document.getElementById('chat-ui').classList.remove('hidden');
        
        if(session.turma !== "Guest") {
            // Heartbeat para manter online
            setInterval(() => {
                database.ref('ranking/' + session.turma).update({ lastSeen: Date.now() });
            }, 15000);
        }
        syncData();
    }

    function syncData() {
        database.ref('ranking').on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const list = document.getElementById('main-list');
            const arr = Object.values(data).sort((a,b) => b.pontos - a.pontos);
            
            list.innerHTML = "";
            arr.forEach((item, i) => {
                const online = (Date.now() - (item.lastSeen || 0)) < 45000;
                const timeStr = getTimeAgo(item.lastSeen);
                const lvl = Math.floor((item.pontos || 0) / 10);

                if(session && item.turma === session.turma) {
                    document.getElementById('me-name').innerText = item.turma;
                    document.getElementById('me-lvl').innerText = "LVL " + lvl;
                    document.getElementById('me-xp').style.width = ((item.pontos % 10) * 10) + "%";
                }

                list.innerHTML += `
                    <div class="card-rank ${i === 0 ? 'top-gold' : ''}">
                        <div style="flex:1">
                            <div class="status-tag">
                                <span class="status-dot ${online ? 'dot-on' : 'dot-off'}"></span>
                                <span class="${online ? 'text-on' : 'text-off'}">Online há ${timeStr}</span>
                            </div>
                            <b style="font-size: 17px; display:block;">${i+1}. ${item.turma}</b>
                            <span style="font-size: 10px; color: #444;">${item.escola} • ${item.serie}</span>
                            <br><a href="${item.insta}" target="_blank" class="insta-btn">Instagram</a>
                            <div class="vote-area">
                                <button class="btn-vote" onclick="upVote('${item.turma}')">🔥 ${item.likes || 0}</button>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 26px; font-weight: 900; color: var(--ouro); line-height:1;">${item.pontos || 0}</div>
                            <div style="font-size: 9px; color: #444; font-weight:800;">PTS | LVL ${lvl}</div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- ADMIN ACTIONS ---
    function authAdmin() {
        if(document.getElementById('adm-u').value === "admin" && document.getElementById('adm-p').value === "admin123") {
            isAdmin = true;
            document.getElementById('view-admin-login').classList.add('hidden');
            document.getElementById('view-admin-panel').classList.remove('hidden');
            loadAdminTools();
        } else alert("Acesso negado.");
    }

    function loadAdminTools() {
        database.ref('ranking').on('value', snap => {
            const area = document.getElementById('admin-list-tools');
            area.innerHTML = "";
            Object.values(snap.val()).forEach(t => {
                area.innerHTML += `
                    <div class="admin-box">
                        <b>${t.turma}</b>
                        <div class="admin-grid">
                            <button class="btn-adm bg-green" onclick="modPoints('${t.turma}', 1)">+1 PT</button>
                            <button class="btn-adm bg-red" onclick="modPoints('${t.turma}', -1)">-1 PT</button>
                            <button class="btn-adm bg-blue" onclick="resetLikes('${t.turma}')">Zerar Likes</button>
                            <button class="btn-adm bg-red" onclick="deleteAcc('${t.turma}')">Banir</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    function modPoints(t, v) { database.ref('ranking/' + t + '/pontos').transaction(c => (c || 0) + v); }
    function resetLikes(t) { database.ref('ranking/' + t + '/likes').set(0); }
    function deleteAcc(t) { if(confirm("Banir "+t+"?")) database.ref('ranking/'+t).remove(); }
    function resetMessages() { if(confirm("Limpar chat?")) database.ref('mensagens').remove(); }

    // --- CHAT LOGIC ---
    function pushMsg() {
        const i = document.getElementById('chat-in');
        if(!i.value || !session) return;
        database.ref('mensagens').push({ u: session.turma, t: i.value });
        i.value = "";
    }

    database.ref('mensagens').limitToLast(20).on('value', snap => {
        const box = document.getElementById('chat-logs');
        box.innerHTML = "";
        snap.forEach(m => {
            box.innerHTML += `<div class="chat-line"><b>${m.val().u}:</b> ${m.val().t}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    // --- UTILS ---
    function upVote(t) { database.ref('ranking/' + t + '/likes').transaction(c => (c || 0) + 1); }
    function guestMode() { session = { turma: "Guest" }; startApp(); }
    function killSession() { localStorage.clear(); location.reload(); }
    function showAdminLogin() { document.getElementById('view-auth').classList.add('hidden'); document.getElementById('view-admin-login').classList.remove('hidden'); }
</script>

</body>
</html>
