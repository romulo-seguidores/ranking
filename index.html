<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Rank Classe - Elite V8</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap');

        /* CONFIGURAÇÕES DE CORES E AURAS */
        :root {
            --neon: #00ff88;
            --ouro: linear-gradient(135deg, #ffd700, #b8860b);
            --prata: linear-gradient(135deg, #e0e0e0, #707070);
            --bronze: linear-gradient(135deg, #cd7f32, #8b4513);
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* AURAS ESPECÍFICAS */
        .aura-beta { filter: drop-shadow(0 0 10px #00d4ff); color: #00d4ff !important; }
        .aura-elite { filter: drop-shadow(0 0 10px #ffd700); color: #ffd700 !important; }
        .aura-sigma { filter: drop-shadow(0 0 15px #ff0055); color: #ff0055 !important; }
        .aura-omega { filter: drop-shadow(0 0 15px #a855f7); color: #a855f7 !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        #app { width: 100%; max-width: 450px; margin: 0 auto; padding: 20px; min-height: 100vh; }

        /* GLASSMORPHISM */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 35px; padding: 30px;
            margin-bottom: 25px; animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* LOGO E TEXTO */
        .logo { font-size: 35px; font-weight: 900; letter-spacing: -2px; text-align: center; }
        .logo span { color: var(--neon); }

        /* INPUTS ESTILIZADOS */
        input, select {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 18px;
            border: 1px solid #1a1a1a; background: #080808; color: white; font-size: 14px;
        }
        input:focus { border-color: var(--neon); }

        .btn-main {
            width: 100%; padding: 20px; border-radius: 18px; border: none;
            background: linear-gradient(90deg, #00ff88, #00d4ff); color: black;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* MEDALHAS 3D */
        .medal {
            width: 45px; height: 45px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .m-1 { background: var(--ouro); color: #4b3b00; }
        .m-2 { background: var(--prata); color: #333; }
        .m-3 { background: var(--bronze); color: #3d1f00; }
        .m-normal { background: #1a1a1a; color: #555; }

        /* LISTA RANKING */
        .rank-item {
            display: flex; align-items: center; background: rgba(255,255,255,0.02);
            padding: 15px; border-radius: 25px; margin-bottom: 12px; border: 1px solid var(--border);
        }

        /* STATUS */
        .status-box { font-size: 10px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; }
        .online-now { color: var(--neon); }
        .offline-now { color: #ff4444; }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }

        /* LEVEL UP ANIMATION */
        #level-up-alert {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            background: var(--neon); color: black; padding: 20px 40px; border-radius: 50px;
            font-weight: 900; z-index: 1000; box-shadow: 0 0 30px var(--neon); display: none;
        }

        /* CHAT WINDOW */
        #chat-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column;
        }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { background: #111; padding: 12px 18px; border-radius: 20px; max-width: 80%; border: 1px solid #222; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="level-up-alert">🚀 LEVEL UP! NÍVEL <span id="lv-num">2</span></div>

    <div id="app">
        <section id="auth-screen" class="glass-card">
            <h1 class="logo">RANK<span>CLASSE</span></h1>
            <p style="text-align: center; font-size: 10px; color: #555; margin-bottom: 25px;">SINCRONIZANDO CONTA...</p>
            
            <input type="text" id="reg-turma" placeholder="Nome da Sala (ex: 3º A)">
            <input type="text" id="reg-serie" placeholder="Série/Ano">
            <input type="url" id="reg-insta" placeholder="Link do Instagram da Turma">
            <input type="password" id="reg-pass" placeholder="Senha">
            <select id="reg-aura">
                <option value="aura-beta">🔹 Aura Beta</option>
                <option value="aura-elite">👑 Aura Elite</option>
                <option value="aura-sigma">🗿 Aura Sigma</option>
                <option value="aura-omega">🌌 Aura Omega</option>
            </select>
            
            <button onclick="logar()" class="btn-main">ENTRAR NA ELITE</button>
            <button onclick="visitante()" style="background:none; border:none; color:#555; width:100%; margin-top:15px; font-weight:bold;">Entrar como Visitante</button>
            <p onclick="irAdmin()" style="text-align:center; color:#222; font-size:9px; margin-top:30px;">PAINEL CENTRAL</p>
        </section>

        <section id="rank-screen" class="hidden">
            <div class="glass-card" style="text-align: center;">
                <h2 id="display-turma" class="aura-elite">---</h2>
                <p id="display-serie" style="font-size: 12px; color: #888;">Série ---</p>
                <div style="background: rgba(0,255,136,0.1); padding: 5px 15px; border-radius: 50px; display: inline-block; margin-top: 10px;">
                    <span style="font-weight: 900; color: var(--neon);">NÍVEL <span id="meu-nivel">1</span></span>
                </div>
                
                <div style="display: flex; justify-content: space-around; margin-top: 25px;">
                    <div><b id="pts-val" style="font-size: 24px; color: var(--neon);">0</b><br><small>PONTOS</small></div>
                    <div><b id="seg-val" style="font-size: 24px;">0</b><br><small>SEGUIDORES</small></div>
                </div>
            </div>

            <h3 style="margin-bottom: 15px; font-size: 14px; letter-spacing: 2px;">🏆 CLASSIFICAÇÃO</h3>
            <div id="lista-ranking"></div>

            <div style="height: 100px;"></div>
        </section>

        <section id="admin-panel" class="hidden glass-card">
            <h2>🛠 GERENCIADOR</h2>
            <div id="admin-list" style="margin-top: 20px;"></div>
            <button onclick="window.location.reload()" class="btn-main" style="background:#222; color:white; margin-top:20px;">SAIR</button>
        </section>
    </div>

    <div id="btn-chat" class="hidden" onclick="toggleChat(true)" style="position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px; background: var(--neon); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 10px 20px rgba(0,255,136,0.3); z-index: 1000;">💬</div>

    <div id="chat-window">
        <div style="padding: 25px; border-bottom: 1px solid #111; display:flex; justify-content:space-between;">
            <b style="color: var(--neon);">ELITE CHAT</b>
            <span onclick="toggleChat(false)" style="color: red; font-weight: 900;">FECHAR</span>
        </div>
        <div id="chat-msgs"></div>
        <div style="padding: 20px; display: flex; gap: 10px; background: #050505;">
            <input type="text" id="chat-input" style="margin:0" placeholder="Mande a mensagem...">
            <button onclick="enviarChat()" class="btn-main" style="width: 70px; padding:0;">></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const database = firebase.database();

        let userAtivo = null;
        let lastLevel = 1;

        // VERIFICAR LOGIN SALVO
        window.onload = () => {
            const salvo = localStorage.getItem('elite_rank_user');
            if(salvo) {
                const dados = JSON.parse(salvo);
                document.getElementById('reg-turma').value = dados.turma;
                document.getElementById('reg-pass').value = dados.pass;
            }
        };

        function logar() {
            const t = document.getElementById('reg-turma').value.trim();
            const p = document.getElementById('reg-pass').value;
            const i = document.getElementById('reg-insta').value;
            const s = document.getElementById('reg-serie').value;
            const a = document.getElementById('reg-aura').value;

            if(!t || !p) return alert("Preencha Turma e Senha!");

            database.ref('ranking/' + t).once('value', snap => {
                let dados = snap.val();
                if(dados && dados.pass !== p) return alert("Senha Incorreta!");

                if(!dados) {
                    dados = { turma: t, pass: p, insta: i, serie: s, aura: a, pontos: 0, seguidores: 0, videos: 0, online: Date.now() };
                    database.ref('ranking/' + t).set(dados);
                }
                
                userAtivo = dados;
                localStorage.setItem('elite_rank_user', JSON.stringify({turma:t, pass:p}));
                iniciarApp();
            });
        }

        function visitante() {
            userAtivo = { turma: "Visitante", ponto: 0 };
            iniciarApp(true);
        }

        function iniciarApp(isVisit = false) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            if(!isVisit) {
                document.getElementById('btn-chat').classList.remove('hidden');
                setInterval(() => database.ref('ranking/' + userAtivo.turma).update({ online: Date.now() }), 10000);
            }
            carregarRanking();
        }

        function carregarRanking() {
            database.ref('ranking').on('value', snap => {
                const lista = document.getElementById('lista-ranking');
                const dados = snap.val();
                if(!dados) return;

                const ordenado = Object.values(dados).sort((a,b) => b.pontos - a.pontos);
                lista.innerHTML = "";

                ordenado.forEach((t, i) => {
                    const level = Math.floor(t.pontos / 10) + 1;
                    const diff = Date.now() - t.online;
                    const isOnline = diff < 20000;
                    const isRecente = diff < 120000; // 2 min

                    // Medalhas
                    let mClass = i === 0 ? 'm-1' : i === 1 ? 'm-2' : i === 2 ? 'm-3' : 'm-normal';
                    let mText = i < 3 ? '' : i + 1;

                    if(userAtivo && t.turma === userAtivo.turma) {
                        document.getElementById('display-turma').innerText = t.turma;
                        document.getElementById('display-turma').className = t.aura;
                        document.getElementById('display-serie').innerText = "Série: " + t.serie;
                        document.getElementById('pts-val').innerText = t.pontos;
                        document.getElementById('seg-val').innerText = t.seguidores;
                        document.getElementById('meu-nivel').innerText = level;

                        if(level > lastLevel) {
                            showLevelUp(level);
                            lastLevel = level;
                        }
                    }

                    lista.innerHTML += `
                        <div class="rank-item">
                            <div class="medal ${mClass}">${i < 3 ? ['🥇','🥈','🥉'][i] : i+1}</div>
                            <div style="flex: 1; margin-left: 15px;">
                                <b class="${t.aura}">${t.turma}</b> <small style="color:#444">LV ${level}</small><br>
                                <div class="status-box ${isOnline ? 'online-now' : 'offline-now'}">
                                    <div class="dot" style="background:${isOnline?'#00ff88':'#ff4444'}"></div>
                                    ${isOnline ? 'Online agora' : (isRecente ? 'Online a 2min' : 'Offline')}
                                </div>
                            </div>
                            <div style="text-align: right">
                                <b style="color:var(--neon); font-size: 18px;">${t.pontos}</b><br>
                                <small style="font-size:8px; color:#333">${t.serie}</small>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function showLevelUp(lv) {
            const el = document.getElementById('level-up-alert');
            document.getElementById('lv-num').innerText = lv;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // ADMIN FUNCTIONS
        function irAdmin() {
            const p = prompt("SENHA MASTER:");
            if(p !== "admin123") return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');

            database.ref('ranking').on('value', snap => {
                const container = document.getElementById('admin-list');
                container.innerHTML = "";
                Object.values(snap.val()).forEach(t => {
                    container.innerHTML += `
                        <div style="background:#000; padding:15px; border-radius:20px; margin-bottom:10px; border:1px solid #222;">
                            <b>${t.turma}</b> <br>
                            <a href="${t.insta}" target="_blank" style="color:var(--neon); font-size:10px;">ABRIR INSTAGRAM 🔗</a>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <input type="number" id="adm-s-${t.turma}" value="${t.seguidores}" placeholder="Segs">
                                <input type="number" id="adm-v-${t.turma}" value="${t.videos}" placeholder="Vids">
                            </div>
                            <button onclick="updateAdmin('${t.turma}')" class="btn-main" style="padding:10px; font-size:11px;">ATUALIZAR DADOS</button>
                        </div>
                    `;
                });
            });
        }

        function updateAdmin(turma) {
            const s = parseInt(document.getElementById('adm-s-'+turma).value);
            const v = parseInt(document.getElementById('adm-v-'+turma).value);
            const pts = (Math.floor(s / 100) * 2) + (v * 1); // Exemplo de cálculo

            database.ref('ranking/' + turma).update({ seguidores: s, videos: v, pontos: pts });
            alert(turma + " ATUALIZADA!");
        }

        // CHAT LOGIC
        function toggleChat(show) { document.getElementById('chat-window').style.display = show ? 'flex' : 'none'; }
        function enviarChat() {
            const msg = document.getElementById('chat-input').value;
            if(!msg) return;
            database.ref('chat').push({ turma: userAtivo.turma, msg: msg, aura: userAtivo.aura });
            document.getElementById('chat-input').value = "";
        }

        database.ref('chat').limitToLast(30).on('value', snap => {
            const box = document.getElementById('chat-msgs');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="chat-bubble"><b class="${d.aura}" style="font-size:10px">${d.turma}</b><br>${d.msg}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

    </script>
</body>
</html>
