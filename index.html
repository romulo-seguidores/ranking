<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe - Elite Regional</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body { margin: 0; background: #020202; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; overflow-x: hidden; }
        #app { width: 100%; max-width: 420px; padding: 20px; min-height: 100vh; position: relative; }

        .glass, .glass-large { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            padding: 25px; text-align: center; margin-top: 20px; 
        }

        /* STATUS ONLINE E TEMPO */
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .offline { background: #ff4444; }
        .last-seen { font-size: 8px; color: #777; margin-left: 2px; font-weight: normal; vertical-align: middle; }

        /* ANIMAÇÃO LOGIN */
        .text-anim-crown {
            font-size: 13px; color: #ffd700; font-weight: bold; margin-bottom: 20px;
            display: block; text-transform: uppercase;
            animation: crownFloat 2s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        @keyframes crownFloat {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-3px); opacity: 0.7; }
        }

        /* CARROSSEL */
        .regional-box { 
            background: linear-gradient(180deg, rgba(255,215,0,0.1) 0%, rgba(0,0,0,1) 100%); 
            border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 8px 15px; margin-bottom: 25px; 
            position: relative; height: 50px; overflow: hidden; display: flex; flex-direction: column; justify-content: center;
            text-align: left;
        }
        .regional-box .label { font-size: 8px; color: #ffd700; font-weight: bold; letter-spacing: 1px; margin-bottom: 2px; opacity: 0.7; }
        #carousel-container { position: relative; height: 25px; }
        .rank-slide { position: absolute; width: 100%; left: 0; font-size: 0.95rem; font-weight: 800; opacity: 0; transform: translateX(10px); transition: 0.5s; text-transform: uppercase; }
        .rank-slide.active { opacity: 1; transform: translateX(0); }

        /* PODERES */
        .power-fogo { color: #ff4d00; text-shadow: 0 0 10px #ff4d00; }
        .power-gelo { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .power-floresta { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .power-vazio { color: #a855f7; text-shadow: 0 0 15px #6b21a8; }
        .power-eletrico { color: #eab308; text-shadow: 0 0 10px #eab308; }

        /* LISTA RANKING */
        .rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .escola-info { font-size: 9px; color: #666; display: block; margin: 2px 0; }
        .stats-info { font-size: 9px; color: #00d4ff; font-weight: bold; }

        /* INPUTS E BOTÕES */
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: white; box-sizing: border-box; font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(90deg, #00ff88, #00d4ff); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; margin-top: 10px; }
        .btn-sec { background: none; border: 1px solid #333; color: #888; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px; cursor: pointer; }

        /* REAÇÕES */
        .reaction-bar { display: flex; gap: 8px; margin-top: 5px; }
        .btn-reaction { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 10px; padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }

        /* ADMIN */
        .admin-card { background: #080808; padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 15px; text-align: left; }
        .insta-btn { display: inline-block; background: #E1306C; color: white; padding: 6px 12px; border-radius: 8px; font-size: 10px; text-decoration: none; font-weight: bold; margin-bottom: 10px; }
        .btn-save { background: #00ff88; color: black; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* CHAT */
        #chat-container { position: fixed; bottom: 20px; right: 10px; width: 160px; height: 220px; background: rgba(10,10,10,0.95); border: 1px solid #222; border-radius: 15px; display: flex; flex-direction: column; z-index: 999; backdrop-filter: blur(10px); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 8px; font-size: 10px; }
        #chat-input-box { display: flex; border-top: 1px solid #222; padding: 5px; }
        #chat-input-box input { margin: 0; padding: 6px; font-size: 10px; }

        .criador-tag { position: fixed; bottom: 10px; left: 15px; color: #00ff88; font-weight: bold; font-size: 11px; z-index: 1000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <section id="auth-screen" class="glass">
            <h1 class="logo">RANK<span>CLASSE</span></h1>
            <span class="text-anim-crown">👑 ROUBE A COROA DAS TURMAS E SEJA A MELHOR!</span>
            <div class="input-group">
                <input type="text" id="reg-turma" placeholder="Nome da Turma">
                <input type="text" id="reg-serie" placeholder="Série/Ano">
                <input type="text" id="reg-escola" placeholder="Nome da Escola">
                <input type="url" id="reg-insta" placeholder="Link do Instagram">
                <input type="password" id="reg-pass" placeholder="Senha">
                <select id="reg-power">
                    <option value="power-fogo">🔥 Vermelho Fogo</option>
                    <option value="power-gelo">❄️ Azul Gelo</option>
                    <option value="power-floresta">🌿 Verde Floresta</option>
                    <option value="power-vazio">🌑 Roxo Vazio</option>
                    <option value="power-eletrico">⚡ Amarelo Elétrico</option>
                </select>
                <button onclick="logarOuCadastrar()" class="btn-main">ENTRAR NO RANKING</button>
                <button onclick="entrarComoVisitante()" class="btn-sec" style="color: #00ff88; border-color: #00ff88;">ENTRAR PARA VER A TURMA</button>
            </div>
            <button onclick="mostrarLoginAdmin()" style="background:none; border:none; color:#181818; font-size:10px; margin-top:20px; cursor:pointer;">SISTEMA CENTRAL</button>
        </section>

        <section id="rank-screen" class="hidden glass-large">
            <div class="regional-box">
                <div class="label">TOP REGIONAL</div>
                <div id="carousel-container"></div>
            </div>
            <div id="lista-ranking"></div>
            <button onclick="sairDaConta()" class="btn-sec">SAIR DA CONTA</button>
        </section>

        <div id="chat-container" class="hidden">
            <div id="chat-messages"></div>
            <div id="chat-input-box">
                <input type="text" id="msg-input" placeholder="Chat...">
                <button onclick="enviarMensagem()" style="background:#00ff88; border:none; border-radius:5px; margin-left:3px; padding:0 8px; cursor:pointer">></button>
            </div>
        </div>

        <div class="criador-tag">Criado por Rômulo</div>

        <section id="admin-login-screen" class="hidden glass">
            <h2>Admin</h2>
            <input type="text" id="admin-user" placeholder="Usuário">
            <input type="password" id="admin-pass" placeholder="Senha">
            <button onclick="loginAdmin()" class="btn-main">CONECTAR</button>
            <button onclick="voltar()" class="btn-sec">VOLTAR</button>
        </section>

        <section id="admin-panel" class="hidden glass-large">
            <h2>🛠 Lançamento</h2>
            <div id="lista-admin"></div>
            <button onclick="voltar()" class="btn-sec">FECHAR</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/", projectId: "gincanaescola-d4f8c" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logadoComo = null;
        let slideIndex = 0;
        let eVisitante = false;
        let listaDadosCache = []; // Para atualizar o tempo sem re-renderizar tudo

        window.onload = () => {
            const salvo = JSON.parse(localStorage.getItem('rank_user'));
            if(salvo) {
                document.getElementById('reg-turma').value = salvo.turma;
                document.getElementById('reg-serie').value = salvo.serie;
                document.getElementById('reg-escola').value = salvo.escola;
                document.getElementById('reg-insta').value = salvo.insta;
                document.getElementById('reg-pass').value = salvo.pass;
                document.getElementById('reg-power').value = salvo.power;
            }
        };

        function entrarComoVisitante() {
            eVisitante = true; logadoComo = "vis_" + Math.floor(Math.random()*99);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
        }

        function logarOuCadastrar() {
            const t = document.getElementById('reg-turma').value.trim();
            const s = document.getElementById('reg-serie').value.trim();
            const e = document.getElementById('reg-escola').value.trim();
            const i = document.getElementById('reg-insta').value.trim();
            const p = document.getElementById('reg-pass').value;
            const pw = document.getElementById('reg-power').value;
            if(!t || !p) return alert("Preencha Turma e Senha!");

            database.ref('ranking/' + t).once('value', snap => {
                const agora = Date.now();
                if(snap.exists()) {
                    if(snap.val().pass === p) {
                        localStorage.setItem('rank_user', JSON.stringify({turma:t, serie:s, escola:e, insta:i, pass:p, power:pw}));
                        database.ref('ranking/'+t).update({serie:s, escola:e, insta:i, power:pw, lastSeen: agora}).then(() => entrarNoSistema({turma:t}));
                    } else alert("Senha incorreta!");
                } else {
                    const nova = { turma:t, pass:p, serie:s, escola:e, insta:i, power:pw, seguidores:0, videos:0, pontos:0, online:true, lastSeen: agora, likes:0, dislikes:0 };
                    localStorage.setItem('rank_user', JSON.stringify({turma:t, serie:s, escola:e, insta:i, pass:p, power:pw}));
                    database.ref('ranking/' + t).set(nova).then(() => entrarNoSistema(nova));
                }
            });
        }

        function entrarNoSistema(dados) {
            logadoComo = dados.turma;
            const ref = database.ref('ranking/' + logadoComo);
            ref.update({ online: true, lastSeen: Date.now() });
            ref.onDisconnect().update({ online: false, lastSeen: Date.now() });
            setInterval(() => { if(logadoComo && !eVisitante) ref.update({ lastSeen: Date.now(), online: true }); }, 20000);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
        }

        function tempoRelativo(timestamp) {
            if(!timestamp) return "";
            const diff = Date.now() - timestamp;
            const seg = Math.floor(diff/1000);
            if(seg < 60) return "agora";
            const min = Math.floor(seg/60); if(min < 60) return `${min} min`;
            const h = Math.floor(min/60); if(h < 24) return `${h} h`;
            return `${Math.floor(h/24)} d`;
        }

        // Timer para atualizar os textos de tempo sem precisar de sinal do Firebase
        setInterval(() => {
            document.querySelectorAll('.last-seen-text').forEach(el => {
                const ts = el.getAttribute('data-ts');
                if(ts) el.innerText = "online a " + tempoRelativo(parseInt(ts));
            });
        }, 30000);

        database.ref('ranking').on('value', snap => {
            const lista = document.getElementById('lista-ranking');
            const carrossel = document.getElementById('carousel-container');
            const dadosBD = snap.val(); if(!dadosBD) return;
            let array = Object.keys(dadosBD).map(id => dadosBD[id]).filter(t => t.turma).sort((a,b) => (b.pontos || 0) - (a.pontos || 0));

            carrossel.innerHTML = "";
            [0,1,2].forEach(i => { if(array[i]) carrossel.innerHTML += `<div class="rank-slide ${array[i].power}">${i===0?"👑 ":""}${i+1} ${array[i].turma}</div>`; });
            iniciarCarrossel();

            lista.innerHTML = "";
            array.forEach((t, i) => {
                let medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🔹";
                let statusTxt = t.online ? "" : `<span class="last-seen">online a <span class="last-seen-text" data-ts="${t.lastSeen}">${tempoRelativo(t.lastSeen)}</span></span>`;
                lista.innerHTML += `
                <div class="rank-card">
                    <div style="text-align:left">
                        <span class="status-dot ${t.online?'online':'offline'}"></span>
                        <span class="${t.power}" style="font-weight:bold">${t.turma}</span> ${statusTxt}<br>
                        <span class="escola-info">${t.serie || ''} - ${t.escola}</span>
                        <span class="stats-info">👥 ${t.seguidores || 0} | 🎬 ${t.videos || 0}</span>
                        <div class="reaction-bar">
                            <button class="btn-reaction" onclick="reagir('${t.turma}', 'like')">👍 ${t.likes || 0}</button>
                            <button class="btn-reaction" onclick="reagir('${t.turma}', 'dislike')">👎 ${t.dislikes || 0}</button>
                        </div>
                    </div>
                    <div style="text-align:right"><span style="color:#ffd700; font-weight:bold;">${medal} ${t.pontos || 0} pts</span></div>
                </div>`;
            });
        });

        function reagir(turma, tipo) {
            const key = 'voto_' + turma;
            const votoAntigo = localStorage.getItem(key);
            if (votoAntigo === tipo) return;
            database.ref(`ranking/${turma}`).transaction(t => {
                if (t) {
                    if (votoAntigo) {
                        let cAntigo = votoAntigo === 'like' ? 'likes' : 'dislikes';
                        t[cAntigo] = Math.max(0, (t[cAntigo] || 1) - 1);
                    }
                    let cNovo = tipo === 'like' ? 'likes' : 'dislikes';
                    t[cNovo] = (t[cNovo] || 0) + 1;
                }
                return t;
            });
            localStorage.setItem(key, tipo);
        }

        function enviarMensagem() {
            if(eVisitante) return alert("Logue para falar!");
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            database.ref('mensagens_chat').push({ user: logadoComo, text: inp.value, timestamp: Date.now() });
            inp.value = "";
        }

        database.ref('mensagens_chat').limitToLast(20).on('value', snap => {
            const box = document.getElementById('chat-messages'); box.innerHTML = "";
            snap.forEach(d => { box.innerHTML += `<div><b style="color:#00ff88">${d.val().user}:</b> ${d.val().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });

        function iniciarCarrossel() {
            const slides = document.querySelectorAll('.rank-slide'); if(slides.length === 0) return;
            slides.forEach(s => s.classList.remove('active'));
            slideIndex = (slideIndex + 1) % slides.length; slides[slideIndex].classList.add('active');
            if(window.carrosselTimer) clearTimeout(window.carrosselTimer); window.carrosselTimer = setTimeout(iniciarCarrossel, 3000);
        }

        function loginAdmin() {
            if (document.getElementById('admin-user').value === "admin" && document.getElementById('admin-pass').value === "admin123") {
                esconderTudo(); document.getElementById('admin-panel').classList.remove('hidden'); carregarPainelAdmin();
            }
        }

        function carregarPainelAdmin() {
            database.ref('ranking').on('value', snap => {
                const container = document.getElementById('lista-admin'); container.innerHTML = "";
                const dados = snap.val(); if(!dados) return;
                Object.keys(dados).forEach(id => {
                    const t = dados[id]; if(!t.turma) return;
                    container.innerHTML += `
                        <div class="admin-card">
                            <strong>${t.turma} (${t.serie})</strong><br>
                            <a href="${t.insta}" target="_blank" class="insta-btn">📸 INSTAGRAM</a>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;">
                                <input type="number" id="s-${t.turma}" value="${t.seguidores}" placeholder="Segs">
                                <input type="number" id="v-${t.turma}" value="${t.videos}" placeholder="Vids">
                            </div>
                            <button onclick="salvarPontos('${t.turma}')" class="btn-save">ATUALIZAR PONTOS</button>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top:10px;">
                                <button onclick="zerarVotos('${t.turma}')" class="btn-reset-votos" style="background: #441111; color: #ff8888; border: 1px solid #662222; padding: 4px 8px; border-radius: 6px; font-size: 9px; cursor: pointer;">🗑 ZERAR VOTOS</button>
                                <button onclick="deletarTurma('${t.turma}')" style="color:red; background:none; border:none; font-size:10px; cursor:pointer; font-weight:bold;">✖ EXCLUIR</button>
                            </div>
                        </div>`;
                });
            });
        }

        function zerarVotos(nome) { if(confirm("Zerar votos de "+nome+"?")) database.ref('ranking/' + nome).update({ likes: 0, dislikes: 0 }); }
        function salvarPontos(nome) {
            const s = parseInt(document.getElementById(`s-${nome}`).value) || 0;
            const v = parseInt(document.getElementById(`v-${nome}`).value) || 0;
            database.ref('ranking/' + nome).update({ seguidores: s, videos: v, pontos: (s * 10) + (v * 50) });
        }
        function deletarTurma(nome) { if(confirm("Excluir "+nome+"?")) database.ref('ranking/'+nome).remove(); }
        function esconderTudo() { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); }
        function sairDaConta() { location.reload(); }
        function mostrarLoginAdmin() { esconderTudo(); document.getElementById('admin-login-screen').classList.remove('hidden'); }
        function voltar() { location.reload(); }
    </script>
</body>
</html>
