<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe v5.5 - Elite Regional</title>

    <style>
        /* ============================================================
           SISTEMA VISUAL "MÍDIA" - DESIGN BY RÔMULO
           ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --ouro: #ffd700;
            --prata: #e0e0e0;
            --bronze: #cd7f32;
            --neon: #00ff88;
            --sky: #00d4ff;
            --danger: #ff4444;
            --bg-dark: #020202;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        body { 
            margin: 0; background: var(--bg-dark); color: white; 
            font-family: 'Poppins', sans-serif; display: flex; 
            justify-content: center; overflow-x: hidden; min-height: 100vh;
        }

        #app { width: 100%; max-width: 450px; padding: 20px; position: relative; }

        /* KEYFRAMES */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes neonPulse { 0% { box-shadow: 0 0 5px var(--neon); } 50% { box-shadow: 0 0 20px var(--neon); } 100% { box-shadow: 0 0 5px var(--neon); } }
        @keyframes rotateGlow { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        /* CONTAINERS GLASS */
        .glass-panel { 
            background: var(--glass-bg); backdrop-filter: blur(30px); 
            border: 1px solid var(--glass-border); border-radius: 40px; 
            padding: 35px; margin-top: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: slideUp 0.6s ease-out;
        }

        /* PERFIL DE USUÁRIO */
        .user-header { 
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            padding: 25px; border-radius: 30px; border: 1px solid var(--glass-border);
            margin-bottom: 30px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
        }

        .lvl-pill { 
            font-size: 11px; font-weight: 900; background: var(--ouro); 
            color: black; padding: 4px 12px; border-radius: 10px; 
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        .xp-track { 
            width: 100%; height: 10px; background: rgba(0,0,0,0.3); 
            border-radius: 15px; margin-top: 15px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.03); 
        }
        .xp-fill { 
            height: 100%; background: linear-gradient(90deg, var(--neon), var(--sky)); 
            width: 0%; transition: 1.5s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        /* STATUS DOT (CORRIGIDO) */
        .status-container { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-active { background: var(--neon); animation: neonPulse 2s infinite; }
        .dot-inactive { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .status-text { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }

        /* CARDS DO RANKING */
        .rank-item { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 22px; margin-bottom: 18px; display: flex;
            justify-content: space-between; align-items: center; transition: var(--transition-smooth);
            position: relative;
        }
        .rank-item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .first-place { border: 1px solid rgba(255, 215, 0, 0.25); background: rgba(255, 215, 0, 0.04); }

        /* BOTÕES & INPUTS */
        .input-mídia { 
            width: 100%; background: #080808; border: 1px solid #1a1a1a; 
            padding: 18px; border-radius: 20px; color: white; margin-bottom: 15px; outline: none;
            font-family: 'Poppins'; font-size: 14px; transition: 0.3s;
        }
        .input-mídia:focus { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.1); }

        .btn-mídia { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; 
            font-weight: 900; cursor: pointer; transition: 0.3s; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 2px; font-size: 13px;
        }
        .btn-white { background: white; color: black; }
        .btn-outline { background: transparent; color: #555; border: 1px solid #222; }
        .btn-outline:hover { color: white; border-color: #444; }

        /* INSTAGRAM */
        .insta-link {
            font-size: 9px; color: #777; text-decoration: none; border: 1px solid rgba(255,255,255,0.05);
            padding: 6px 15px; border-radius: 12px; display: inline-block; margin-top: 15px;
            font-weight: 800; text-transform: uppercase; transition: 0.3s;
        }
        .insta-link:hover { background: #fff; color: #000; }

        /* CHAT SYSTEM */
        #chat-widget {
            position: fixed; bottom: 25px; right: 25px; width: 260px; height: 350px;
            background: rgba(0, 0, 0, 0.98); border: 1px solid #1a1a1a; border-radius: 30px;
            display: flex; flex-direction: column; overflow: hidden; z-index: 1000;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }
        #chat-content { flex: 1; padding: 20px; overflow-y: auto; font-size: 12px; }
        .chat-bubble { margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 6px; }
        .chat-bubble b { color: var(--neon); margin-right: 5px; text-transform: lowercase; }

        /* PAINEL ADMIN */
        .adm-card { background: #070707; border: 1px solid #151515; padding: 25px; border-radius: 30px; margin-bottom: 20px; }
        .adm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .adm-btn { padding: 10px; border-radius: 12px; border: none; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        .hidden { display: none !important; }
        .brand { position: fixed; bottom: 15px; left: 25px; font-size: 10px; color: #222; font-weight: 900; z-index: -1; }
    </style>
</head>
<body>

<div id="app">
    <section id="auth-view" class="glass-panel">
        <h1 style="font-weight: 900; font-size: 36px; letter-spacing: -2px; margin: 0;">RANK<span style="color:var(--neon)">CLASSE</span></h1>
        <p style="font-size: 10px; color: #555; margin-bottom: 35px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Elite Academic Management</p>
        
        <div id="auth-form">
            <input type="text" id="reg-turma" class="input-mídia" placeholder="Identificação da Turma">
            <input type="text" id="reg-serie" class="input-mídia" placeholder="Série/Ano">
            <input type="text" id="reg-escola" class="input-mídia" placeholder="Instituição de Ensino">
            <input type="url" id="reg-insta" class="input-mídia" placeholder="Link do Instagram">
            <input type="password" id="reg-pass" class="input-mídia" placeholder="Senha de Segurança">
            <select id="reg-vibe" class="input-mídia">
                <option value="⚡ ELÉTRICO">Aura: Elétrica</option>
                <option value="🔥 FOGO">Aura: Flamejante</option>
                <option value="❄️ GELO">Aura: Glacial</option>
                <option value="🌑 VAZIO">Aura: Sombria</option>
            </select>
            <button class="btn-mídia btn-white" onclick="execLogin()">SINCRONIZAR CONTA</button>
            <button class="btn-mídia btn-outline" onclick="guestIn()">MODO OBSERVADOR</button>
        </div>
        <button onclick="adminLogin()" style="background:none; border:none; color:#111; font-size:9px; margin-top:15px; cursor:pointer; font-weight:800;">[ ROOT TERMINAL ]</button>
    </section>

    <section id="admin-login-view" class="hidden glass-panel">
        <h2 style="color: var(--neon); letter-spacing: -1px;">SISTEMA ROOT</h2>
        <input type="text" id="adm-user" class="input-mídia" placeholder="Usuário Root">
        <input type="password" id="adm-pass" class="input-mídia" placeholder="Chave Mestra">
        <button class="btn-mídia btn-white" onclick="doAdminAuth()">DESBLOQUEAR</button>
        <button class="btn-mídia btn-outline" onclick="location.reload()">VOLTAR</button>
    </section>

    <section id="rank-view" class="hidden">
        <div class="user-header">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <span style="font-size: 9px; color: #555; font-weight: 800;">LOGADO COMO</span>
                    <h2 id="me-turma" style="margin: 0; font-size: 22px; color: var(--neon); letter-spacing: -1px;">---</h2>
                </div>
                <div><span id="me-lvl-val" class="lvl-pill">LVL 0</span></div>
            </div>
            <div class="xp-track"><div id="me-xp-bar" class="xp-fill"></div></div>
        </div>

        <div id="ranking-container"></div>

        <button class="btn-mídia btn-outline" style="margin-top: 50px;" onclick="killSession()">DESCONECTAR</button>
    </section>

    <section id="admin-panel-view" class="hidden glass-panel" style="max-width: 100%;">
        <h2 style="color: var(--neon); margin-bottom: 25px;">COMANDO CENTRAL</h2>
        <button class="btn-mídia btn-white" style="background:var(--danger); color:white; font-size:11px;" onclick="clearGlobalChat()">LIMPAR TODAS AS MENSAGENS</button>
        <div id="admin-tools-list"></div>
        <button class="btn-mídia btn-outline" onclick="location.reload()">SAIR DO PAINEL</button>
    </section>

    <div id="chat-widget" class="hidden">
        <div id="chat-content"></div>
        <div style="padding: 15px; background: #050505; display: flex; gap: 10px; border-top: 1px solid #111;">
            <input type="text" id="chat-msg" placeholder="Diga algo..." style="margin:0; padding:12px; font-size:12px; border-radius:15px; background:#000; border:1px solid #222; color:#fff; flex:1;">
            <button onclick="sendMsg()" style="background:var(--neon); border:none; border-radius:15px; padding:0 18px; font-weight:900;">></button>
        </div>
    </div>

    <div class="brand">PROJETO RANK CLASSE v5.5</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- FIREBASE CONFIG ---
    const config = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/",
        projectId: "gincanaescola-d4f8c"
    };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let mySession = null;
    let isAdminMode = false;

    // --- LÓGICA DE TEMPO REAL (CORREÇÃO DO CONTADOR) ---
    function formatTime(ts) {
        if(!ts) return "---";
        const diff = Date.now() - ts;
        const seg = Math.floor(diff / 1000);
        const min = Math.floor(seg / 60);
        const hor = Math.floor(min / 60);
        const dia = Math.floor(hor / 24);

        if (seg < 45) return "AGORA";
        if (min < 60) return min + " MIN";
        if (hor < 24) return hor + " HRS";
        return dia + " DIAS";
    }

    // --- PERSISTÊNCIA DE SESSÃO ---
    window.onload = () => {
        const saved = localStorage.getItem('user_rank_session');
        if(saved) {
            mySession = JSON.parse(saved);
            launch();
        }
    };

    function execLogin() {
        const t = document.getElementById('reg-turma').value.trim();
        const p = document.getElementById('reg-pass').value;
        if(!t || !p) return alert("Erro: Turma e Senha vazios!");

        db.ref('ranking/' + t).once('value', snap => {
            const val = snap.val();
            if(val && val.pass !== p) return alert("Erro: Senha de acesso negada!");

            const data = {
                turma: t, pass: p,
                serie: document.getElementById('reg-serie').value || (val ? val.serie : "NI"),
                escola: document.getElementById('reg-escola').value || (val ? val.escola : "NI"),
                insta: document.getElementById('reg-insta').value || (val ? val.insta : "#"),
                power: document.getElementById('reg-vibe').value,
                pontos: val ? val.pontos : 0,
                likes: val ? val.likes : 0,
                lastSeen: Date.now()
            };

            db.ref('ranking/' + t).update(data).then(() => {
                mySession = data;
                localStorage.setItem('user_rank_session', JSON.stringify(data));
                launch();
            });
        });
    }

    function launch() {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('rank-view').classList.remove('hidden');
        document.getElementById('chat-widget').classList.remove('hidden');
        
        if(mySession.turma !== "Guest") {
            // Heartbeat de Conexão
            setInterval(() => {
                db.ref('ranking/' + mySession.turma).update({ lastSeen: Date.now() });
            }, 15000);
        }
        startListeners();
    }

    function startListeners() {
        db.ref('ranking').on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const container = document.getElementById('ranking-container');
            const sorted = Object.values(data).sort((a,b) => b.pontos - a.pontos);
            
            container.innerHTML = "";
            sorted.forEach((item, i) => {
                const online = (Date.now() - (item.lastSeen || 0)) < 40000;
                const tempoRelativo = formatTime(item.lastSeen);
                const nivel = Math.floor((item.pontos || 0) / 10);

                // Atualiza meu Painel se for eu
                if(mySession && item.turma === mySession.turma) {
                    document.getElementById('me-turma').innerText = item.turma;
                    document.getElementById('me-lvl-val').innerText = "LVL " + nivel;
                    document.getElementById('me-xp-bar').style.width = ((item.pontos % 10) * 10) + "%";
                }

                container.innerHTML += `
                    <div class="rank-item ${i === 0 ? 'first-place' : ''}">
                        <div style="flex:1">
                            <div class="status-container">
                                <span class="dot ${online ? 'dot-active' : 'dot-inactive'}"></span>
                                <span class="status-text ${online ? 'text-neon' : ''}" style="color:${online ? 'var(--neon)' : '#ff4444'}">
                                    Online a ${tempoRelativo}
                                </span>
                            </div>
                            <b style="font-size: 18px; display:block; letter-spacing:-0.5px;">${i+1}. ${item.turma}</b>
                            <span style="font-size: 10px; color: #444; font-weight:700;">${item.escola} • ${item.serie}</span>
                            <br><a href="${item.insta}" target="_blank" class="insta-link">Instagram Oficial</a>
                            <div style="margin-top: 15px;">
                                <button class="btn-mídia btn-outline" style="width:auto; padding:8px 15px; font-size:11px; margin:0;" onclick="giveLike('${item.turma}')">🔥 ${item.likes || 0}</button>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 28px; font-weight: 900; color: var(--ouro); line-height:1;">${item.pontos || 0}</div>
                            <div style="font-size: 9px; color: #333; font-weight:800; letter-spacing:1px;">PTS | LVL ${nivel}</div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // --- SISTEMA ADMIN ---
    function adminLogin() {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('admin-login-view').classList.remove('hidden');
    }

    function doAdminAuth() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === "admin" && p === "admin123") {
            isAdminMode = true;
            document.getElementById('admin-login-view').classList.add('hidden');
            document.getElementById('admin-panel-view').classList.remove('hidden');
            renderAdmin();
        } else alert("Acesso Root Negado!");
    }

    function renderAdmin() {
        db.ref('ranking').on('value', snap => {
            const list = document.getElementById('admin-tools-list');
            list.innerHTML = "";
            Object.values(snap.val()).forEach(t => {
                list.innerHTML += `
                    <div class="adm-card">
                        <b style="color:var(--neon)">${t.turma}</b>
                        <div class="adm-actions">
                            <button class="adm-btn" style="background:var(--neon); color:black;" onclick="adjustPts('${t.turma}', 1)">+1 Ponto</button>
                            <button class="adm-btn" style="background:#222; color:white;" onclick="adjustPts('${t.turma}', -1)">-1 Ponto</button>
                            <button class="adm-btn" style="background:var(--sky); color:black;" onclick="resetLks('${t.turma}')">Reset Likes</button>
                            <button class="adm-btn" style="background:var(--danger); color:white;" onclick="banish('${t.turma}')">Banir Turma</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    function adjustPts(t, v) { db.ref('ranking/' + t + '/pontos').transaction(c => (c || 0) + v); }
    function resetLks(t) { db.ref('ranking/' + t + '/likes').set(0); }
    function banish(t) { if(confirm("Deseja banir permanentemente "+t+"?")) db.ref('ranking/'+t).remove(); }
    function clearGlobalChat() { if(confirm("Apagar todas as mensagens?")) db.ref('chat_logs').remove(); }

    // --- SISTEMA CHAT ---
    function sendMsg() {
        const inp = document.getElementById('chat-msg');
        if(!inp.value || !mySession) return;
        db.ref('chat_logs').push({ u: mySession.turma, t: inp.value });
        inp.value = "";
    }

    db.ref('chat_logs').limitToLast(25).on('value', snap => {
        const box = document.getElementById('chat-content');
        box.innerHTML = "";
        snap.forEach(m => {
            box.innerHTML += `<div class="chat-bubble"><b>${m.val().u}:</b> ${m.val().t}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });

    // --- FUNÇÕES AUX ---
    function giveLike(t) { db.ref('ranking/' + t + '/likes').transaction(c => (c || 0) + 1); }
    function guestIn() { mySession = { turma: "Guest" }; launch(); }
    function killSession() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
