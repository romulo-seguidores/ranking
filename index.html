<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rank Classe - Elite Regional</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap');

        :root {
            --ouro: #ffd700;
            --prata: #c0c0c0;
            --bronze: #cd7f32;
            --neon: #00ff88;
            --card-bg: rgba(255,255,255,0.04);
        }

        body { 
            margin: 0; background: #020202; color: white; 
            font-family: 'Poppins', sans-serif; display: flex; 
            justify-content: center; overflow-x: hidden;
        }

        #app { width: 100%; max-width: 420px; padding: 20px; min-height: 100vh; }

        /* ESTABILIZADORES (IMPEDE A PÁGINA DE TREMER) */
        .glass-large { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; 
            padding: 25px; text-align: center; margin-top: 20px;
            min-height: 600px; /* Mantém altura mínima para não pular */
        }

        /* HEADER */
        .header-user { 
            text-align: left; margin-bottom: 25px; padding: 18px; 
            background: rgba(255,255,255,0.05); border-radius: 22px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .header-user h2 { font-size: 14px; margin: 0; color: var(--neon); }
        .lvl-badge-top { 
            font-size: 10px; background: var(--ouro); color: black; 
            padding: 2px 10px; border-radius: 10px; font-weight: 800; margin-top: 5px; 
            display: inline-block; 
        }
        .xp-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--ouro); width: 0%; transition: 0.8s; }

        /* CARROSSEL (ESTÁTICO NA ALTURA) */
        .regional-box { 
            background: linear-gradient(180deg, rgba(255,215,0,0.05) 0%, rgba(0,0,0,1) 100%); 
            border: 1px solid rgba(255,215,0,0.2); border-radius: 20px; 
            margin-bottom: 25px; height: 50px; position: relative; overflow: hidden;
        }
        .rank-slide { 
            position: absolute; width: 100%; top: 50%; left: 50%;
            transform: translate(-50%, -50%); opacity: 0; transition: 0.5s; 
            text-transform: uppercase; font-weight: 800; font-size: 14px; text-align: center;
        }
        .rank-slide.active { opacity: 1; }

        /* RANK CARD */
        .rank-card { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card-bg); padding: 15px; border-radius: 20px; 
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .rank-card.top1 { border: 1px solid rgba(255, 215, 0, 0.2); box-shadow: 0 0 15px rgba(255, 215, 0, 0.05); }

        /* INFO PEQUENA (ESCOLA E SERIE) */
        .info-secundaria { font-size: 9px; color: #666; display: block; margin-top: -2px; }
        .online-status { font-size: 8px; font-weight: normal; color: #888; margin-left: 5px; }

        .insta-mini { 
            display: inline-block; background: rgba(255,255,255,0.1); 
            color: #ccc; padding: 3px 8px; border-radius: 6px; 
            font-size: 8px; text-decoration: none; font-weight: bold; margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* MEDALHAS */
        .m-ouro { color: var(--ouro); } .m-prata { color: var(--prata); } .m-bronze { color: var(--bronze); }

        /* STATUS DOT */
        .status-dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .on { background: var(--neon); box-shadow: 0 0 5px var(--neon); }
        .off { background: #444; }

        /* REAÇÕES */
        .reaction-bar { display: flex; gap: 6px; margin-top: 8px; }
        .btn-reaction { 
            background: rgba(255,255,255,0.05); border: none; color: white; 
            font-size: 9px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
        }

        /* CHAT */
        #chat-container { 
            position: fixed; bottom: 20px; right: 10px; width: 170px; height: 230px; 
            background: rgba(10,10,10,0.98); border: 1px solid #222; border-radius: 20px; 
            display: flex; flex-direction: column; z-index: 999;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 10px; }

        /* INPUTS */
        input, select { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white;
            font-family: 'Poppins'; box-sizing: border-box;
        }
        .btn-main { 
            width: 100%; padding: 16px; background: linear-gradient(90deg, #00ff88, #00d4ff); 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: black;
        }

        /* ADMIN */
        .admin-card { background: #080808; padding: 15px; border-radius: 20px; border: 1px solid #222; margin-bottom: 15px; text-align: left; position: relative; }
        .btn-del-account { position: absolute; top: 12px; right: 12px; color: #ff4444; background: none; border: none; cursor: pointer; font-size: 12px; }

        .hidden { display: none !important; }
        .criador-tag { position: fixed; bottom: 10px; left: 15px; color: #222; font-size: 9px; }
    </style>
</head>
<body>

    <div id="app">
        <div id="level-up-modal" class="hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 2px solid var(--ouro); padding: 30px; border-radius: 30px; z-index: 2000; text-align: center;">
            <h2 style="color:var(--ouro); margin:0;">NOVO NÍVEL!</h2>
            <p id="level-up-msg" style="font-size: 14px;"></p>
            <button onclick="document.getElementById('level-up-modal').classList.add('hidden')" class="btn-main" style="padding:10px;">BOA!</button>
        </div>

        <section id="auth-screen" class="glass-large" style="min-height: auto; padding-bottom: 40px;">
            <h1 style="margin-bottom: 0;">RANK<span style="color:var(--neon)">CLASSE</span></h1>
            <p style="font-size: 10px; color: #444; margin-top: 0; margin-bottom: 20px;">BY RÔMULO</p>
            
            <input type="text" id="reg-turma" placeholder="Nome da Turma">
            <input type="text" id="reg-serie" placeholder="Série (Ex: 3º A)">
            <input type="text" id="reg-escola" placeholder="Nome da Escola">
            <input type="url" id="reg-insta" placeholder="Link do Instagram">
            <input type="password" id="reg-pass" placeholder="Senha">
            
            <select id="reg-power">
                <option value="power-fogo">🔥 ELEMENTO FOGO</option>
                <option value="power-gelo">❄️ ELEMENTO GELO</option>
                <option value="power-floresta">🌿 ELEMENTO FLORESTA</option>
                <option value="power-vazio">🌑 ELEMENTO VAZIO</option>
                <option value="power-eletrico">⚡ ELEMENTO ELÉTRICO</option>
            </select>
            
            <button onclick="logarOuCadastrar()" class="btn-main">ENTRAR / CADASTRAR</button>
            <button onclick="entrarComoVisitante()" style="background:none; border:none; color:#666; cursor:pointer; font-weight:bold; margin-top:10px;">MODO VISITANTE</button>
            
            <button onclick="mostrarLoginAdmin()" style="display:block; margin: 30px auto 0; background:none; border:none; color:#111; font-size:9px; cursor:pointer;">ADMINISTRAÇÃO</button>
        </section>

        <section id="rank-screen" class="hidden glass-large">
            <div class="header-user">
                <h2 id="welcome-text">...</h2>
                <div id="user-stats-ui" class="hidden">
                    <span class="lvl-badge-top" id="top-lvl-display">LVL 0</span>
                    <div class="xp-bar-bg"><div class="xp-bar-fill" id="top-xp-fill"></div></div>
                </div>
            </div>

            <div class="regional-box">
                <div id="carousel-container"></div>
            </div>

            <div id="lista-ranking"></div>

            <button onclick="location.reload()" style="background:none; border:1px solid #222; color:#444; width:100%; padding:10px; border-radius:12px; margin-top:20px; cursor:pointer">SAIR DA CONTA</button>
        </section>

        <div id="chat-container" class="hidden">
            <div id="chat-messages"></div>
            <div id="chat-input-box" style="display:flex; padding:5px; background: #050505; border-radius: 0 0 20px 20px;">
                <input type="text" id="msg-input" placeholder="Chat..." style="font-size:10px; margin:0; border:none; background:none;">
                <button onclick="enviarMensagem()" style="background:var(--neon); border:none; border-radius:8px; padding:0 10px; color:black; font-weight:bold;">></button>
            </div>
        </div>

        <section id="admin-panel" class="hidden glass-large">
            <h2 style="color:var(--neon)">PAINEL ROOT</h2>
            <button onclick="limparChat()" style="background:#ff4444; color:white; border:none; width:100%; padding:10px; border-radius:10px; margin-bottom:20px; font-weight:bold; cursor:pointer">LIMPAR MENSAGENS</button>
            <div id="lista-admin"></div>
            <button onclick="location.reload()" class="btn-main" style="background:#222; color:white;">FECHAR</button>
        </section>

        <section id="admin-login-screen" class="hidden glass-large">
            <h3>LOGIN ADMIN</h3>
            <input type="text" id="admin-user" placeholder="Admin">
            <input type="password" id="admin-pass" placeholder="Senha">
            <button onclick="loginAdmin()" class="btn-main">CONECTAR</button>
        </section>

        <div class="criador-tag">SISTEMA v4.5 | RÔMULO</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/", projectId: "gincanaescola-d4f8c" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let logadoComo = null;
        let ehVisitante = false;
        let lastLevel = 0;
        let slideIndex = 0;

        // SALVAR INFO NO NAVEGADOR (SÉRIE E ESCOLA)
        window.onload = () => {
            const cache = JSON.parse(localStorage.getItem('rank_cache_v5'));
            if(cache) {
                ['reg-turma','reg-serie','reg-escola','reg-insta','reg-pass','reg-power'].forEach(id => {
                    document.getElementById(id).value = cache[id.split('-')[1]] || '';
                });
            }
        };

        function logarOuCadastrar() {
            const t = document.getElementById('reg-turma').value.trim();
            const p = document.getElementById('reg-pass').value;
            if(!t || !p) return alert("Preencha Turma e Senha!");

            database.ref('ranking/' + t).once('value', snap => {
                const d = snap.val();
                if(d && d.pass !== p) return alert("Senha errada!");

                const info = {
                    turma: t, pass: p,
                    serie: document.getElementById('reg-serie').value,
                    escola: document.getElementById('reg-escola').value,
                    insta: document.getElementById('reg-insta').value,
                    power: document.getElementById('reg-power').value,
                    pontos: d?.pontos || 0, seguidores: d?.seguidores || 0, videos: d?.videos || 0,
                    likes: d?.likes || 0, dislikes: d?.dislikes || 0,
                    online: true, lastSeen: Date.now()
                };

                localStorage.setItem('rank_cache_v5', JSON.stringify(info));
                database.ref('ranking/' + t).update(info).then(() => {
                    logadoComo = t;
                    abrirApp();
                });
            });
        }

        function abrirApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('rank-screen').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            if(!ehVisitante) {
                document.getElementById('user-stats-ui').classList.remove('hidden');
                database.ref('ranking/' + logadoComo).onDisconnect().update({ online: false, lastSeen: Date.now() });
                setInterval(() => database.ref('ranking/' + logadoComo).update({ online: true, lastSeen: Date.now() }), 8000);
            }
        }

        function entrarComoVisitante() { ehVisitante = true; logadoComo = "Visita"; abrirApp(); document.getElementById('chat-input-box').classList.add('hidden'); }

        // RANKING ENGINE
        database.ref('ranking').on('value', snap => {
            const data = snap.val(); if(!data) return;
            const container = document.getElementById('lista-ranking');
            const carrossel = document.getElementById('carousel-container');
            const sorted = Object.values(data).filter(i => i && i.turma).sort((a,b) => b.pontos - a.pontos);
            
            // CARROSSEL
            carrossel.innerHTML = "";
            sorted.slice(0, 3).forEach((item, i) => {
                const medal = ['🥇','🥈','🥉'];
                carrossel.innerHTML += `<div class="rank-slide ${item.power}">${medal[i]} ${i+1}º ${item.turma}</div>`;
            });
            iniciarSlide();

            // LISTA
            container.innerHTML = "";
            sorted.forEach((item, i) => {
                const lvl = Math.floor((item.pontos || 0) / 10);
                let medalClass = i===0?'m-ouro':i===1?'m-prata':i===2?'m-bronze':'';
                let medalIcon = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);

                if(item.turma === logadoComo) {
                    document.getElementById('welcome-text').innerText = "OLÁ, " + item.turma;
                    document.getElementById('top-lvl-display').innerText = "LVL " + lvl;
                    document.getElementById('top-xp-fill').style.width = ((item.pontos % 10) * 10) + "%";
                    if(lvl > lastLevel && lastLevel !== 0) {
                        document.getElementById('level-up-msg').innerText = `Turma ${item.turma} subiu para o Level ${lvl}!`;
                        document.getElementById('level-up-modal').classList.remove('hidden');
                    }
                    lastLevel = lvl;
                }

                container.innerHTML += `
                <div class="rank-card ${i===0?'top1':''}">
                    <div style="text-align:left">
                        <span class="status-dot ${item.online?'on':'off'}"></span>
                        <span class="${medalClass}" style="font-weight:800; margin-right:5px;">${medalIcon}</span>
                        <b class="${item.power}" style="font-size:15px">${item.turma}</b>
                        <span class="online-status">${calcTempo(item.lastSeen, item.online)}</span><br>
                        <span class="info-secundaria">${item.serie || ''} | ${item.escola || ''}</span>
                        <a href="${item.insta}" target="_blank" class="insta-mini">VER INSTAGRAM</a>
                        <div class="reaction-bar">
                            <button class="btn-reaction" onclick="votar('${item.turma}','like')">👍 ${item.likes||0}</button>
                            <button class="btn-reaction" onclick="votar('${item.turma}','dislike')">👎 ${item.dislikes||0}</button>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:18px; font-weight:800; color:var(--ouro)">${item.pontos||0}</div>
                        <div style="font-size:8px; color:#444">PONTOS</div>
                    </div>
                </div>`;
            });
        });

        function calcTempo(ts, isOn) {
            if(isOn) return "Online agora";
            if(!ts) return "Offline";
            const diff = Date.now() - ts;
            const m = Math.floor(diff/60000);
            if(m < 1) return "Online agora";
            if(m < 60) return `há ${m}m`;
            const h = Math.floor(m/60); if(h < 24) return `há ${h}h`;
            return `há ${Math.floor(h/24)}d`;
        }

        function votar(id, type) {
            if(ehVisitante) return alert("Visitante não vota.");
            const key = 'voto_v5_' + id;
            if(localStorage.getItem(key) === type) return;
            database.ref('ranking/' + id).transaction(t => {
                if(t) {
                    const old = localStorage.getItem(key);
                    if(old) { let f = old==='like'?'likes':'dislikes'; t[f]=Math.max(0,(t[f]||0)-1); }
                    let n = type==='like'?'likes':'dislikes'; t[n]=(t[n]||0)+1;
                }
                return t;
            });
            localStorage.setItem(key, type);
        }

        // ADMIN ENGINE
        function carregarAdmin() {
            database.ref('ranking').on('value', snap => {
                const list = document.getElementById('lista-admin'); list.innerHTML = "";
                Object.values(snap.val()||{}).forEach(t => {
                    if(!t.turma) return;
                    list.innerHTML += `
                    <div class="admin-card">
                        <button class="btn-del-account" onclick="delAccount('${t.turma}')">✖ APAGAR</button>
                        <b>${t.turma}</b><br>
                        <button class="btn-reaction" style="margin:5px 0" onclick="resetVotos('${t.turma}')">ZERAR REAÇÕES</button>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
                            <input type="number" id="adm-s-${t.turma}" value="${t.seguidores}" placeholder="Segs">
                            <input type="number" id="adm-v-${t.turma}" value="${t.videos}" placeholder="Vídeos">
                        </div>
                        <button onclick="saveAdmin('${t.turma}')" class="btn-main" style="padding:10px; margin-top:10px; font-size:11px;">SALVAR PONTOS</button>
                    </div>`;
                });
            });
        }

        function saveAdmin(t) {
            const s = parseInt(document.getElementById(`adm-s-${t}`).value) || 0;
            const v = parseInt(document.getElementById(`adm-v-${t}`).value) || 0;
            const p = (Math.floor(s / 100) * 2) + (v * 1);
            database.ref('ranking/' + t).update({ seguidores: s, videos: v, pontos: p });
            alert("Ok!");
        }

        function delAccount(t) { if(confirm("Apagar "+t+"?")) database.ref('ranking/'+t).remove(); }
        function resetVotos(t) { database.ref('ranking/'+t).update({ likes: 0, dislikes: 0 }); }
        function loginAdmin() { if(document.getElementById('admin-user').value==="admin" && document.getElementById('admin-pass').value==="admin123") { document.getElementById('admin-login-screen').classList.add('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); carregarAdmin(); } }
        function mostrarLoginAdmin() { document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('admin-login-screen').classList.remove('hidden'); }
        function limparChat() { if(confirm("Limpar?")) database.ref('mensagens_chat').remove(); }

        function iniciarSlide() {
            const items = document.querySelectorAll('.rank-slide'); if(!items.length) return;
            items.forEach(i => i.classList.remove('active'));
            slideIndex = (slideIndex + 1) % items.length; items[slideIndex].classList.add('active');
            if(window.timerS) clearTimeout(window.timerS); window.timerS = setTimeout(iniciarSlide, 3000);
        }

        // CHAT ENGINE
        function enviarMensagem() {
            const inp = document.getElementById('msg-input'); if(!inp.value.trim() || !logadoComo || ehVisitante) return;
            database.ref('mensagens_chat').push({ user: logadoComo, text: inp.value }); inp.value = "";
        }
        database.ref('mensagens_chat').limitToLast(20).on('value', snap => {
            const box = document.getElementById('chat-messages'); box.innerHTML = "";
            snap.forEach(m => { box.innerHTML += `<div><b style="color:var(--neon)">${m.val().user}:</b> ${m.val().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
