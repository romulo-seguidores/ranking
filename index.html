<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>RANK X - Elite Mídia V10</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap');

        :root {
            --neon: #00ff88;
            --bg: #020202;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* AURAS COM BRILHO REAL */
        .aura-beta { color: #00d4ff !important; text-shadow: 0 0 15px #00d4ff; }
        .aura-elite { color: #ffd700 !important; text-shadow: 0 0 15px #ffd700; }
        .aura-sigma { color: #ff0055 !important; text-shadow: 0 0 15px #ff0055; }
        .aura-omega { color: #a855f7 !important; text-shadow: 0 0 20px #a855f7; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        #app { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; }

        /* CARDS COM ANIMAÇÃO */
        .glass {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 25px; padding: 20px;
            margin-bottom: 15px; animation: popIn 0.5s ease backwards;
        }

        @keyframes popIn { 
            from { opacity: 0; transform: scale(0.9) translateY(20px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* INPUTS MÍDIA */
        input, select {
            width: 100%; padding: 16px; margin-bottom: 10px; border-radius: 15px;
            border: 1px solid #111; background: #080808; color: white; font-size: 14px;
        }

        .btn-glow {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(90deg, #00ff88, #00d4ff); color: black;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-glow:active { transform: scale(0.96); }

        /* RANKING LIST */
        .rank-card {
            display: flex; align-items: center; padding: 15px; border-radius: 22px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            margin-bottom: 10px; position: relative; overflow: hidden;
        }

        .medal {
            width: 40px; height: 40px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            background: #111; border: 1px solid #222; margin-right: 12px;
        }
        .gold { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        .silver { background: linear-gradient(135deg, #e0e0e0, #888); color: #000; }
        .bronze { background: linear-gradient(135deg, #cd7f32, #5e2f00); color: #fff; }

        /* STATUS DOT */
        .status-tag { font-size: 9px; font-weight: 800; display: flex; align-items: center; margin-top: 4px; }
        .on { color: #00ff88; }
        .off { color: #ff4444; }

        /* CHAT UI */
        #chat-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; flex-direction: column;
        }
        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { background: #111; padding: 10px 15px; border-radius: 18px; border-left: 4px solid var(--neon); max-width: 85%; }

        .btn-like {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #ff4444; padding: 4px 10px; border-radius: 10px; font-size: 11px;
            cursor: pointer; margin-top: 5px; transition: 0.2s;
        }

        .hidden { display: none !important; }

        .adm-card { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="app">
        <section id="login-view" class="glass">
            <h1 style="text-align: center; font-weight: 900; font-size: 32px; letter-spacing: -2px;">RANK<span style="color:var(--neon)">CLASSE</span></h1>
            <p style="text-align: center; font-size: 10px; color: #444; margin-bottom: 20px;">SISTEMA DE ELITE REGIONAL</p>
            
            <input type="text" id="in-turma" placeholder="Nome da Turma">
            <input type="text" id="in-serie" placeholder="Série/Ano">
            <input type="text" id="in-escola" placeholder="Nome da Escola">
            <input type="url" id="in-insta" placeholder="Instagram (URL)">
            <input type="password" id="in-pass" placeholder="Senha">
            <select id="in-aura">
                <option value="aura-beta">🏳️‍🌈⃤ Aura Beta</option>
                <option value="aura-elite">⚜️ Aura Elite</option>
                <option value="aura-sigma">🗿 Aura Sigma</option>
                <option value="aura-omega">♾️ Aura Omega</option>
            </select>
            
            <button onclick="fazerLogin()" class="btn-glow">ACESSAR RANKING</button>
            <button onclick="entrarVisitante()" style="background:none; border:none; color:#333; width:100%; margin-top:15px; font-size: 12px;">Entrar como Visitante</button>
            <p onclick="abrirAdmin()" style="text-align: center; font-size: 9px; margin-top: 30px; color: #111; cursor: pointer;">PAINEL ADMIN</p>
        </section>

        <section id="rank-view" class="hidden">
            <div class="glass" style="text-align: center; border-bottom: 4px solid var(--neon);">
                <h2 id="meu-nome" class="aura-elite">---</h2>
                <p id="minha-info" style="font-size: 11px; color: #888; margin-top: 5px;">Escola --- | Série ---</p>
                <div style="margin-top: 15px; display: flex; justify-content: space-around;">
                    <div><b id="meu-pts" style="font-size: 22px; color: var(--neon);">0</b><br><small>PTS</small></div>
                    <div><b id="meu-nivel" style="font-size: 22px;">1</b><br><small>NÍVEL</small></div>
                </div>
                <button onclick="sair()" style="margin-top: 15px; background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); color: red; padding: 5px 15px; border-radius: 10px; font-size: 10px; font-weight: bold;">SAIR DA CONTA</button>
            </div>

            <div id="ranking-container"></div>
            <div style="height: 100px;"></div>
        </section>

        <section id="admin-view" class="hidden glass">
            <h2 style="margin-bottom: 20px;">SISTEMA CENTRAL</h2>
            <button onclick="limparTudoChat()" style="background: red; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; margin-bottom: 20px;">🧨 LIMPAR TODO O CHAT</button>
            <div id="admin-list"></div>
            <button onclick="window.location.reload()" class="btn-glow" style="background:#222; color:white; margin-top: 20px;">FECHAR PAINEL</button>
        </section>
    </div>

    <div id="chat-ui">
        <div style="padding: 20px; background: #050505; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center;">
            <b style="color: var(--neon);">CHAT DA ELITE</b>
            <button onclick="toggleChat(false)" style="background:none; border:none; color:red; font-weight: 800;">[X]</button>
        </div>
        <div id="msg-flow"></div>
        <div id="chat-controls" style="padding: 15px; background: #050505; display: flex; gap: 8px;"></div>
    </div>

    <div id="btn-chat-float" class="hidden" onclick="toggleChat(true)" style="position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--neon); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 10px 25px rgba(0,255,136,0.4); z-index: 1000;">💬</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://gincanaescola-d4f8c-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sessao = null;

        // PREENCHIMENTO AUTOMÁTICO (SEM LOGIN DIRETO)
        window.addEventListener('load', () => {
            const data = localStorage.getItem('user_v10_persist');
            if(data) {
                const p = JSON.parse(data);
                
                // Apenas preenche os campos para facilitar
                document.getElementById('in-turma').value = p.turma || "";
                document.getElementById('in-pass').value = p.pass || "";
                document.getElementById('in-serie').value = p.serie || "";
                document.getElementById('in-escola').value = p.escola || "";
                document.getElementById('in-insta').value = p.insta || "";
                document.getElementById('in-aura').value = p.aura || "aura-elite";
            }
        });

        function fazerLogin() {
            const t = document.getElementById('in-turma').value.trim();
            const p = document.getElementById('in-pass').value;
            const s = document.getElementById('in-serie').value;
            const e = document.getElementById('in-escola').value;
            const i = document.getElementById('in-insta').value;
            const a = document.getElementById('in-aura').value;

            if(!t || !p) return;

            db.ref('ranking/' + t).once('value', snap => {
                let user = snap.val();
                
                if(user && user.pass !== p) {
                    alert("Senha incorreta!");
                    return;
                }
                
                if(!user) {
                    user = {
                        turma: t, pass: p, escola: e, serie: s,
                        insta: i, aura: a, pontos: 0, 
                        seguidores: 0, videos: 0, likes: 0, online: Date.now()
                    };
                    db.ref('ranking/' + t).set(user);
                }
                
                sessao = user;
                
                const dadosParaSalvar = { turma: t, pass: p, escola: e, serie: s, insta: i, aura: a };
                localStorage.setItem('user_v10_persist', JSON.stringify(dadosParaSalvar));
                
                startApp();
            });
        }

        function entrarVisitante() {
            sessao = { turma: "Visitante", aura: "aura-beta", isVisitante: true };
            startApp(true);
        }

        function startApp(isVis = false) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('rank-view').classList.remove('hidden');
            document.getElementById('btn-chat-float').classList.remove('hidden');

            const chatControls = document.getElementById('chat-controls');
            if(isVis) {
                chatControls.innerHTML = `<p style="color:#555; font-size:11px; width:100%; text-align:center">Visitantes não podem enviar mensagens.</p>`;
            } else {
                chatControls.innerHTML = `
                    <input type="text" id="msg-input" style="margin:0;" placeholder="Digite algo...">
                    <button onclick="mandarMsg()" class="btn-glow" style="width: 60px; padding: 0;">></button>
                `;
                setInterval(() => {
                    if(sessao && !sessao.isVisitante) {
                        db.ref('ranking/'+sessao.turma).update({ online: Date.now() });
                    }
                }, 10000);
            }
            carregarDados();
        }

        function carregarDados() {
            db.ref('ranking').on('value', snap => {
                const container = document.getElementById('ranking-container');
                const dados = snap.val();
                if(!dados) return;

                const lista = Object.values(dados).filter(t => t && t.turma).sort((a,b) => (b.pontos || 0) - (a.pontos || 0));
                container.innerHTML = "";

                lista.forEach((t, i) => {
                    const timeDiff = Date.now() - (t.online || 0);
                    const isOn = timeDiff < 25000;
                    const isRecente = timeDiff < 125000;
                    
                    const level = Math.floor((t.pontos || 0) / 10) + 1;
                    const medalClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                    const medalIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1;

                    if(sessao && t.turma === sessao.turma) {
                        document.getElementById('meu-nome').innerText = t.turma;
                        document.getElementById('meu-nome').className = t.aura;
                        document.getElementById('minha-info').innerText = `${t.escola || '---'} | ${t.serie || '---'}`;
                        document.getElementById('meu-pts').innerText = t.pontos || 0;
                        document.getElementById('meu-nivel').innerText = level;
                    }

                    container.innerHTML += `
                        <div class="rank-card" style="animation-delay: ${i * 0.1}s">
                            <div class="medal ${medalClass}">${medalIcon}</div>
                            <div style="flex:1">
                                <b class="${t.aura}">${t.turma}</b> <small style="color:#555">LV ${level}</small>
                                <div style="font-size:9px; color:#888">${t.escola || ''} • ${t.serie || ''}</div>
                                <div class="status-tag ${isOn ? 'on' : 'off'}">
                                    <div style="width:6px; height:6px; border-radius:50%; background:currentColor; margin-right:5px;"></div>
                                    ${isOn ? 'Online agora' : (isRecente ? 'Visto há pouco' : 'Offline')}
                                </div>
                                <button class="btn-like" onclick="darLike('${t.turma}')">❤️ ${t.likes || 0}</button>
                            </div>
                            <div style="text-align:right">
                                <b style="color:var(--neon); font-size:18px;">${t.pontos || 0}</b><br>
                                <small style="font-size:8px; color:#333">PONTOS</small>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function darLike(turmaAlvo) {
            const storageKey = 'like_v10_' + turmaAlvo;
            if(localStorage.getItem(storageKey)) return alert("Você já deu like nesta turma!");
            db.ref('ranking/' + turmaAlvo + '/likes').transaction(current => (current || 0) + 1);
            localStorage.setItem(storageKey, "true");
        }

        function toggleChat(s) { document.getElementById('chat-ui').style.display = s ? 'flex' : 'none'; }
        
        function mandarMsg() {
            const m = document.getElementById('msg-input').value;
            if(!m || !sessao || sessao.isVisitante) return;
            db.ref('elite_chat').push({ t: sessao.turma, a: sessao.aura, m: m });
            document.getElementById('msg-input').value = "";
        }

        db.ref('elite_chat').limitToLast(40).on('value', snap => {
            const box = document.getElementById('msg-flow');
            box.innerHTML = "";
            snap.forEach(d => {
                const v = d.val();
                if(v && v.t) box.innerHTML += `<div class="msg-bubble"><b class="${v.a}" style="font-size:10px">${v.t}</b><br>${v.m}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        function abrirAdmin() {
            if(prompt("SENHA:") !== "123") return;
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');

            db.ref('ranking').on('value', snap => {
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                const val = snap.val();
                if(!val) return;
                Object.values(val).filter(t => t && t.turma).forEach(t => {
                    list.innerHTML += `
                        <div class="adm-card">
                            <b>${t.turma}</b><br>
                            <div style="display:flex; gap:10px; margin: 10px 0;">
                                <input type="number" id="a-s-${t.turma}" value="${t.seguidores || 0}" placeholder="Seg">
                                <input type="number" id="a-v-${t.turma}" value="${t.videos || 0}" placeholder="Vid">
                            </div>
                            <div style="display:flex; gap:5px;">
                                <button onclick="saveAdm('${t.turma}')" style="flex:1; background:var(--neon); border:none; padding:10px; border-radius:10px; font-weight:bold;">SALVAR</button>
                                <button onclick="window.open('${t.insta}')" style="flex:1; background:#111; color:white; border:1px solid #333; border-radius:10px;">INSTA 🔗</button>
                                <button onclick="excluirTurma('${t.turma}')" style="background:red; color:white; border:none; padding:10px; border-radius:10px;">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function saveAdm(turma) {
            const s = parseInt(document.getElementById('a-s-'+turma).value) || 0;
            const v = parseInt(document.getElementById('a-v-'+turma).value) || 0;
            const p = (Math.floor(s / 100) * 2) + (v * 1);
            db.ref('ranking/' + turma).update({ seguidores: s, videos: v, pontos: p });
            alert("Atualizado!");
        }

        function excluirTurma(t) { if(confirm("Apagar "+t+"?")) db.ref('ranking/'+t).remove(); }
        function limparTudoChat() { if(confirm("Limpar mensagens?")) db.ref('elite_chat').remove(); }
        
        function sair() { 
            window.location.reload(); 
        }
    </script>
</body>
</html>
